<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDMusicX - LIVE</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        :root {
            --bg: #0a0a0a; --text: #e0e0e0;
            --l1: #ff0000; --l2: #930093; --l3: #00a800; 
            --l4: #ff8000; --l5: #0000ff; --l6: #ff00ff; --l7: #00ff00;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        #map { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; background: var(--bg); }
        .leaflet-control-zoom, .leaflet-control-attribution { display: none; }
        .leaflet-container { background: var(--bg) !important; }

        /* Pantalla de Inicio (Requerida por el navegador para el Audio) */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(10, 10, 10, 0.95); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(5px); transition: opacity 0.5s;
        }
        #start-screen h1 { font-size: 3.5rem; margin-bottom: 5px; letter-spacing: 4px; font-weight: 800; color: #fff; }
        #start-screen p { color: #888; margin-bottom: 40px; font-size: 1.2rem; letter-spacing: 1px; }
        button.play-btn {
            background: transparent; color: #fff; border: 2px solid #fff; padding: 15px 40px; font-size: 1.2rem; 
            border-radius: 30px; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;
        }
        button.play-btn:hover { background: #fff; color: #000; box-shadow: 0 0 20px rgba(255,255,255,0.5); }

        /* Panel Principal (Train Jazz Style) */
        #ui-layer {
            position: absolute; top: 30px; left: 30px; z-index: 1000; pointer-events: none;
            display: flex; flex-direction: column; gap: 20px;
        }

        .panel-box {
            background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(10px);
            border-radius: 8px; padding: 20px; border: 1px solid #333; pointer-events: auto;
            min-width: 280px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .header-title { font-size: 1.5rem; font-weight: 800; margin: 0 0 15px 0; color: #fff; letter-spacing: 2px; }
        
        .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; font-size: 0.85rem; color: #888; }
        .led { width: 8px; height: 8px; border-radius: 50%; background: red; box-shadow: 0 0 8px red; }
        .led.online { background: #00ff00; box-shadow: 0 0 8px #00ff00; }
        .led.sync { background: #00f0ff; box-shadow: 0 0 8px #00f0ff; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .stat-val { font-size: 2rem; font-weight: bold; color: #fff; }
        .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        .line-legend { font-size: 0.85rem; display: flex; flex-direction: column; gap: 12px; }
        .line-row { display: flex; align-items: center; gap: 12px; }
        .line-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 5px currentColor; }
        .line-text { color: #ccc; }
        .line-text strong { color: #fff; display: block; margin-bottom: 2px; }

        /* Efecto de destello en el mapa */
        .bus-marker { transition: r 0.3s ease-out; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>CDMUSICX</h1>
        <p>Datos reales. Tiempo real. Sonido real.</p>
        <button class="play-btn" id="init-btn" onclick="iniciarSistema()">Conectar a Semovi API</button>
    </div>

    <div id="map"></div>

    <div id="ui-layer" style="display: none;">
        <div class="panel-box">
            <h2 class="header-title">CDMUSICX</h2>
            
            <div class="status-row">
                <div class="led" id="status-led"></div>
                <span id="status-text">ESPERANDO DATOS...</span>
            </div>

            <div class="stat-grid">
                <div>
                    <div class="stat-val" id="val-buses">0</div>
                    <div class="stat-label">Unidades Reales</div>
                </div>
                <div>
                    <div class="stat-val" id="val-bpm">0</div>
                    <div class="stat-label">BPM Global</div>
                </div>
            </div>

            <div class="line-legend">
                <div class="line-row"><div class="line-dot" style="background: var(--l1); color: var(--l1);"></div><div class="line-text"><strong>Línea 1</strong> Bombo (Kick)</div></div>
                <div class="line-row"><div class="line-dot" style="background: var(--l2); color: var(--l2);"></div><div class="line-text"><strong>Línea 2</strong> Percusión (Snare)</div></div>
                <div class="line-row"><div class="line-dot" style="background: var(--l3); color: var(--l3);"></div><div class="line-text"><strong>Línea 3</strong> Bajo FM</div></div>
                <div class="line-row"><div class="line-dot" style="background: var(--l4); color: var(--l4);"></div><div class="line-text"><strong>Línea 4</strong> Acordes Poly</div></div>
                <div class="line-row"><div class="line-dot" style="background: var(--l5); color: var(--l5);"></div><div class="line-text"><strong>Línea 5</strong> Pluck Sine</div></div>
                <div class="line-row"><div class="line-dot" style="background: var(--l6); color: var(--l6);"></div><div class="line-text"><strong>Línea 6</strong> Hi-Hats</div></div>
                <div class="line-row"><div class="line-dot" style="background: var(--l7); color: var(--l7);"></div><div class="line-text"><strong>Línea 7</strong> Atmósfera AMSynth</div></div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. INICIALIZACIÓN DEL MAPA ---
        // Estilo oscuro estricto, sin controles para inmersión total.
        const map = L.map('map', { attributionControl: false, zoomControl: false }).setView([19.4326, -99.1332], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        const COLORES_LINEAS = { '1': '#ff0000', '2': '#930093', '3': '#00a800', '4': '#ff8000', '5': '#0000ff', '6': '#ff00ff', '7': '#00ff00' };
        let marcadoresUnidades = {}; // Guarda la referencia de Leaflet
        let unidadesData = {}; // Guarda el estado de interpolación de cada unidad

        // --- 2. MOTOR DE AUDIO (TONE.JS) ---
        let audioActivo = false;
        const synths = {};

        async function iniciarSistema() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => { 
                document.getElementById('start-screen').style.display = 'none'; 
                document.getElementById('ui-layer').style.display = 'flex'; 
            }, 500);

            await Tone.start();
            Tone.Transport.start();
            audioActivo = true;

            const reverb = new Tone.Reverb(2).toDestination();
            const delay = new Tone.FeedbackDelay("8n", 0.4).connect(reverb);

            // Asignación de instrumentos
            synths['1'] = new Tone.MembraneSynth().toDestination(); synths['1'].volume.value = 0;
            synths['2'] = new Tone.NoiseSynth({noise: {type: 'pink'}}).toDestination(); synths['2'].volume.value = -10;
            synths['3'] = new Tone.FMSynth({modulationIndex: 2}).connect(reverb); synths['3'].volume.value = -5;
            synths['4'] = new Tone.PolySynth(Tone.Synth).connect(reverb); synths['4'].volume.value = -10;
            synths['5'] = new Tone.Synth({oscillator: {type: 'sine'}}).connect(reverb); synths['5'].volume.value = -5;
            synths['6'] = new Tone.NoiseSynth({noise:{type:'white'}, envelope:{attack:0.005, decay:0.1}}).toDestination(); synths['6'].volume.value = -15;
            synths['7'] = new Tone.AMSynth().connect(delay); synths['7'].volume.value = -5;

            conectarAPIReal();
            animarInterpolacion(); // Inicia el bucle de renderizado a 60fps
        }

        // --- 3. CONEXIÓN A LA API REAL (CDMX OPEN DATA) ---
        // Usamos allorigins con get/jsonp wrapper porque es infalible para GitHub pages si la API del gobierno tira CORS.
        const INTERVALO_ACTUALIZACION = 30000; // 30 segundos
        const API_URL = 'https://datos.cdmx.gob.mx/api/explore/v2.1/catalog/datasets/prueba_fetchdata_metrobus/records?limit=100';

        async function conectarAPIReal() {
            const led = document.getElementById('status-led');
            const txt = document.getElementById('status-text');
            
            led.className = 'led sync';
            txt.innerText = 'SINCRONIZANDO CON SEMOVI...';

            try {
                // Wrapper seguro para evitar el bloqueo CORS del gobierno en GH Pages
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(API_URL)}`;
                const response = await fetch(proxyUrl);
                
                if (!response.ok) throw new Error("Falla en la red");
                
                const dataText = await response.json();
                const jsonGobierno = JSON.parse(dataText.contents);
                
                procesarDatosReales(jsonGobierno.results);
                
                led.className = 'led online';
                txt.innerText = `ACTUALIZADO: ${new Date().toLocaleTimeString()}`;
            } catch (error) {
                console.error("Error obteniendo datos:", error);
                led.className = 'led';
                txt.innerText = 'ERROR DE CONEXIÓN. REINTENTANDO...';
            }

            // Programar la siguiente descarga
            setTimeout(conectarAPIReal, INTERVALO_ACTUALIZACION);
        }

        // --- 4. PROCESAMIENTO Y MATEMÁTICA DE INTERPOLACIÓN ---
        const notasSynth = ["C4", "D4", "F4", "G4", "A4"]; // Escala Pentatónica

        function procesarDatosReales(autobuses) {
            if(!autobuses) return;
            
            const unidadesActivas = new Set();
            document.getElementById('val-buses').innerText = autobuses.length;
            
            // Ajustar BPM según tráfico real
            const nuevoBPM = Math.min(140, Math.max(60, 60 + (autobuses.length * 0.4)));
            Tone.Transport.bpm.rampTo(nuevoBPM, 2);
            document.getElementById('val-bpm').innerText = Math.floor(nuevoBPM);

            autobuses.forEach(vehiculo => {
                const id = vehiculo.vehicle_id;
                // La API a veces trae las coordenadas como string o en array
                const lat = vehiculo.position_latitude || (vehiculo.point ? vehiculo.point.lat : null);
                const lng = vehiculo.position_longitude || (vehiculo.point ? vehiculo.point.lon : null);
                
                // Normalizamos el ID de la ruta para que coincida con nuestros synths (1 a 7)
                let lineaStr = vehiculo.route_id ? String(vehiculo.route_id).replace(/\D/g,'') : "1";
                if(!COLORES_LINEAS[lineaStr]) lineaStr = "1"; 

                if (lat && lng && id) {
                    unidadesActivas.add(id);

                    if (unidadesData[id]) {
                        // El bus ya existía. Le damos su NUEVO destino y reiniciamos su viaje.
                        const bus = unidadesData[id];
                        
                        // Si la nueva coordenada es diferente a la vieja, calculamos viaje
                        if(bus.targetLat !== lat || bus.targetLng !== lng) {
                            bus.startLat = bus.currentLat;
                            bus.startLng = bus.currentLng;
                            bus.targetLat = lat;
                            bus.targetLng = lng;
                            bus.progress = 0; // Reiniciamos la animación (0 a 1)
                            bus.travelTime = INTERVALO_ACTUALIZACION; // Tiene 30 segundos para llegar
                            bus.soundTriggered = false; // Listo para sonar al llegar
                        }
                    } else {
                        // Aparece un bus nuevo por primera vez
                        unidadesData[id] = {
                            linea: lineaStr,
                            startLat: lat, startLng: lng,
                            currentLat: lat, currentLng: lng,
                            targetLat: lat, targetLng: lng,
                            progress: 1, travelTime: INTERVALO_ACTUALIZACION,
                            soundTriggered: true
                        };

                        marcadoresUnidades[id] = L.circleMarker([lat, lng], {
                            radius: 4, className: 'bus-marker',
                            color: COLORES_LINEAS[lineaStr], fillColor: COLORES_LINEAS[lineaStr],
                            fillOpacity: 1, weight: 2
                        }).addTo(map);
                    }
                }
            });

            // Limpieza: borrar los que ya no transmite el gobierno
            for (let id in unidadesData) {
                if (!unidadesActivas.has(id)) {
                    map.removeLayer(marcadoresUnidades[id]);
                    delete marcadoresUnidades[id];
                    delete unidadesData[id];
                }
            }
        }

        // --- 5. RENDERIZADO FLUIDO (EL MOTOR FÍSICO) ---
        let lastTime = performance.now();

        function animarInterpolacion() {
            const currentTime = performance.now();
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            for (let id in unidadesData) {
                const bus = unidadesData[id];
                const marker = marcadoresUnidades[id];

                if (bus.progress < 1) {
                    // Calculamos cuánto avanzó en este frame (deltaTime suele ser ~16ms a 60fps)
                    bus.progress += deltaTime / bus.travelTime;
                    if (bus.progress >= 1) bus.progress = 1;

                    // Matemáticas: Interpolación Lineal (Lerp)
                    bus.currentLat = bus.startLat + (bus.targetLat - bus.startLat) * bus.progress;
                    bus.currentLng = bus.startLng + (bus.targetLng - bus.startLng) * bus.progress;

                    marker.setLatLng([bus.currentLat, bus.currentLng]);

                    // GATILLO MUSICAL: Cuando el bus real "llega" a la nueva coordenada que reportó el gobierno
                    if (bus.progress === 1 && !bus.soundTriggered && audioActivo) {
                        bus.soundTriggered = true;
                        
                        try {
                            const tiempo = Tone.now() + (Math.random() * 0.05); // Jitter preventivo
                            const l = bus.linea;
                            
                            if(l === '1') synths[l].triggerAttackRelease("C2", "8n", tiempo);
                            else if(l === '2') synths[l].triggerAttackRelease("16n", tiempo);
                            else if(l === '3') synths[l].triggerAttackRelease("C3", "8n", tiempo);
                            else if(l === '4') synths[l].triggerAttackRelease(["C4", "E4", "G4"], "4n", tiempo);
                            else if(l === '6') synths[l].triggerAttackRelease("32n", tiempo);
                            else if(l === '7') synths[l].triggerAttackRelease("C5", "2n", tiempo);
                            else synths['5'].triggerAttackRelease(notasSynth[Math.floor(Math.random()*notasSynth.length)], "8n", tiempo);
                            
                            // Animación visual del destello (Glow)
                            const colorOrig = COLORES_LINEAS[l];
                            marker.setStyle({ fillColor: '#ffffff', radius: 8 });
                            setTimeout(() => {
                                if(marcadoresUnidades[id]) marker.setStyle({ fillColor: colorOrig, radius: 4 });
                            }, 150);

                        } catch (e) {} // Evita bloqueos por superposición de tiempo en Tone.js
                    }
                }
            }

            requestAnimationFrame(animarInterpolacion);
        }
    </script>
</body>
</html>
