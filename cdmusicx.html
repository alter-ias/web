<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDMusicX - Sinfonía Urbana CDMX</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root { --bg: #050505; --text: #e0e0e0; --ui-accent: #00f0ff; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        /* --- PANTALLA DIVIDIDA --- */
        #main-wrapper { display: flex; width: 100vw; height: 100vh; }
        #map-container { width: 100vw; height: 100vh; position: relative; transition: width 0.7s cubic-bezier(0.25, 1, 0.5, 1); z-index: 2; box-shadow: 5px 0 20px rgba(0,0,0,0.9); }
        #map { width: 100%; height: 100%; background: var(--bg); }
        .leaflet-control-zoom, .leaflet-control-attribution { display: none; }
        .leaflet-container { background: var(--bg) !important; }

        #visualizer-container {
            width: 60vw; height: 100vh; position: absolute; right: 0; top: 0;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease-in-out 0.3s;
            background: #020202; z-index: 1; display: flex; justify-content: center; align-items: center;
        }
        #visualizer-canvas { width: 100%; height: 100%; filter: drop-shadow(0 0 15px rgba(0, 240, 255, 0.1)); }

        body.split-mode #map-container { width: 40vw; }
        body.split-mode #visualizer-container { opacity: 1; pointer-events: auto; }

        /* --- PANTALLA DE INICIO --- */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(5, 5, 5, 0.95); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(10px); transition: opacity 0.5s;
        }
        #start-screen h1 { font-size: 3.5rem; margin-bottom: 5px; letter-spacing: 4px; font-weight: 800; color: #fff; }
        #start-screen p { color: #888; margin-bottom: 40px; font-size: 1rem; letter-spacing: 1px; }
        
        button.play-btn {
            background: transparent; color: #fff; border: 1px solid #fff; padding: 15px 40px; font-size: 1rem; 
            border-radius: 30px; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;
        }
        button.play-btn:hover:not(:disabled) { background: #fff; color: #000; box-shadow: 0 0 20px rgba(255,255,255,0.3); }

        /* --- UI LAYER --- */
        #ui-layer {
            position: absolute; top: 30px; left: 30px; z-index: 1000; pointer-events: none;
            display: flex; flex-direction: column; gap: 20px;
        }
        body.split-mode #ui-layer { left: 20px; transform: scale(0.9); transform-origin: top left; transition: 0.5s; }

        .panel-box {
            background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(10px);
            border-radius: 8px; padding: 25px; border: 1px solid #222; pointer-events: auto;
            min-width: 280px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 0.8rem; color: #fff; letter-spacing: 1px; font-weight: bold;}
        .led { width: 10px; height: 10px; border-radius: 50%; background: #00ff00; box-shadow: 0 0 10px #00ff00; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-val { font-size: 2.5rem; font-weight: bold; color: #fff; line-height: 1; margin-bottom: 5px; }
        .stat-label { font-size: 0.65rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }

        .btn-3d {
            background: transparent; border: 1px solid var(--ui-accent); color: var(--ui-accent);
            width: 100%; padding: 10px; border-radius: 4px; cursor: pointer; text-transform: uppercase;
            font-size: 0.75rem; letter-spacing: 1px; transition: 0.3s; margin-bottom: 25px;
        }
        .btn-3d:hover { background: var(--ui-accent); color: #000; box-shadow: 0 0 10px var(--ui-accent); }

        .line-legend { display: flex; flex-direction: column; gap: 12px; max-height: 40vh; overflow-y: auto;}
        .line-row { display: flex; align-items: center; gap: 12px; }
        .line-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 5px currentColor; }
        .line-text { font-size: 0.8rem; color: #aaa; }
        .line-text strong { color: #fff; display: block; font-size: 0.85rem; margin-bottom: 2px; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>CDMUSICX</h1>
        <p>Sinfonía Urbana (Metro + Metrobús + Cablebús)</p>
        <button class="play-btn" onclick="arrancarSistema()">INICIAR SINFONÍA</button>
    </div>

    <div id="main-wrapper">
        <div id="map-container">
            <div id="map"></div>
            
            <div id="ui-layer" style="display: none;">
                <div class="panel-box">
                    <div class="status-row"><div class="led"></div> SISTEMA ACTIVO</div>

                    <div class="stat-grid">
                        <div><div class="stat-val" id="val-buses">0</div><div class="stat-label">Unidades</div></div>
                        <div><div class="stat-val" id="val-bpm">0</div><div class="stat-label">BPM</div></div>
                    </div>

                    <button class="btn-3d" id="btn-toggle-3d" onclick="toggleVisualizer()">Expandir Visualizador 3D</button>
                    <div class="line-legend" id="legend-container"></div>
                </div>
            </div>
        </div>

        <div id="visualizer-container">
            <canvas id="visualizer-canvas"></canvas>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN DEL MAPA ---
        const map = L.map('map', { attributionControl: false, zoomControl: false }).setView([19.41, -99.14], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        let rutasEstructurales = []; 
        let lineasProcesadas = new Set();
        
        // --- 2. MOTOR DE AUDIO Y ARMONÍA (SINFONÍA) ---
        let audioActivo = false;
        const synths = {};
        let analyserNode;
        
        // Acordes de la progresión armónica (Ej: Em -> C -> G -> D)
        const progresión = [
            { acordes: ["E4", "G4", "B4"], escala: ["E4", "F#4", "G4", "A4", "B4", "C5", "D5"], bajo: "E2" },
            { acordes: ["C4", "E4", "G4"], escala: ["C4", "D4", "E4", "F4", "G4", "A4", "B4"], bajo: "C2" },
            { acordes: ["G3", "B3", "D4"], escala: ["G4", "A4", "B4", "C5", "D5", "E5", "F#5"], bajo: "G1" },
            { acordes: ["D4", "F#4", "A4"], escala: ["D4", "E4", "F#4", "G4", "A4", "B4", "C#5"], bajo: "D2" }
        ];
        let indiceArmonia = 0;

        async function arrancarSistema() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('start-screen').style.display = 'none'; document.getElementById('ui-layer').style.display = 'flex'; }, 500);

            await Tone.start();
            Tone.Transport.start();
            audioActivo = true;

            analyserNode = new Tone.Analyser("fft", 256);
            Tone.getDestination().connect(analyserNode);

            const reverb = new Tone.Reverb(3).toDestination();
            const delay = new Tone.FeedbackDelay("8n", 0.5).connect(reverb);

            // Instrumentos por Sistema de Transporte
            // METRO (Sub-Bajo y Acordes masivos)
            synths['METRO'] = new Tone.PolySynth(Tone.Synth).connect(reverb); synths['METRO'].volume.value = -8;
            synths['BASS'] = new Tone.FMSynth({modulationIndex: 1.5}).toDestination(); synths['BASS'].volume.value = 0;
            
            // METROBÚS (Arpegios y Percusión)
            synths['MB'] = new Tone.Synth({oscillator: {type: 'sine'}}).connect(delay); synths['MB'].volume.value = -5;
            synths['PERC'] = new Tone.NoiseSynth({noise:{type:'white'}, envelope:{attack:0.005, decay:0.1}}).toDestination(); synths['PERC'].volume.value = -15;
            
            // CABLEBÚS (Brillos y atmósferas etéreas en el aire)
            synths['CBB'] = new Tone.MetalSynth({resonance: 8000, envelope: {attack: 0.01, decay: 1}}).connect(delay); synths['CBB'].volume.value = -10;

            // Loop Maestro: Cambia la armonía cada 4 compases (El latido de la ciudad)
            new Tone.Loop(time => {
                indiceArmonia = (indiceArmonia + 1) % progresión.length;
                // El Metro dicta el cambio de acorde
                synths['METRO'].triggerAttackRelease(progresión[indiceArmonia].acordes, "1n", time);
                synths['BASS'].triggerAttackRelease(progresión[indiceArmonia].bajo, "2n", time);
            }, "4m").start(0);

            iniciarVisualizador3D();
            descargarCartografia('METRO', 'Metro (Subterráneo)', 'Acordes Base');
            descargarCartografia('MB', 'Metrobús (Superficie)', 'Arpegios');
            descargarCartografia('CBB', 'Cablebús (Aire)', 'Campanas Etéreas');
        }

        // --- 3. DESCARGA DESDE APIMETRO (MÚLTIPLES SISTEMAS) ---
        async function descargarCartografia(sistema, nombreVisual, instDesc) {
            try {
                const res = await fetch(`https://apimetro.dev/movilidad/mapas/geojsonLinea?sistema=${sistema}`);
                const geojson = await res.json();
                
                const legend = document.getElementById('legend-container');
                let colorBase = sistema === 'METRO' ? '#ffaa00' : (sistema === 'MB' ? '#ff0000' : '#00a8ff'); // Fallback colors
                let grosor = sistema === 'METRO' ? 4 : (sistema === 'MB' ? 2 : 1.5);
                let opacidad = sistema === 'METRO' ? 0.3 : 0.6;

                // Añadir a la leyenda el sistema
                if(!lineasProcesadas.has(sistema)) {
                    lineasProcesadas.add(sistema);
                    legend.innerHTML += `<div class="line-row"><div class="line-dot" style="background: ${colorBase}; color: ${colorBase};"></div><div class="line-text"><strong>${nombreVisual}</strong>${instDesc}</div></div>`;
                }

                L.geoJSON(geojson, {
                    style: function(f) {
                        return { color: f.properties.color_hex || colorBase, weight: grosor, opacity: opacidad };
                    },
                    onEachFeature: function(f) {
                        if(f.geometry.type === 'MultiLineString') {
                            f.geometry.coordinates.forEach(tramo => {
                                rutasEstructurales.push({
                                    sistema: sistema,
                                    color: f.properties.color_hex || colorBase,
                                    nodos: tramo.map(c => [c[1], c[0]])
                                });
                            });
                        }
                    }
                }).addTo(map);

                // Reiniciamos el tráfico cada vez que cargamos una red nueva para integrarla
                if(rutasEstructurales.length > 50) iniciarTraficoGenerativo();

            } catch(e) { console.error(`Error al conectar con Apimetro para ${sistema}:`, e); }
        }

        // --- 4. MOTOR DE TRÁFICO (SINCRONIZADO A LA ARMONÍA) ---
        let unidadesActivas = [];

        function iniciarTraficoGenerativo() {
            unidadesActivas = []; // Limpiar antes de regenerar
            const numBuses = 120; // Más tráfico porque hay más redes
            document.getElementById('val-buses').innerText = numBuses;
            const bpm = 110; // BPM constante para la sinfonía
            Tone.Transport.bpm.value = bpm;
            document.getElementById('val-bpm').innerText = bpm;

            for(let i=0; i<numBuses; i++) {
                const rutaObj = rutasEstructurales[Math.floor(Math.random() * rutasEstructurales.length)];
                if(!rutaObj || rutaObj.nodos.length < 2) continue;

                const idx = Math.floor(Math.random() * (rutaObj.nodos.length - 1));
                
                unidadesActivas.push({
                    rutaObj: rutaObj, nodos: rutaObj.nodos,
                    currentIdx: idx, targetIdx: idx + 1, dir: 1,
                    startLat: rutaObj.nodos[idx][0], startLng: rutaObj.nodos[idx][1],
                    targetLat: rutaObj.nodos[idx+1][0], targetLng: rutaObj.nodos[idx+1][1],
                    progress: Math.random(),
                    velocidad: (Math.random() * 0.005) + 0.002, 
                    marker: L.circleMarker(rutaObj.nodos[idx], { 
                        radius: rutaObj.sistema === 'METRO' ? 4 : (rutaObj.sistema === 'MB' ? 3 : 2), 
                        color: rutaObj.color, fillColor: rutaObj.color, fillOpacity: 1, weight: 1 
                    }).addTo(map)
                });
            }
            if(!window.animando) { window.animando = true; animarFisicas(); }
        }

        let lastTime = performance.now();

        function animarFisicas() {
            const currentTime = performance.now();
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            unidadesActivas.forEach(bus => {
                bus.progress += bus.velocidad;

                if (bus.progress >= 1) {
                    bus.progress = 1;
                    
                    // Disparo Musical Condicionado por el Sistema de Transporte
                    if (audioActivo) {
                        try {
                            const t = Tone.now() + (Math.random() * 0.05);
                            const sis = bus.rutaObj.sistema;
                            const escalaActual = progresión[indiceArmonia].escala;
                            const notaAleatoria = escalaActual[Math.floor(Math.random() * escalaActual.length)];

                            if (sis === 'MB') {
                                // Metrobús toca la melodía (arpegios) o percusión
                                if(Math.random() > 0.8) synths['PERC'].triggerAttackRelease("16n", t);
                                else synths['MB'].triggerAttackRelease(notaAleatoria, "8n", t);
                            } 
                            else if (sis === 'CBB') {
                                // Cablebús toca brillos
                                synths['CBB'].triggerAttackRelease("32n", t);
                            }
                            // El METRO no dispara notas individuales al llegar a estación, él marca los acordes base en el Loop maestro.
                            
                            // Destello visual (excepto el Metro para no saturar)
                            if(sis !== 'METRO') {
                                bus.marker.setStyle({ fillColor: '#ffffff', color: '#ffffff', radius: 8 });
                                setTimeout(() => { if(bus.marker) bus.marker.setStyle({ fillColor: bus.rutaObj.color, color: bus.rutaObj.color, radius: sis === 'MB' ? 3 : 2 }); }, 150);
                            }
                        } catch (e) {}
                    }

                    bus.currentIdx = bus.targetIdx;
                    bus.targetIdx += bus.dir;
                    if(bus.targetIdx >= bus.nodos.length || bus.targetIdx < 0) { bus.dir *= -1; bus.targetIdx = bus.currentIdx + bus.dir; }
                    
                    bus.startLat = bus.nodos[bus.currentIdx][0]; bus.startLng = bus.nodos[bus.currentIdx][1];
                    bus.targetLat = bus.nodos[bus.targetIdx][0]; bus.targetLng = bus.nodos[bus.targetIdx][1];
                    bus.progress = 0;
                }

                const curLat = bus.startLat + (bus.targetLat - bus.startLat) * bus.progress;
                const curLng = bus.startLng + (bus.targetLng - bus.startLng) * bus.progress;
                bus.marker.setLatLng([curLat, curLng]);
            });

            requestAnimationFrame(animarFisicas);
        }

        // --- 5. VISUALIZADOR 3D ---
        let is3DActive = false;
        let renderer3D, scene3D, camera3D, organicMesh3D, organicBaseVerts;

        function toggleVisualizer() {
            is3DActive = !is3DActive;
            const btn = document.getElementById('btn-toggle-3d');
            
            if(is3DActive) {
                document.body.classList.add('split-mode');
                btn.innerText = "Cerrar Visualizador 3D";
            } else {
                document.body.classList.remove('split-mode');
                btn.innerText = "Expandir Visualizador 3D";
            }
            
            setTimeout(() => {
                map.invalidateSize();
                if(renderer3D) {
                    const container = document.getElementById('visualizer-container');
                    renderer3D.setSize(container.clientWidth, container.clientHeight);
                    camera3D.aspect = container.clientWidth / container.clientHeight;
                    camera3D.updateProjectionMatrix();
                }
            }, 700);
        }

        function iniciarVisualizador3D() {
            const container = document.getElementById('visualizer-container');
            const canvas = document.getElementById('visualizer-canvas');
            renderer3D = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            
            const w = document.body.clientWidth * 0.6; 
            const h = document.body.clientHeight;
            renderer3D.setSize(w, h);

            scene3D = new THREE.Scene();
            camera3D = new THREE.PerspectiveCamera(60, w / h, 0.1, 1000);
            camera3D.position.z = 15;

            scene3D.add(new THREE.AmbientLight(0x222222));
            const mainLight = new THREE.PointLight(0x00f0ff, 2, 50); mainLight.position.set(5, 5, 5); scene3D.add(mainLight);

            const organicGeo = new THREE.IcosahedronGeometry(3.5, 40);
            organicBaseVerts = [];
            const posAttr = organicGeo.attributes.position;
            for(let i=0; i < posAttr.count; i++) { organicBaseVerts.push(new THREE.Vector3(posAttr.getX(i), posAttr.getY(i), posAttr.getZ(i))); }
            
            const organicMat = new THREE.MeshStandardMaterial({ color: 0x111111, emissive: 0x00f0ff, emissiveIntensity: 0.2, wireframe: true, roughness: 0.2 });
            organicMesh3D = new THREE.Mesh(organicGeo, organicMat);
            scene3D.add(organicMesh3D);

            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                camera3D.position.z += e.deltaY * 0.01;
                camera3D.position.z = Math.max(5, Math.min(30, camera3D.position.z));
            }, { passive: false });

            animar3D();
        }

        function animar3D() {
            requestAnimationFrame(animar3D);
            if(!is3DActive || !analyserNode) return;

            const audioData = analyserNode.getValue();
            let sum = 0;
            const freqData = new Uint8Array(256);
            
            for(let i=0; i<audioData.length; i++) {
                let val = (audioData[i] + 100) * 2.55; 
                val = Math.max(0, Math.min(255, val));
                freqData[i] = val;
                sum += val;
            }
            let avgNorm = (sum / 256) / 255;

            organicMesh3D.rotation.y += 0.003;
            organicMesh3D.rotation.z = avgNorm * 0.1;
            
            const pos = organicMesh3D.geometry.attributes.position;
            let time = performance.now() * 0.001;

            for(let i=0; i < organicBaseVerts.length; i++) {
                let freq = freqData[i % 256];
                let base = organicBaseVerts[i];
                let asymNoise = Math.sin(base.x * 2.0 + time) * Math.cos(base.y * 2.0 + time);
                
                let displacement = (freq / 255.0) * 1.5 + (asymNoise * 0.5 * (freq/255.0));
                let dir = base.clone().normalize();
                let newPos = base.clone().add(dir.multiplyScalar(displacement));
                
                pos.setXYZ(i, newPos.x, newPos.y, newPos.z);
            }
            
            pos.needsUpdate = true;
            organicMesh3D.material.emissiveIntensity = 0.1 + (avgNorm * 1.5);

            renderer3D.render(scene3D, camera3D);
        }
    </script>
</body>
</html>
