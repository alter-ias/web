<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciudad Sintética: CDMX Generative Beats</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        :root { --bg: #0a0a1a; --text: #00ffcc; --accent: #ff00ff; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Courier New', Courier, monospace; background: var(--bg); color: var(--text); }
        #container { display: flex; height: 100vh; }
        
        #sidebar {
            width: 350px; background: rgba(10, 10, 26, 0.95); padding: 25px;
            z-index: 1000; box-shadow: 5px 0 20px rgba(0, 255, 204, 0.2);
            display: flex; flex-direction: column; gap: 20px;
        }
        
        #map { flex-grow: 1; }
        
        .panel { background: rgba(0, 255, 204, 0.05); border: 1px solid var(--text); padding: 15px; border-radius: 8px; }
        .data-display { font-size: 2em; font-weight: bold; color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        
        button {
            background: transparent; color: var(--text); border: 2px solid var(--text);
            padding: 15px; font-size: 1.2em; cursor: pointer; text-transform: uppercase;
            font-weight: bold; transition: all 0.3s;
        }
        button:hover { background: var(--text); color: var(--bg); box-shadow: 0 0 15px var(--text); }
        
        .leaflet-container { background: #05050f !important; }
        
        .marker-l1 { background-color: #ff0055; border-radius: 50%; width: 10px; height: 10px; box-shadow: 0 0 15px #ff0055; }
        .marker-other { background-color: #00ffcc; border-radius: 50%; width: 8px; height: 8px; opacity: 0.7; }
    </style>
</head>
<body>

<div id="container">
    <div id="sidebar">
        <h2>CIUDAD SINTÉTICA</h2>
        <p>Motor Generativo Basado en Metrobús CDMX</p>
        
        <div class="panel">
            <div>ESTADO DEL MOTOR</div>
            <button id="btnPlay" onclick="iniciarSistema()">Arrancar Secuencia</button>
        </div>

        <div class="panel">
            <div>BPM (Dictado por tráfico)</div>
            <div id="bpmDisplay" class="data-display">0</div>
        </div>

        <div class="panel">
            <div>UNIDADES ACTIVAS</div>
            <div id="busesDisplay" class="data-display">0</div>
        </div>

        <div id="log" style="font-size: 0.8em; opacity: 0.7; margin-top: auto;">Esperando inicialización...</div>
    </div>
    <div id="map"></div>
</div>

<script>
    // --- 1. CONFIGURACIÓN DEL MAPA ---
    const map = L.map('map').setView([19.4326, -99.1332], 12);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);
    let marcadores = {};

    // --- 2. MOTOR MUSICAL (TONE.JS) ---
    // Sintetizadores
    const kick = new Tone.MembraneSynth().toDestination();
    
    const bass = new Tone.FMSynth({
        harmonicity: 0.5, modulationIndex: 1.2,
        oscillator: { type: "sawtooth" },
        envelope: { attack: 0.01, decay: 0.2, sustain: 0.1, release: 0.5 }
    }).toDestination();
    bass.volume.value = -5;

    const lead = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "square" },
        envelope: { attack: 0.05, decay: 0.1, sustain: 0.3, release: 1 }
    }).toDestination();
    lead.volume.value = -12;

    const reverb = new Tone.Reverb(3).toDestination();
    lead.connect(reverb);

    // Bucle Base (Latido de la ciudad)
    let baseLoop;
    
    async function iniciarSistema() {
        await Tone.start();
        
        // Configurar Loop Base de Kick y Bajo (4/4 clásico)
        baseLoop = new Tone.Loop(time => {
            kick.triggerAttackRelease("C1", "8n", time);
            // El bajo toca semicorcheas rítmicas
            bass.triggerAttackRelease("C2", "16n", time + 0.1);
            bass.triggerAttackRelease("C2", "16n", time + 0.25);
        }, "4n").start(0);

        Tone.Transport.start();
        document.getElementById('btnPlay').innerText = "Motor en marcha";
        document.getElementById('btnPlay').style.background = "var(--text)";
        document.getElementById('btnPlay').style.color = "var(--bg)";
        
        log("Motor de audio encendido. Sincronizando datos...");
        
        // Iniciar obtención de datos
        fetchBuses();
        setInterval(fetchBuses, 15000); // Revisar cada 15 segs
    }

    // --- 3. LÓGICA DE DATOS -> MÚSICA ---
    const notasLead = ["C4", "Eb4", "F4", "G4", "Bb4", "C5"]; // Escala Pentatónica Menor
    
    async function fetchBuses() {
        try {
            // NOTA: Usamos datos simulados aquí para garantizar que funcione al instante, 
            // ya que las APIs del gobierno a veces se caen. 
            // Para la API real: fetch('https://datos.cdmx.gob.mx/api/v2/catalog/datasets/gtfs-metrobus-rt/exports/json')
            const mockData = generarDatosSimulados(); 
            procesarDatos(mockData);
        } catch (e) {
            log("Error obteniendo datos.");
        }
    }

    function procesarDatos(buses) {
        const totalBuses = buses.length;
        document.getElementById('busesDisplay').innerText = totalBuses;

        // --- MAGIA: Ajustar BPM según la cantidad de autobuses ---
        // Mapeamos: 50 buses = 90 BPM (Chill) | 200 buses = 140 BPM (Techno/House)
        let nuevoBPM = Math.floor(80 + (totalBuses * 0.3));
        nuevoBPM = Math.min(Math.max(nuevoBPM, 80), 160); // Limitar entre 80 y 160
        Tone.Transport.bpm.rampTo(nuevoBPM, 2); // Transición suave de 2 segundos
        document.getElementById('bpmDisplay').innerText = nuevoBPM;

        buses.forEach(bus => {
            const id = bus.id;
            const lat = bus.lat;
            const lng = bus.lng;
            const route = bus.linea;

            if (marcadores[id]) {
                marcadores[id].setLatLng([lat, lng]);
            } else {
                // Nuevo autobús aparece en el mapa
                const esL1 = route === 'L1';
                marcadores[id] = L.circleMarker([lat, lng], {
                    className: esL1 ? 'marker-l1' : 'marker-other'
                }).addTo(map);

                // --- MAGIA: Generación de Notas Sincronizadas ---
                // Si aparece un bus, disparamos una nota en el Lead Synth, 
                // pero la cuantizamos (@8n) para que suene a tiempo con el ritmo.
                if(Tone.Transport.state === "started") {
                    const notaAleatoria = notasLead[Math.floor(Math.random() * notasLead.length)];
                    lead.triggerAttackRelease(notaAleatoria, "8n", "@8n"); // Toca en la siguiente corchea
                }
            }
        });
        log("Mapa y sintetizadores actualizados.");
    }

    // --- FUNCIONES AUXILIARES ---
    function log(msg) {
        document.getElementById('log').innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
    }

    // Simulador para que puedas probar el código inmediatamente sin depender de la API real
    function generarDatosSimulados() {
        const buses = [];
        const numBuses = Math.floor(Math.random() * 100) + 50; // Entre 50 y 150 buses
        for(let i=0; i<numBuses; i++) {
            buses.push({
                id: 'bus_' + i,
                lat: 19.4326 + (Math.random() - 0.5) * 0.1,
                lng: -99.1332 + (Math.random() - 0.5) * 0.1,
                linea: Math.random() > 0.7 ? 'L1' : 'L' + Math.floor(Math.random()*7 + 2)
            });
        }
        return buses;
    }
</script>
</body>
</html>
