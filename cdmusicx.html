<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDMusicX - Realidad y Ritmo</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        :root { --bg: #050505; --text: #f0f0f0; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Courier New', Courier, monospace; background: var(--bg); color: var(--text); overflow: hidden; }
        #map { width: 100vw; height: 100vh; position: absolute; z-index: 1; }
        .leaflet-control-zoom { display: none; }
        .leaflet-container { background: var(--bg) !important; }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;
        }

        #top-bar { text-align: center; padding: 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); pointer-events: auto; }
        
        button {
            background: #fff; color: #000; border: none; padding: 12px 24px; font-size: 1.2em;
            cursor: pointer; font-weight: bold; text-transform: uppercase; border-radius: 2px; transition: 0.3s;
        }
        button:hover { box-shadow: 0 0 20px rgba(255,255,255,0.8); }

        #bottom-panel {
            background: linear-gradient(to top, rgba(0,0,0,0.95) 20%, transparent);
            padding: 40px 20px 20px 20px; display: flex; justify-content: space-between; align-items: flex-end;
            pointer-events: auto;
        }

        .data-box { background: rgba(20,20,20,0.8); border: 1px solid #333; padding: 15px; border-radius: 5px; text-align: right; }
        .data-value { font-size: 2.5em; font-weight: bold; color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }
        .data-label { font-size: 0.8em; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; }

        .legend h1 { margin: 0; font-size: 2em; letter-spacing: 2px; text-transform: uppercase; }
        .legend h1 span { color: #ff0055; }
        .status { color: #888; font-size: 0.9em; margin-top: 5px; }

        .bus-marker { border-radius: 50%; box-shadow: 0 0 10px currentColor; }
    </style>
</head>
<body>

<div id="map"></div>

<div id="ui-layer">
    <div id="top-bar">
        <button id="btn-start" onclick="iniciarSistema()">Conectar a CDMusicX</button>
    </div>

    <div id="bottom-panel">
        <div class="legend">
            <h1>CDM<span>usic</span>X</h1>
            <div class="status" id="sys-status">Esperando conexión... Cartografía descargada: 0%</div>
        </div>

        <div style="display: flex; gap: 20px;">
            <div class="data-box">
                <div class="data-label">Unidades en Ruta</div>
                <div class="data-value" id="bus-count">0</div>
            </div>
            <div class="data-box">
                <div class="data-label">Tempo Master (BPM)</div>
                <div class="data-value" id="bpm-count" style="color: #ff0055; text-shadow: 0 0 10px #ff0055;">0</div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- 1. MAPA Y ESTILOS DE LÍNEAS OFICIALES ---
    const map = L.map('map', { attributionControl: false, zoomControl: false }).setView([19.40, -99.14], 12);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

    const coloresLineas = {
        'LÍNEA 1': '#ff0000', 'LÍNEA 2': '#930093', 'LÍNEA 3': '#00a800', 'LÍNEA 4': '#ff8000',
        'LÍNEA 5': '#0000ff', 'LÍNEA 6': '#ff00ff', 'LÍNEA 7': '#00ff00'
    };

    let rutasExactas = {}; // Aquí guardaremos las coordenadas para que los autobuses naveguen
    
    // API Oficial Datos Abiertos CDMX
    const URL_GEOJSON = 'https://datos.cdmx.gob.mx/api/explore/v2.1/catalog/datasets/lineas-de-metrobus/exports/geojson?lang=es&timezone=America%2FMexico_City';

    async function descargarCartografia() {
        document.getElementById('sys-status').innerText = "Descargando trazos oficiales...";
        try {
            const response = await fetch(URL_GEOJSON);
            const data = await response.json();
            
            L.geoJSON(data, {
                style: function (feature) {
                    const linea = feature.properties.linea;
                    return { color: coloresLineas[linea] || '#fff', weight: 3, opacity: 0.4 };
                },
                onEachFeature: function (feature, layer) {
                    const linea = feature.properties.linea;
                    // Extraer coordenadas para que los buses las sigan
                    if(feature.geometry.type === "LineString") {
                        if(!rutasExactas[linea]) rutasExactas[linea] = [];
                        // Invertimos porque GeoJSON es [Lng, Lat] y Leaflet usa [Lat, Lng]
                        const coords = feature.geometry.coordinates.map(c => [c[1], c[0]]);
                        rutasExactas[linea] = rutasExactas[linea].concat(coords);
                    }
                }
            }).addTo(map);
            
            document.getElementById('sys-status').innerText = "Cartografía cargada. Listo para arrancar.";
        } catch (error) {
            document.getElementById('sys-status').innerText = "Error cargando mapa oficial. Usando simulación.";
        }
    }
    
    descargarCartografia();

    // --- 2. ORQUESTA TONE.JS (7 INSTRUMENTOS) ---
    const reverb = new Tone.Reverb(2.5).toDestination();
    const delay = new Tone.FeedbackDelay("8n", 0.4).connect(reverb);
    
    const synths = {
        'LÍNEA 1': new Tone.MembraneSynth().toDestination(), // Kick (Bombo)
        'LÍNEA 2': new Tone.NoiseSynth({noise: {type: 'pink'}}).toDestination(), // Snare/Beatbox
        'LÍNEA 3': new Tone.FMSynth({modulationIndex: 2}).connect(reverb), // Bajo
        'LÍNEA 4': new Tone.PolySynth(Tone.Synth, {oscillator: {type: 'square'}}).connect(delay), // Chords
        'LÍNEA 5': new Tone.Synth({oscillator: {type: 'sine'}}).connect(reverb), // Pluck
        'LÍNEA 6': new Tone.MetalSynth({resonance: 4000}).toDestination(), // Hi-hats
        'LÍNEA 7': new Tone.AMSynth().connect(delay) // Atmósfera
    };
    
    // Balanceo de volúmenes
    synths['LÍNEA 1'].volume.value = 0;
    synths['LÍNEA 2'].volume.value = -10;
    synths['LÍNEA 3'].volume.value = -5;
    synths['LÍNEA 4'].volume.value = -15;
    synths['LÍNEA 6'].volume.value = -15;

    let audioIniciado = false;
    let baseBPM = 80;

    async function iniciarSistema() {
        await Tone.start();
        Tone.Transport.start();
        audioIniciado = true;
        document.getElementById('top-bar').style.display = 'none';
        document.getElementById('sys-status').innerText = "Motor Generativo Sincronizado.";
        
        iniciarFlujoVehicular();
    }

    // --- 3. LÓGICA DE TRÁFICO, BPM Y MOVIMIENTO EXACTO ---
    let unidades = [];

    function iniciarFlujoVehicular() {
        // Simulador de tráfico: Cambia la cantidad de buses aleatoriamente cada 10 segundos
        actualizarTrafico();
        setInterval(actualizarTrafico, 10000);
        animarUnidades();
    }

    function actualizarTrafico() {
        // Generamos entre 40 (valle) y 150 (hora pico) unidades
        const nuevoTotal = Math.floor(Math.random() * 110) + 40; 
        document.getElementById('bus-count').innerText = nuevoTotal;

        // CALCULAR BPM: 40 buses = 90 BPM. 150 buses = 145 BPM.
        const nuevoBPM = Math.floor(90 + ((nuevoTotal - 40) * 0.5));
        Tone.Transport.bpm.rampTo(nuevoBPM, 2); // Rampa suave de 2 segundos
        document.getElementById('bpm-count').innerText = nuevoBPM;

        // Ajustar el array de unidades en el mapa
        const lineasDisponibles = Object.keys(rutasExactas);
        if(lineasDisponibles.length === 0) return; // Si no cargó el mapa, no hacemos nada

        // Si hay menos unidades de las necesarias, las creamos
        while(unidades.length < nuevoTotal) {
            const lineaActiva = lineasDisponibles[Math.floor(Math.random() * lineasDisponibles.length)];
            const ruta = rutasExactas[lineaActiva];
            
            unidades.push({
                linea: lineaActiva,
                ruta: ruta,
                nodoActual: 0,
                // Velvetocidad depende del BPM (si van rápido, se mueven más rápido entre nodos)
                velocidad: Math.floor(Math.random() * 3) + 1, 
                marker: L.circleMarker(ruta[0], {
                    radius: 4, color: coloresLineas[lineaActiva], fillOpacity: 1, weight: 1
                }).addTo(map)
            });
        }
        
        // Si hay más de las necesarias, las borramos (salen de servicio)
        while(unidades.length > nuevoTotal) {
            const busViejo = unidades.pop();
            map.removeLayer(busViejo.marker);
        }
    }

    // --- 4. NAVEGACIÓN NODO POR NODO ---
    function animarUnidades() {
        unidades.forEach(bus => {
            // Avanzar al siguiente nodo de la curva real del GeoJSON
            bus.nodoActual += bus.velocidad;

            // Si llega al final de la ruta real
            if (bus.nodoActual >= bus.ruta.length - 1) {
                bus.nodoActual = 0; // Vuelve a empezar
                
                // DISPARO MUSICAL
                if (audioIniciado) dispararSonido(bus.linea);
                
                // Efecto visual de rebote
                bus.marker.setRadius(12);
                setTimeout(() => bus.marker.setRadius(4), 200);
            }

            // Actualizar posición en el mapa a la coordenada real
            if(bus.ruta[bus.nodoActual]) {
                bus.marker.setLatLng(bus.ruta[bus.nodoActual]);
            }
        });

        // Esta vez usamos setTimeout en lugar de requestAnimationFrame para no saturar 
        // el navegador navegando por miles de coordenadas GeoJSON por segundo.
        setTimeout(animarUnidades, 100); 
    }

    const notasSynth = ["C4", "D4", "F4", "G4", "A4"]; // Pentatónica mayor

    function dispararSonido(linea) {
        const tiempo = Tone.now();
        
        switch(linea) {
            case 'LÍNEA 1': synths[linea].triggerAttackRelease("C1", "8n", tiempo); break;
            case 'LÍNEA 2': synths[linea].triggerAttackRelease("16n", tiempo); break;
            case 'LÍNEA 3': synths[linea].triggerAttackRelease("C2", "8n", tiempo); break;
            case 'LÍNEA 4': synths[linea].triggerAttackRelease(["C4", "E4", "G4"], "4n", tiempo); break;
            case 'LÍNEA 5': synths[linea].triggerAttackRelease(notasSynth[Math.floor(Math.random()*notasSynth.length)], "8n", tiempo); break;
            case 'LÍNEA 6': synths[linea].triggerAttackRelease("32n", tiempo); break;
            case 'LÍNEA 7': synths[linea].triggerAttackRelease("C5", "2n", tiempo); break;
        }
    }
</script>
</body>
</html>
