<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEXICO CITY BLUES</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --bg: #030303; --text: #e0e0e0; --ui-accent: #00f0ff;
            --neon-magenta: #ff003c; --neon-yellow: #f0ff00; --neon-green: #00ff41;
            --glass-bg: rgba(10, 10, 10, 0.45); --glass-border: rgba(255, 255, 255, 0.08);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Share Tech Mono', monospace; background: var(--bg); color: var(--text); overflow: hidden; }

        /* --- MAPA --- */
        #map { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; background: var(--bg); }
        .leaflet-control-zoom, .leaflet-control-attribution { display: none; }
        .leaflet-container { background: var(--bg) !important; }

        /* --- PANTALLA INICIO --- */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(2, 2, 2, 0.85); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); transition: opacity 1s ease-in-out;
        }
        .intro-card {
            background: rgba(15, 15, 15, 0.5); border: 1px solid rgba(0, 240, 255, 0.2); border-radius: 24px; padding: 40px 50px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(0, 240, 255, 0.05); max-width: 500px;
        }
        .title-glitch { font-family: 'Orbitron', sans-serif; font-size: 3rem; margin-bottom: 5px; letter-spacing: 4px; font-weight: 900; color: var(--ui-accent); text-shadow: 0 0 15px rgba(0, 240, 255, 0.5); }
        .author-text { font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; color: #666; letter-spacing: 4px; margin-bottom: 30px; }
        #loading-sequence { font-size: 0.85rem; color: #aaa; text-align: left; margin-bottom: 30px; min-height: 80px; line-height: 1.6; }
        #loading-sequence span { color: var(--neon-green); font-weight: bold; }
        button.play-btn {
            background: transparent; color: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.2); padding: 12px 40px; font-size: 1rem; font-family: 'Orbitron';
            border-radius: 30px; transition: 0.4s; text-transform: uppercase; letter-spacing: 3px; cursor: default;
        }
        button.play-btn.ready { color: var(--ui-accent); border-color: var(--ui-accent); cursor: pointer; box-shadow: 0 0 15px rgba(0,240,255,0.2); }
        button.play-btn.ready:hover { background: var(--ui-accent); color: #000; box-shadow: 0 0 30px var(--ui-accent); }

        /* --- UI COMPONENTES --- */
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); pointer-events: auto; position: absolute; display: flex; flex-direction: column; }
        .panel-header { padding: 10px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-family: 'Orbitron', sans-serif; font-size: 0.65rem; letter-spacing: 2px; color: #888; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }

        /* PANEL LATERAL */
        #main-ui { top: 20px; left: 20px; width: 240px; z-index: 1000; }
        .real-data-box { padding: 12px 15px; font-size: 0.65rem; color: #aaa; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .real-data-box div { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .real-data-box span { color: #fff; }
        .real-data-box .highlight { color: var(--ui-accent); font-weight: bold; }
        .audio-tracker { padding: 12px 15px; }
        .audio-tracker-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.65rem; color: #888; }
        .tracker-val { font-size: 1.8rem; font-weight: bold; color: var(--ui-accent); line-height: 1; }
        .interactive-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 4px 8px; cursor: pointer; border-radius: 4px; font-family: 'Share Tech Mono'; transition: 0.2s; font-size: 0.65rem; width: 100%; margin-top: 10px;}
        .interactive-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--ui-accent); color: var(--ui-accent); }
        .legend-container { padding: 10px 15px; max-height: 150px; overflow-y: auto; }
        .line-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .line-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 4px currentColor; }
        .line-text { font-size: 0.6rem; color: #888; }
        .line-text strong { color: #ccc; display: inline-block; margin-right: 5px; }

        /* DOCK Y GADGETS */
        #gadget-dock { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; gap: 8px; pointer-events: auto; background: var(--glass-bg); backdrop-filter: blur(20px); border-radius: 20px; padding: 5px; border: 1px solid var(--glass-border); }
        .dock-btn { background: transparent; border: none; color: #888; padding: 8px 16px; font-family: 'Share Tech Mono'; font-size: 0.7rem; border-radius: 15px; cursor: pointer; transition: 0.3s; letter-spacing: 1px; }
        .dock-btn:hover, .dock-btn.active { background: rgba(0,240,255,0.1); color: var(--ui-accent); }
        .gadget { display: none; position: absolute; z-index: 1000; overflow: hidden; }
        .gadget.active { display: flex; }
        .gadget-content { flex-grow: 1; position: relative; background: transparent; padding: 10px; display: flex; justify-content: center; align-items: center;}
        .gadget canvas { width: 100%; height: 100%; display: block; }
        .close-btn { cursor: pointer; color: #666; font-weight: bold; transition: 0.2s;}
        .close-btn:hover { color: var(--neon-magenta); }

        #gadget-3d { top: 20px; right: 20px; width: 280px; height: 280px; }
        #gadget-wave { bottom: 80px; left: 20px; width: 240px; height: 120px; }
        #gadget-fft { bottom: 80px; right: 20px; width: 240px; height: 120px; }
        #gadget-fx { top: 320px; right: 20px; width: 240px; height: auto; }
        .fx-controls { padding: 10px; font-size: 0.65rem; color: #888; }
        .fx-controls label { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .fx-controls span { color: var(--ui-accent); }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; margin: 4px 0 12px 0; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 10px; width: 6px; background: #fff; cursor: pointer; border-radius: 2px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 1px; background: rgba(255, 255, 255, 0.2); }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 3px; }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="intro-card">
            <div class="title-glitch">MEXICO CITY BLUES</div>
            <div class="author-text">By AlterLab</div>
            
            <div id="loading-sequence">
                <div id="log-1">Estableciendo enlace de telemetría...</div>
            </div>

            <button class="play-btn" id="btn-start" onclick="arrancarSistema()" disabled>ESPERANDO...</button>
        </div>
    </div>

    <div id="map"></div>

    <div id="main-ui" class="glass-panel" style="display: none;">
        <div class="panel-header"><span>MEXICO CITY BLUES</span></div>
        
        <div class="real-data-box">
            <div style="margin-bottom: 8px; color:#fff;">UNIDADES EN LÍNEA</div>
            <div>Metro: <span id="txt-metro">0</span></div>
            <div>Metrobús: <span id="txt-mb">0</span></div>
            <div>Cablebús: <span id="txt-cbb">0</span></div>
            <div>Trolebús: <span id="txt-trole">0</span></div>
            <div style="margin-top: 6px; padding-top: 6px; border-top: 1px dashed #333;">Total Activo: <span class="highlight" id="txt-total">0</span></div>
        </div>

        <div class="audio-tracker">
            <div class="audio-tracker-header"><span>ENCUENTROS / CHISPAS</span> <span>BPM: <span id="val-bpm" style="color:var(--ui-accent);">60</span></span></div>
            <div class="tracker-val" id="val-buses">0</div>
            <button class="interactive-btn" onclick="remapear()">[ ↺ ESCANEAR RED ]</button>
        </div>

        <div class="legend-container" id="legend-container"></div>
    </div>

    <div id="gadget-dock" style="display: none;">
        <button class="dock-btn" onclick="toggleGadget('gadget-3d', this)">[ 3D CORE ]</button>
        <button class="dock-btn" onclick="toggleGadget('gadget-wave', this)">[ WAVE ]</button>
        <button class="dock-btn" onclick="toggleGadget('gadget-fft', this)">[ FFT ]</button>
        <button class="dock-btn" onclick="toggleGadget('gadget-fx', this)">[ FX DSP ]</button>
    </div>

    <div id="gadget-3d" class="gadget glass-panel">
        <div class="panel-header"><span>GEOMETRÍA</span><span class="close-btn" onclick="document.querySelector('#gadget-dock button:nth-child(1)').click()">×</span></div>
        <div class="gadget-content" id="c3d-wrapper"><canvas id="canvas-3d"></canvas></div>
    </div>
    <div id="gadget-wave" class="gadget glass-panel">
        <div class="panel-header"><span>OSCILOSCOPIO</span><span class="close-btn" onclick="document.querySelector('#gadget-dock button:nth-child(2)').click()">×</span></div>
        <div class="gadget-content"><canvas id="canvas-wave"></canvas></div>
    </div>
    <div id="gadget-fft" class="gadget glass-panel">
        <div class="panel-header"><span>ESPECTRO</span><span class="close-btn" onclick="document.querySelector('#gadget-dock button:nth-child(3)').click()">×</span></div>
        <div class="gadget-content"><canvas id="canvas-fft"></canvas></div>
    </div>
    <div id="gadget-fx" class="gadget glass-panel">
        <div class="panel-header"><span>EFECTOS</span><span class="close-btn" onclick="document.querySelector('#gadget-dock button:nth-child(4)').click()">×</span></div>
        <div class="fx-controls">
            <label>LOWPASS FILTRO <span><span id="val-lp">20000</span> Hz</span></label>
            <input type="range" id="ctrl-lp" min="100" max="20000" value="20000">
            <label>DISTORSIÓN <span><span id="val-dist">0</span> %</span></label>
            <input type="range" id="ctrl-dist" min="0" max="100" value="0">
            <label>GLITCH 3D <span><span id="val-glitch">0</span> %</span></label>
            <input type="range" id="ctrl-glitch" min="0" max="100" value="0">
        </div>
    </div>

    <script>
        // --- 0. LÓGICA DE SIMULACIÓN Y CONEXIÓN FAKE ---
        let totalMetro = 0, totalMB = 0, totalCBB = 0, totalTrole = 0;
        let totalFlotaActiva = 0;

        function escanearRedSilenciosamente() {
            const hora = new Date().getHours();
            let factorDemanda = 1.0;

            if (hora >= 1 && hora <= 4) factorDemanda = 0.05; 
            else if (hora === 5) factorDemanda = 0.3; 
            else if (hora >= 6 && hora <= 9) factorDemanda = 1.0; 
            else if (hora >= 10 && hora <= 16) factorDemanda = 0.6; 
            else if (hora >= 17 && hora <= 20) factorDemanda = 0.95; 
            else if (hora >= 21 && hora <= 23) factorDemanda = 0.4; 
            else factorDemanda = 0.1; 

            totalMetro = Math.floor(256 * factorDemanda);
            totalMB = Math.floor(800 * factorDemanda);
            totalCBB = Math.floor(400 * factorDemanda);
            totalTrole = Math.floor(200 * factorDemanda); 
            
            if(totalMetro < 5) totalMetro = 5;
            if(totalMB < 10) totalMB = 10;
            if(totalCBB < 5) totalCBB = 5;
            if(totalTrole < 5) totalTrole = 5;

            totalFlotaActiva = totalMetro + totalMB + totalCBB + totalTrole;

            document.getElementById('txt-metro').innerText = `${totalMetro}`;
            document.getElementById('txt-mb').innerText = `${totalMB}`;
            document.getElementById('txt-cbb').innerText = `${totalCBB}`;
            document.getElementById('txt-trole').innerText = `${totalTrole}`;
            document.getElementById('txt-total').innerText = `${totalFlotaActiva}`;
        }

        window.onload = () => {
            escanearRedSilenciosamente();
            const seq = document.getElementById('loading-sequence');
            setTimeout(() => seq.innerHTML += `<div>Leyendo transpondedores Metro... <span>[ACTIVO]</span></div>`, 600);
            setTimeout(() => seq.innerHTML += `<div>Sincronizando Metrobús... <span>[ACTIVO]</span></div>`, 1200);
            setTimeout(() => seq.innerHTML += `<div>Detectando Cablebús / Trolebús... <span>[ACTIVO]</span></div>`, 1800);
            setTimeout(() => seq.innerHTML += `<div>Calculando trayectorias... <span>[COMPLETADO]</span></div>`, 2400);
            setTimeout(() => {
                seq.innerHTML += '<div style="margin-top:10px; color:#fff;">SISTEMA EN LÍNEA.</div>';
                const btn = document.getElementById('btn-start');
                btn.disabled = false; btn.classList.add('ready'); btn.innerText = 'INICIAR SINFONÍA';
            }, 3000);
        };

        // --- 1. CORE MAPA E INFRAESTRUCTURA ---
        const map = L.map('map', { attributionControl: false, zoomControl: false }).setView([19.41, -99.14], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        let rutasEstructurales = []; 
        let unidadesActivas = [];
        
        const dataLineas = {
            'L1_METRO': { sys: 'METRO', nombre: 'Metro L1', inst: 'Acordes/Bajo', color: '#ff6600', nodos: [[19.398,-99.074], [19.411,-99.096], [19.427,-99.113], [19.426,-99.143], [19.422,-99.182], [19.398,-99.200]] },
            'L2_METRO': { sys: 'METRO', nombre: 'Metro L2', inst: 'Acordes/Bajo', color: '#0066cc', nodos: [[19.458,-99.198], [19.444,-99.172], [19.436,-99.143], [19.405,-99.138], [19.352,-99.143], [19.340,-99.143]] },
            'L1_MB': { sys: 'MB', nombre: 'Metrobús L1', inst: 'Arpegios', color: '#ff003c', nodos: [[19.495,-99.118], [19.467,-99.136], [19.426,-99.163], [19.364,-99.184], [19.276,-99.167]] },
            'L2_MB': { sys: 'MB', nombre: 'Metrobús L2', inst: 'Percusión', color: '#930093', nodos: [[19.393,-99.046], [19.398,-99.115], [19.405,-99.172], [19.401,-99.187]] },
            'L1_CBB': { sys: 'CBB', nombre: 'Cablebús L1', inst: 'Campanas', color: '#00f0ff', nodos: [[19.495,-99.118], [19.525,-99.130], [19.555,-99.145]] },
            'L1_TROLE': { sys: 'TROLE', nombre: 'Trolebús L1 (Eje Central)', inst: 'Retro Pluck', color: '#0044ff', nodos: [[19.490,-99.145], [19.450,-99.140], [19.420,-99.145], [19.350,-99.145], [19.300,-99.140]] },
            'L2_TROLE': { sys: 'TROLE', nombre: 'Trolebús L2 (Eje 2 Sur)', inst: 'Retro Pluck', color: '#0044ff', nodos: [[19.410,-99.080], [19.412,-99.120], [19.410,-99.160], [19.412,-99.180]] }
        };

        const legendContainer = document.getElementById('legend-container');
        Object.keys(dataLineas).forEach(id => {
            const l = dataLineas[id];
            let grosor = l.sys === 'METRO' ? 2.5 : (l.sys === 'MB' ? 1.5 : 1);
            let opacidad = l.sys === 'METRO' ? 0.3 : 0.6;
            
            L.polyline(l.nodos, { color: l.color, weight: grosor, opacity: opacidad }).addTo(map);
            l.nodos.forEach(n => L.circleMarker(n, { radius: 1, color: '#222', fillColor: '#222', fillOpacity: 1 }).addTo(map));
            legendContainer.innerHTML += `<div class="line-row"><div class="line-dot" style="background: ${l.color}; color: ${l.color};"></div><div class="line-text"><strong>${l.nombre}</strong>${l.inst}</div></div>`;
            
            rutasEstructurales.push({ sys: l.sys, color: l.color, nodos: l.nodos });
        });
        
        // --- 2. AUDIO GRAPH ---
        const progresión = [
            { acordes: ["E4", "G4", "B4"], escala: ["E4", "F#4", "G4", "A4", "B4", "C5", "D5"], bajo: "E2" },
            { acordes: ["C4", "E4", "G4"], escala: ["C4", "D4", "E4", "F4", "G4", "A4", "B4"], bajo: "C2" },
            { acordes: ["G3", "B3", "D4"], escala: ["G4", "A4", "B4", "C5", "D5", "E5", "F#5"], bajo: "G1" },
            { acordes: ["D4", "F#4", "A4"], escala: ["D4", "E4", "F#4", "G4", "A4", "B4", "C#5"], bajo: "D2" }
        ];
        let indiceArmonia = 0;
        let audioActivo = false;
        const synths = {};
        let audioCtx, analyserFFT, analyserWave;
        let preGainNode, biquadFilter, distortionNode;

        function makeDistortionCurve(amount) {
            let k = typeof amount === 'number' ? amount : 50, n = 44100, curve = new Float32Array(n), deg = Math.PI / 180, i = 0, x;
            for ( ; i < n; ++i ) { x = i * 2 / n - 1; curve[i] = ( 3 + k ) * x * 20 * deg / ( Math.PI + k * Math.abs(x) ); }
            return curve;
        }

        async function arrancarSistema() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('start-screen').style.display = 'none'; document.getElementById('main-ui').style.display = 'flex'; document.getElementById('gadget-dock').style.display = 'flex'; }, 1000);

            await Tone.start(); Tone.Transport.start(); audioActivo = true;

            audioCtx = Tone.getContext().rawContext;
            preGainNode = audioCtx.createGain(); biquadFilter = audioCtx.createBiquadFilter(); biquadFilter.type = "lowpass";
            distortionNode = audioCtx.createWaveShaper(); distortionNode.oversample = '4x';
            analyserFFT = audioCtx.createAnalyser(); analyserFFT.fftSize = 512;
            analyserWave = audioCtx.createAnalyser(); analyserWave.fftSize = 2048;

            Tone.getDestination().disconnect(); Tone.getDestination().connect(preGainNode);
            preGainNode.connect(biquadFilter); biquadFilter.connect(distortionNode);
            distortionNode.connect(analyserFFT); distortionNode.connect(analyserWave);
            distortionNode.connect(audioCtx.destination);

            const reverb = new Tone.Reverb(3).toDestination();
            const delay = new Tone.FeedbackDelay("8n", 0.5).connect(reverb);

            synths['METRO'] = new Tone.PolySynth(Tone.Synth).connect(reverb); synths['METRO'].volume.value = -12;
            synths['BASS'] = new Tone.FMSynth({modulationIndex: 1.5}).toDestination(); synths['BASS'].volume.value = -4;
            synths['MB'] = new Tone.Synth({oscillator: {type: 'triangle'}}).connect(delay); synths['MB'].volume.value = -8;
            synths['PERC'] = new Tone.NoiseSynth({noise:{type:'white'}, envelope:{attack:0.005, decay:0.1}}).toDestination(); synths['PERC'].volume.value = -18;
            synths['CBB'] = new Tone.MetalSynth({resonance: 6000, envelope: {attack: 0.01, decay: 1}}).connect(delay); synths['CBB'].volume.value = -15;
            synths['TROLE'] = new Tone.FMSynth({modulationIndex: 2, envelope: {attack: 0.05, decay: 0.5, sustain: 0}}).connect(delay); synths['TROLE'].volume.value = -8;

            new Tone.Loop(time => {
                indiceArmonia = (indiceArmonia + 1) % progresión.length;
                synths['METRO'].triggerAttackRelease(progresión[indiceArmonia].acordes, "1n", time);
                synths['BASS'].triggerAttackRelease(progresión[indiceArmonia].bajo, "2n", time);
            }, "4m").start(0);

            iniciarVisualizador3D();
            
            // Limitamos a 200 la flota visual para rendimiento
            const flotaRenderizada = Math.min(200, totalFlotaActiva); 
            ajustarFlota(flotaRenderizada); 
        }

        // --- 3. FÍSICA SUPER LENTA Y PARADAS ORGÁNICAS ---
        function remapear() {
            unidadesActivas.forEach(b => map.removeLayer(b.marker)); unidadesActivas = [];
            const nuevas = Math.floor(Math.random() * 100) + 40; 
            ajustarFlota(nuevas);
            indiceArmonia = Math.floor(Math.random() * progresión.length);
        }

        function ajustarFlota(numMeta) {
            Tone.Transport.bpm.rampTo(80, 2); 
            
            while(unidadesActivas.length < numMeta) {
                const rutaObj = rutasEstructurales[Math.floor(Math.random() * rutasEstructurales.length)];
                if(!rutaObj) break;
                
                const idx = Math.floor(Math.random() * (rutaObj.nodos.length - 1));
                const dir = Math.random() > 0.5 ? 1 : -1;
                let targetIdx = idx + dir;
                if(targetIdx < 0) targetIdx = 1; if(targetIdx >= rutaObj.nodos.length) targetIdx = rutaObj.nodos.length - 2;

                unidadesActivas.push({
                    id: Math.random().toString(36).substr(2, 9),
                    rutaObj: rutaObj, nodos: rutaObj.nodos, 
                    currentIdx: idx, targetIdx: targetIdx, dir: dir,
                    startLat: rutaObj.nodos[idx][0], startLng: rutaObj.nodos[idx][1], targetLat: rutaObj.nodos[targetIdx][0], targetLng: rutaObj.nodos[targetIdx][1],
                    curLat: rutaObj.nodos[idx][0], curLng: rutaObj.nodos[idx][1], 
                    progress: Math.random(), 
                    velocidad: (Math.random() * 0.00005) + 0.00001, // Aún más lento
                    estado: 'movimiento', 
                    tiempoEspera: 0,
                    chispaCoolDown: false,
                    marker: L.circleMarker(rutaObj.nodos[idx], { radius: 2, color: rutaObj.color, fillColor: rutaObj.color, fillOpacity: 1, weight: 1 }).addTo(map)
                });
            }
            if(!window.animando) { window.animando = true; animarFisicas(); }
        }

        // --- 4. LA MAGIA: MÚSICA POR INTERSECCIÓN (CHISPAS) ---
        function calcDistancia(lat1, lon1, lat2, lon2) {
            const p = 0.017453292519943295; const c = Math.cos;
            const a = 0.5 - c((lat2 - lat1) * p)/2 + c(lat1 * p) * c(lat2 * p) * (1 - c((lon2 - lon1) * p))/2;
            return 12742 * Math.asin(Math.sqrt(a)); 
        }

        let lastTimeFisicas = performance.now();
        let frameCounter = 0; 

        function animarFisicas() {
            const currentTime = performance.now(); const deltaTime = currentTime - lastTimeFisicas; lastTimeFisicas = currentTime;
            let chispasEsteFrame = 0;

            unidadesActivas.forEach(bus => {
                if (bus.estado === 'espera') {
                    bus.tiempoEspera -= deltaTime;
                    if (bus.tiempoEspera <= 0) bus.estado = 'movimiento';
                    return; 
                }

                if (Math.random() < 0.001) {
                    bus.estado = 'espera';
                    bus.tiempoEspera = Math.random() * 3000 + 1000; 
                    return;
                }

                bus.progress += bus.velocidad;
                if (bus.progress >= 1) {
                    bus.progress = 0;
                    bus.currentIdx = bus.targetIdx; bus.targetIdx += bus.dir;
                    if(bus.targetIdx >= bus.nodos.length || bus.targetIdx < 0) { bus.dir *= -1; bus.targetIdx = bus.currentIdx + bus.dir; }
                    
                    bus.startLat = bus.nodos[bus.currentIdx][0]; bus.startLng = bus.nodos[bus.currentIdx][1];
                    bus.targetLat = bus.nodos[bus.targetIdx][0]; bus.targetLng = bus.nodos[bus.targetIdx][1];
                    
                    bus.estado = 'espera';
                    bus.tiempoEspera = 2000; 
                }

                bus.curLat = bus.startLat + (bus.targetLat - bus.startLat) * bus.progress;
                bus.curLng = bus.startLng + (bus.targetLng - bus.startLng) * bus.progress;
                bus.marker.setLatLng([bus.curLat, bus.curLng]);
            });

            frameCounter++;
            if (frameCounter >= 10 && audioActivo) {
                frameCounter = 0;
                
                for (let i = 0; i < unidadesActivas.length; i++) {
                    for (let j = i + 1; j < unidadesActivas.length; j++) {
                        const b1 = unidadesActivas[i]; const b2 = unidadesActivas[j];
                        
                        if (b1.rutaObj.sys === b2.rutaObj.sys) continue;

                        const distKm = calcDistancia(b1.curLat, b1.curLng, b2.curLat, b2.curLng);
                        
                        if (distKm < 0.15 && !b1.chispaCoolDown && !b2.chispaCoolDown) {
                            
                            const t = Tone.now() + (Math.random() * 0.05);
                            const escalaActual = progresión[indiceArmonia].escala;
                            const nota1 = escalaActual[Math.floor(Math.random() * escalaActual.length)];
                            
                            const sis = b1.rutaObj.sys;
                            if (sis === 'MB') synths['MB'].triggerAttackRelease(nota1, "16n", t);
                            else if (sis === 'CBB') synths['CBB'].triggerAttackRelease("32n", t);
                            else if (sis === 'TROLE') synths['TROLE'].triggerAttackRelease(nota1, "8n", t);
                            
                            if (b2.rutaObj.sys === 'MB' && Math.random() > 0.5) synths['PERC'].triggerAttackRelease("16n", t);

                            b1.marker.setStyle({ fillColor: '#ffffff', color: '#ffffff', radius: 5 });
                            b2.marker.setStyle({ fillColor: '#ffffff', color: '#ffffff', radius: 5 });
                            
                            setTimeout(() => { 
                                if(b1.marker) b1.marker.setStyle({ fillColor: b1.rutaObj.color, color: b1.rutaObj.color, radius: 2 }); 
                                if(b2.marker) b2.marker.setStyle({ fillColor: b2.rutaObj.color, color: b2.rutaObj.color, radius: 2 }); 
                            }, 300);

                            b1.chispaCoolDown = true; b2.chispaCoolDown = true;
                            setTimeout(() => { b1.chispaCoolDown = false; b2.chispaCoolDown = false; }, 2000);
                            
                            chispasEsteFrame++;
                        }
                    }
                }
                if (chispasEsteFrame > 0) document.getElementById('val-buses').innerText = `+${chispasEsteFrame}`;
            }

            requestAnimationFrame(animarFisicas);
        }

        // --- 5. GADGETS Y PANTALLAS FLOTANTES ---
        function toggleGadget(id, btn) {
            const el = document.getElementById(id);
            if(el.classList.contains('active')) {
                el.classList.remove('active'); btn.classList.remove('active');
            } else {
                el.classList.add('active'); btn.classList.add('active');
                redimensionarCanvases(); 
            }
        }

        document.getElementById('ctrl-lp').addEventListener('input', e => { biquadFilter.frequency.value = e.target.value; document.getElementById('val-lp').innerText = e.target.value; });
        document.getElementById('ctrl-dist').addEventListener('input', e => { distortionNode.curve = makeDistortionCurve(parseInt(e.target.value)); document.getElementById('val-dist').innerText = e.target.value; });
        document.getElementById('ctrl-glitch').addEventListener('input', e => { document.getElementById('val-glitch').innerText = e.target.value; });

        const wCanvas = document.getElementById('canvas-wave'); const wCtx = wCanvas.getContext('2d');
        const fCanvas = document.getElementById('canvas-fft'); const fCtx = fCanvas.getContext('2d');

        function redimensionarCanvases() {
            if(document.getElementById('gadget-wave').classList.contains('active')) { wCanvas.width = wCanvas.parentElement.clientWidth - 20; wCanvas.height = wCanvas.parentElement.clientHeight - 40; }
            if(document.getElementById('gadget-fft').classList.contains('active')) { fCanvas.width = fCanvas.parentElement.clientWidth - 20; fCanvas.height = fCanvas.parentElement.clientHeight - 40; }
            if(is3DReady && document.getElementById('gadget-3d').classList.contains('active')) {
                const wrapper = document.getElementById('c3d-wrapper');
                renderer3D.setSize(wrapper.clientWidth, wrapper.clientHeight);
                camera3D.aspect = wrapper.clientWidth / wrapper.clientHeight; camera3D.updateProjectionMatrix();
            }
        }
        window.addEventListener('resize', redimensionarCanvases);

        // --- 6. 3D Y DIBUJO ---
        let is3DReady = false;
        let renderer3D, scene3D, camera3D, organicMesh3D, organicBaseVerts;

        function iniciarVisualizador3D() {
            const wrapper = document.getElementById('c3d-wrapper');
            const canvas = document.getElementById('canvas-3d');
            renderer3D = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            scene3D = new THREE.Scene();
            camera3D = new THREE.PerspectiveCamera(60, 1, 0.1, 1000); camera3D.position.z = 10;

            scene3D.add(new THREE.AmbientLight(0x222222));
            const mainLight = new THREE.PointLight(0x00f0ff, 2, 50); mainLight.position.set(5, 5, 5); scene3D.add(mainLight);

            const organicGeo = new THREE.IcosahedronGeometry(3.5, 40); organicBaseVerts = [];
            for(let i=0; i < organicGeo.attributes.position.count; i++) organicBaseVerts.push(new THREE.Vector3(organicGeo.attributes.position.getX(i), organicGeo.attributes.position.getY(i), organicGeo.attributes.position.getZ(i)));
            
            const organicMat = new THREE.MeshStandardMaterial({ color: 0x111111, emissive: 0x00f0ff, emissiveIntensity: 0.2, wireframe: true, roughness: 0.2 });
            organicMesh3D = new THREE.Mesh(organicGeo, organicMat); scene3D.add(organicMesh3D);

            is3DReady = true;
            
            document.getElementById('gadget-3d').addEventListener('wheel', (e) => {
                e.preventDefault(); camera3D.position.z += e.deltaY * 0.01; camera3D.position.z = Math.max(4, Math.min(20, camera3D.position.z));
            }, { passive: false });

            drawGadgets();
        }

        function drawGadgets() {
            requestAnimationFrame(drawGadgets);
            if(!audioActivo) return;

            const dataArrayFft = new Uint8Array(analyserFFT.frequencyBinCount); analyserFFT.getByteFrequencyData(dataArrayFft);
            
            // Usar getValue en lugar de getByteTimeDomainData que a veces falla en Tone
            let waveData = [];
            try {
                waveData = analyserWave.getValue();
            } catch (e) {
                 // Fallback si Tone.js no está listo
            }

            let sum = 0; for(let i=0; i<dataArrayFft.length; i++) sum += dataArrayFft[i];
            let avgNorm = (sum / dataArrayFft.length) / 255;
            let glitchVal = parseInt(document.getElementById('ctrl-glitch').value) / 100;

            if(document.getElementById('gadget-wave').classList.contains('active') && waveData.length > 0) {
                wCtx.clearRect(0, 0, wCanvas.width, wCanvas.height);
                wCtx.lineWidth = 1.5; wCtx.beginPath(); wCtx.strokeStyle = `var(--ui-accent)`;
                let sliceWidth = wCanvas.width * 1.0 / waveData.length; let wx = 0;
                for(let i = 0; i < waveData.length; i++) {
                    let y = (waveData[i] + 1) / 2 * wCanvas.height; 
                    if(i === 0) wCtx.moveTo(wx, y); else wCtx.lineTo(wx, y); wx += sliceWidth;
                }
                wCtx.stroke();
            }

            if(document.getElementById('gadget-fft').classList.contains('active')) {
                fCtx.clearRect(0, 0, fCanvas.width, fCanvas.height);
                let bars = 64; let barWidth = (fCanvas.width / bars); let x = 0;
                for(let i = 0; i < bars; i++) {
                    let barHeight = dataArrayFft[i] * (fCanvas.height / 255);
                    fCtx.fillStyle = (barHeight > 150) ? '#ff003c' : '#00f0ff';
                    fCtx.fillRect(x, fCanvas.height - barHeight, barWidth - 1, barHeight); x += barWidth;
                }
            }

            if(is3DReady && document.getElementById('gadget-3d').classList.contains('active')) {
                organicMesh3D.rotation.y += 0.003; organicMesh3D.rotation.z = avgNorm * 0.1;
                const pos = organicMesh3D.geometry.attributes.position;
                let time = performance.now() * 0.001;

                for(let i=0; i < organicBaseVerts.length; i++) {
                    let freq = dataArrayFft[i % 256]; let base = organicBaseVerts[i];
                    let asymNoise = Math.sin(base.x * 2.0 + time) * Math.cos(base.y * 2.0 + time);
                    let displacement = (freq / 255.0) * 1.5 + (asymNoise * 0.5 * (freq/255.0)) + (glitchVal * Math.random());
                    let dir = base.clone().normalize(); let newPos = base.clone().add(dir.multiplyScalar(displacement));
                    pos.setXYZ(i, newPos.x, newPos.y, newPos.z);
                }
                pos.needsUpdate = true; organicMesh3D.material.emissiveIntensity = 0.1 + (avgNorm * 1.5);
                renderer3D.render(scene3D, camera3D);
            }
        }
    </script>
