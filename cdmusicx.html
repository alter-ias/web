<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEXICO CITY BLUES</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --bg: #030303; --text: #e0e0e0; --ui-accent: #00f0ff;
            --neon-magenta: #ff003c; --neon-yellow: #f0ff00; --neon-green: #00ff41;
            --glass-bg: rgba(8, 8, 8, 0.5); --glass-border: rgba(255, 255, 255, 0.08);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Share Tech Mono', monospace; background: var(--bg); color: var(--text); overflow: hidden; }

        /* --- MAPA --- */
        #map { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; background: var(--bg); }
        .leaflet-control-zoom, .leaflet-control-attribution { display: none; }
        .leaflet-container { background: var(--bg) !important; }

        /* --- PANTALLA INICIO --- */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(2, 2, 2, 0.85); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); transition: opacity 1s ease-in-out;
        }
        .intro-card {
            background: rgba(10, 10, 10, 0.6); border: 1px solid rgba(0, 240, 255, 0.15); border-radius: 20px; padding: 40px 50px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(0, 240, 255, 0.05); max-width: 500px;
        }
        .title-glitch { font-family: 'Orbitron', sans-serif; font-size: 3rem; margin-bottom: 5px; letter-spacing: 4px; font-weight: 900; color: var(--ui-accent); text-shadow: 0 0 15px rgba(0, 240, 255, 0.3); }
        .author-text { font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; color: #555; letter-spacing: 4px; margin-bottom: 30px; }
        
        .loading-console { font-size: 0.75rem; color: #888; text-align: left; margin-bottom: 30px; min-height: 100px; line-height: 1.8; background: #000; padding: 15px; border-radius: 8px; border: 1px solid #222; overflow: hidden; }
        .loading-console span { color: var(--neon-green); font-weight: bold; }
        
        button.play-btn {
            background: transparent; color: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.2); padding: 12px 40px; font-size: 1rem; font-family: 'Orbitron';
            border-radius: 30px; transition: 0.4s; text-transform: uppercase; letter-spacing: 3px; cursor: default;
        }
        button.play-btn.ready { color: var(--ui-accent); border-color: var(--ui-accent); cursor: pointer; box-shadow: 0 0 15px rgba(0,240,255,0.2); }
        button.play-btn.ready:hover { background: var(--ui-accent); color: #000; box-shadow: 0 0 30px var(--ui-accent); }

        /* --- UI COMPONENTES --- */
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); pointer-events: auto; position: absolute; display: flex; flex-direction: column; }
        .panel-header { padding: 10px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-family: 'Orbitron', sans-serif; font-size: 0.65rem; letter-spacing: 2px; color: #888; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }

        /* PANEL LATERAL */
        #main-ui { top: 20px; left: 20px; width: 280px; z-index: 1000; max-height: calc(100vh - 40px); overflow-y: auto; }
        .real-data-box { padding: 15px; font-size: 0.7rem; color: #aaa; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .real-data-box div { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .real-data-box span { color: #fff; font-family: 'Orbitron'; font-weight: bold;}
        .real-data-box .highlight { color: var(--ui-accent); }
        
        .time-display { font-size: 1.2rem; color: var(--ui-accent); text-align: center; font-family: 'Orbitron'; letter-spacing: 2px; margin-bottom: 10px; text-shadow: 0 0 10px rgba(0, 240, 255, 0.5); }
        .status-text { text-align: center; font-size: 0.6rem; color: #888; margin-bottom: 10px; text-transform: uppercase;}

        .legend-container { padding: 15px; }
        .line-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .line-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 5px currentColor; }
        .line-text { font-size: 0.65rem; color: #888; }
        .line-text strong { color: #ccc; display: block; margin-bottom: 2px; }

        /* --- ONDITAS DE ATASCO (RIPPLES) VISIBLES Y PEQUEÑAS --- */
        .ripple-dot {
            width: 100%; height: 100%; border-radius: 50%;
            position: absolute; top: 0; left: 0;
            border: 2px solid currentColor; 
            animation: pulse-ring 2s infinite ease-out;
        }
        .ripple-center {
            width: 8px; height: 8px; background: currentColor; border-radius: 50%;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 10px currentColor;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0.3; } 
        }

        /* DOCK Y GADGETS */
        #gadget-dock { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; gap: 8px; pointer-events: auto; background: var(--glass-bg); backdrop-filter: blur(20px); border-radius: 20px; padding: 6px; border: 1px solid var(--glass-border); }
        .dock-btn { background: transparent; border: none; color: #888; padding: 8px 16px; font-family: 'Share Tech Mono'; font-size: 0.7rem; border-radius: 15px; cursor: pointer; transition: 0.3s; letter-spacing: 1px; }
        .dock-btn:hover, .dock-btn.active { background: rgba(0,240,255,0.1); color: var(--ui-accent); }
        .gadget { display: none; position: absolute; z-index: 1000; overflow: hidden; }
        .gadget.active { display: flex; }
        .gadget-content { flex-grow: 1; position: relative; background: transparent; padding: 15px; display: flex; justify-content: center; align-items: center;}
        .gadget canvas { width: 100%; height: 100%; display: block; }
        .close-btn { cursor: pointer; color: #666; font-weight: bold; transition: 0.2s; padding: 0 5px;}
        .close-btn:hover { color: var(--neon-magenta); }

        #gadget-3d { top: 20px; right: 20px; width: 280px; height: 280px; }
        #gadget-wave { bottom: 80px; left: 20px; width: 260px; height: 130px; }
        #gadget-fft { bottom: 80px; right: 20px; width: 260px; height: 130px; }
        #gadget-fx { top: 320px; right: 20px; width: 260px; height: auto; }
        
        .fx-controls { padding: 15px; font-size: 0.65rem; color: #888; }
        .fx-controls label { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .fx-controls span { color: var(--ui-accent); }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; margin: 6px 0 15px 0; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 6px; background: #fff; cursor: pointer; border-radius: 3px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; background: rgba(255, 255, 255, 0.2); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="intro-card">
            <div class="title-glitch">MEXICO CITY BLUES</div>
            <div class="author-text">By AlterLab</div>
            
            <div class="loading-console" id="loading-sequence">
                <div>> Inicializando motor de telemetría urbana...</div>
            </div>

            <button class="play-btn" id="btn-start" onclick="arrancarSistema()" disabled>ESPERANDO RED...</button>
        </div>
    </div>

    <div id="map"></div>

    <div id="main-ui" class="glass-panel" style="display: none;">
        <div class="panel-header"><span>ESTADO DEL SISTEMA</span></div>
        
        <div class="real-data-box">
            <div class="time-display" id="clock-display">00:00</div>
            <div class="status-text" id="status-display">SINCRONIZANDO...</div>
            
            <div style="color:#888; font-family:'Share Tech Mono'; letter-spacing:1px; font-size:0.6rem; margin-top:15px; margin-bottom:10px;">SEGUIMIENTO DE FLOTA</div>
            <div>METRO <span><span id="txt-metro">0</span></span></div>
            <div>METROBÚS <span><span id="txt-mb">0</span></span></div>
            <div>CABLEBÚS <span><span id="txt-cbb">0</span></span></div>
            <div>TROLEBÚS <span><span id="txt-trole">0</span></span></div>
            <div style="margin-top: 10px; padding-top: 10px; border-top: 1px dashed #333; font-size:0.75rem;">
                UNIDADES ACTIVAS <span class="highlight" id="txt-total">0</span>
            </div>
        </div>

        <div class="legend-container" id="legend-container"></div>
    </div>

    <div id="gadget-dock" style="display: none;">
        <button class="dock-btn" onclick="toggleGadget('gadget-3d', this)">[ 3D CORE ]</button>
        <button class="dock-btn" onclick="toggleGadget('gadget-wave', this)">[ WAVE ]</button>
        <button class="dock-btn" onclick="toggleGadget('gadget-fft', this)">[ FFT ]</button>
        <button class="dock-btn" onclick="toggleGadget('gadget-fx', this)">[ FX DSP ]</button>
    </div>

    <div id="gadget-3d" class="gadget glass-panel">
        <div class="panel-header"><span>GEOMETRÍA ORGÁNICA</span><span class="close-btn" onclick="document.querySelector('#gadget-dock button:nth-child(1)').click()">×</span></div>
        <div class="gadget-content" id="c3d-wrapper" style="display: flex; justify-content: center; align-items: center;"><canvas id="canvas-3d"></canvas></div>
    </div>
    <div id="gadget-wave" class="gadget glass-panel">
        <div class="panel-header"><span>OSCILOSCOPIO</span><span class="close-btn" onclick="document.querySelector('#gadget-dock button:nth-child(2)').click()">×</span></div>
        <div class="gadget-content"><canvas id="canvas-wave"></canvas></div>
    </div>
    <div id="gadget-fft" class="gadget glass-panel">
        <div class="panel-header"><span>ESPECTRO FRECUENCIA</span><span class="close-btn" onclick="document.querySelector('#gadget-dock button:nth-child(3)').click()">×</span></div>
        <div class="gadget-content"><canvas id="canvas-fft"></canvas></div>
    </div>
    <div id="gadget-fx" class="gadget glass-panel">
        <div class="panel-header"><span>RUTEO DE EFECTOS</span><span class="close-btn" onclick="document.querySelector('#gadget-dock button:nth-child(4)').click()">×</span></div>
        <div class="fx-controls">
            <label>FILTRO PASABAJOS <span><span id="val-lp">20000</span> Hz</span></label>
            <input type="range" id="ctrl-lp" min="100" max="20000" value="20000">
            <label>DISTORSIÓN <span><span id="val-dist">0</span> %</span></label>
            <input type="range" id="ctrl-dist" min="0" max="100" value="0">
            <label>GLITCH 3D <span><span id="val-glitch">0</span> %</span></label>
            <input type="range" id="ctrl-glitch" min="0" max="100" value="0">
        </div>
    </div>

    <script>
        // --- 1. CORE MAPA E INFRAESTRUCTURA ---
        const map = L.map('map', { attributionControl: false, zoomControl: false }).setView([19.41, -99.14], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        let rutasEstructurales = []; 
        let unidadesActivas = [];
        let atascosActivos = []; 
        
        const sysConfig = {
            'METRO': { color: '#ff6600', grosor: 3, opacity: 0.3, inst: 'Sub-Bajo / Chords' },
            'MB':    { color: '#ff003c', grosor: 1.5, opacity: 0.5, inst: 'Arpegio Synth' },
            'CBB':   { color: '#00f0ff', grosor: 1.5, opacity: 0.6, inst: 'MetalSynth' },
            'TROLE': { color: '#0044ff', grosor: 1.5, opacity: 0.5, inst: 'Pluck Retro' }
        };

        const logConsole = (msg) => {
            const seq = document.getElementById('loading-sequence');
            seq.innerHTML += `<div>> ${msg}</div>`;
            seq.scrollTop = seq.scrollHeight;
        };

        function calcDistancia(lat1, lon1, lat2, lon2) {
            const p = 0.017453292519943295; const c = Math.cos;
            const a = 0.5 - c((lat2 - lat1) * p)/2 + c(lat1 * p) * c(lat2 * p) * (1 - c((lon2 - lon1) * p))/2;
            return 12742 * Math.asin(Math.sqrt(a)); 
        }

        // DESCARGA Y COSTURA AGRESIVA DE LÍNEAS
        async function descargarRedCompleta() {
            try {
                logConsole('Extrayendo cartografía de <span style="color:#00f0ff">apimetro.dev</span>...');
                const res = await fetch('https://apimetro.dev/movilidad/mapas/geojsonLinea?sistema=METRO,MB,CBB,TROLE');
                const geojson = await res.json();
                
                logConsole(`Geometrías descargadas. Uniendo rutas de extremo a extremo...`);
                const legend = document.getElementById('legend-container');
                let sistemasAgregados = new Set();

                L.geoJSON(geojson, {
                    style: f => {
                        const sys = f.properties.sistema;
                        const conf = sysConfig[sys] || sysConfig['MB'];
                        return { color: f.properties.color_hex || conf.color, weight: conf.grosor, opacity: conf.opacity };
                    },
                    onEachFeature: f => {
                        const sys = f.properties.sistema;
                        const conf = sysConfig[sys] || sysConfig['MB'];
                        const colorReal = f.properties.color_hex || conf.color;

                        if(!sistemasAgregados.has(sys)) {
                            sistemasAgregados.add(sys);
                            legend.innerHTML += `
                                <div class="line-row">
                                    <div class="line-dot" style="background: ${conf.color}; color: ${conf.color};"></div>
                                    <div class="line-text"><strong>SISTEMA ${sys}</strong>${conf.inst}</div>
                                </div>`;
                        }

                        // COSTURA AGRESIVA: Une todos los fragmentos en una sola línea continua
                        if(f.geometry.type === 'MultiLineString' || f.geometry.type === 'LineString') {
                            let tramosRaw = f.geometry.type === 'LineString' ? [f.geometry.coordinates] : f.geometry.coordinates;
                            let segmentos = tramosRaw.map(tramo => tramo.map(c => [c[1], c[0]]));
                            
                            if (segmentos.length > 0) {
                                let rutaUnica = segmentos.shift();
                                
                                while (segmentos.length > 0) {
                                    let bestIdx = -1; let bestReverse = false; let bestDist = Infinity; let appendToStart = false;
                                    let startP = rutaUnica[0]; let endP = rutaUnica[rutaUnica.length - 1];

                                    for (let i = 0; i < segmentos.length; i++) {
                                        let seg = segmentos[i];
                                        let sStart = seg[0]; let sEnd = seg[seg.length - 1];

                                        let d1 = calcDistancia(endP[0], endP[1], sStart[0], sStart[1]);
                                        let d2 = calcDistancia(endP[0], endP[1], sEnd[0], sEnd[1]);
                                        let d3 = calcDistancia(startP[0], startP[1], sEnd[0], sEnd[1]);
                                        let d4 = calcDistancia(startP[0], startP[1], sStart[0], sStart[1]);

                                        let minD = Math.min(d1, d2, d3, d4);
                                        if (minD < bestDist) {
                                            bestDist = minD; bestIdx = i;
                                            if(minD === d1) { appendToStart = false; bestReverse = false; }
                                            else if(minD === d2) { appendToStart = false; bestReverse = true; }
                                            else if(minD === d3) { appendToStart = true; bestReverse = false; }
                                            else if(minD === d4) { appendToStart = true; bestReverse = true; }
                                        }
                                    }

                                    // Forzamos la unión del segmento más cercano
                                    let nextSeg = segmentos.splice(bestIdx, 1)[0];
                                    if (bestReverse) nextSeg.reverse();
                                    
                                    // Evitar duplicar el punto de unión
                                    if (appendToStart) {
                                        rutaUnica = nextSeg.slice(0, -1).concat(rutaUnica);
                                    } else {
                                        rutaUnica = rutaUnica.concat(nextSeg.slice(1));
                                    }
                                }
                                
                                if(rutaUnica.length > 2) {
                                    // GENERACIÓN DE ESTACIONES: Una estación cada ~800 metros
                                    let esEstacion = new Array(rutaUnica.length).fill(false);
                                    esEstacion[0] = true; 
                                    esEstacion[rutaUnica.length - 1] = true; 
                                    
                                    let distAcumulada = 0;
                                    for(let i=0; i < rutaUnica.length - 1; i++) {
                                        distAcumulada += calcDistancia(rutaUnica[i][0], rutaUnica[i][1], rutaUnica[i+1][0], rutaUnica[i+1][1]);
                                        if(distAcumulada >= 0.8) { 
                                            esEstacion[i+1] = true;
                                            distAcumulada = 0;
                                        }
                                    }
                                    
                                    rutasEstructurales.push({ sys: sys, color: colorReal, nodos: rutaUnica, esEstacion: esEstacion });
                                }
                            }
                        }
                    }
                }).addTo(map);

                logConsole('<span>[SISTEMA LISTO PARA OPERACIÓN]</span>');
                const btn = document.getElementById('btn-start');
                btn.disabled = false; btn.classList.add('ready'); btn.innerText = 'INICIAR SINFONÍA';

            } catch (e) {
                logConsole('<span style="color:red">[ERROR CRÍTICO] API Inalcanzable. Revise conexión.</span>');
            }
        }
        
        window.onload = descargarRedCompleta;

        // --- 2. AUDIO GRAPH Y ARMONÍA ---
        const progresión = [
            { acordes: ["E4", "G4", "B4"], escala: ["E4", "F#4", "G4", "A4", "B4", "C5", "D5"], bajo: "E2" },
            { acordes: ["C4", "E4", "G4"], escala: ["C4", "D4", "E4", "F4", "G4", "A4", "B4"], bajo: "C2" },
            { acordes: ["G3", "B3", "D4"], escala: ["G4", "A4", "B4", "C5", "D5", "E5", "F#5"], bajo: "G1" },
            { acordes: ["D4", "F#4", "A4"], escala: ["D4", "E4", "F#4", "G4", "A4", "B4", "C#5"], bajo: "D2" }
        ];
        let indiceArmonia = 0;
        let audioActivo = false;
        const synths = {};
        let audioCtx, analyserFFT, analyserWave;
        let preGainNode, biquadFilter, distortionNode, limiter;

        function makeDistortionCurve(amount) {
            let k = typeof amount === 'number' ? amount : 50, n = 44100, curve = new Float32Array(n), deg = Math.PI / 180, i = 0, x;
            for ( ; i < n; ++i ) { x = i * 2 / n - 1; curve[i] = ( 3 + k ) * x * 20 * deg / ( Math.PI + k * Math.abs(x) ); }
            return curve;
        }

        async function arrancarSistema() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('start-screen').style.display = 'none'; document.getElementById('main-ui').style.display = 'flex'; document.getElementById('gadget-dock').style.display = 'flex'; }, 1000);

            await Tone.start(); 
            Tone.Transport.start(); 
            Tone.Transport.bpm.value = 60; 
            audioActivo = true;

            audioCtx = Tone.getContext().rawContext;
            preGainNode = audioCtx.createGain(); preGainNode.gain.value = 0.8;
            biquadFilter = audioCtx.createBiquadFilter(); biquadFilter.type = "lowpass";
            distortionNode = audioCtx.createWaveShaper(); distortionNode.oversample = '4x';
            
            limiter = audioCtx.createDynamicsCompressor();
            limiter.threshold.value = -10; limiter.ratio.value = 20;

            analyserFFT = audioCtx.createAnalyser(); analyserFFT.fftSize = 512;
            analyserWave = new Tone.Analyser("waveform", 512);

            Tone.getDestination().disconnect(); Tone.getDestination().connect(preGainNode);
            preGainNode.connect(biquadFilter); biquadFilter.connect(distortionNode);
            distortionNode.connect(limiter);
            limiter.connect(analyserFFT); 
            limiter.connect(audioCtx.destination);
            Tone.getDestination().connect(analyserWave); 

            const reverb = new Tone.Reverb(4).toDestination();
            const delay = new Tone.FeedbackDelay("8n", 0.6).connect(reverb);

            synths['METRO'] = new Tone.PolySynth(Tone.Synth).connect(reverb); synths['METRO'].volume.value = -14;
            synths['BASS'] = new Tone.FMSynth({modulationIndex: 1.5}).toDestination(); synths['BASS'].volume.value = -6;
            synths['MB'] = new Tone.PolySynth(Tone.Synth, {oscillator: {type: 'triangle'}}).connect(delay); synths['MB'].volume.value = -10;
            synths['PERC'] = new Tone.NoiseSynth({noise:{type:'white'}, envelope:{attack:0.005, decay:0.1}}).toDestination(); synths['PERC'].volume.value = -18;
            synths['CBB'] = new Tone.PolySynth(Tone.MetalSynth, {resonance: 6000, envelope: {attack: 0.01, decay: 0.5}}).connect(delay); synths['CBB'].volume.value = -15;
            synths['TROLE'] = new Tone.PolySynth(Tone.FMSynth, {modulationIndex: 2, envelope: {attack: 0.05, decay: 0.5}}).connect(delay); synths['TROLE'].volume.value = -10;

            new Tone.Loop(time => {
                indiceArmonia = (indiceArmonia + 1) % progresión.length;
                synths['METRO'].triggerAttackRelease(progresión[indiceArmonia].acordes, "1n", time);
                synths['BASS'].triggerAttackRelease(progresión[indiceArmonia].bajo, "2n", time);
            }, "4m").start(0);

            iniciarVisualizador3D();
            
            setInterval(sincronizarRelojUrbano, 1000);
            sincronizarRelojUrbano();
            animarFisicas();
        }

        // --- 3. LÓGICA HORARIA Y POBLACIÓN CDMX AUTÓNOMA ---
        let targets = { 'METRO': 0, 'MB': 0, 'CBB': 0, 'TROLE': 0 };
        let globalSpeedMult = 1.0;
        let globalJamProb = 0.0005;

        function sincronizarRelojUrbano() {
            const ahora = new Date();
            const hora = ahora.getHours();
            const minutos = ahora.getMinutes().toString().padStart(2, '0');
            
            document.getElementById('clock-display').innerText = `${hora.toString().padStart(2, '0')}:${minutos}`;

            let estadoTxt = "";

            if (hora >= 0 && hora < 5) { // Madrugada
                targets['METRO'] = 0; targets['CBB'] = 0; // Suspendidos
                targets['MB'] = 15; targets['TROLE'] = 10; // Nochebús
                globalSpeedMult = 2.5; globalJamProb = 0.0001;
                estadoTxt = "MADRUGADA / GUARDIA NOCTURNA";
            } else if (hora >= 5 && hora < 6) { // Despertar
                targets['METRO'] = 40; targets['CBB'] = 20; targets['MB'] = 50; targets['TROLE'] = 20;
                globalSpeedMult = 1.8; globalJamProb = 0.001;
                estadoTxt = "AMANECER / INICIO DE OPERACIONES";
            } else if (hora >= 6 && hora < 10) { // Pico Mañana
                targets['METRO'] = 150; targets['CBB'] = 50; targets['MB'] = 180; targets['TROLE'] = 70;
                globalSpeedMult = 0.6; globalJamProb = 0.02; 
                estadoTxt = "HORA PICO (MAÑANA) / TRÁFICO DENSO";
            } else if (hora >= 10 && hora < 17) { // Valle
                targets['METRO'] = 80; targets['CBB'] = 30; targets['MB'] = 100; targets['TROLE'] = 40;
                globalSpeedMult = 1.2; globalJamProb = 0.005;
                estadoTxt = "HORA VALLE / FLUJO REGULAR";
            } else if (hora >= 17 && hora < 21) { // Pico Tarde
                targets['METRO'] = 160; targets['CBB'] = 50; targets['MB'] = 190; targets['TROLE'] = 80;
                globalSpeedMult = 0.5; globalJamProb = 0.03;
                estadoTxt = "HORA PICO (TARDE) / CAOS URBANO";
            } else { // Noche
                targets['METRO'] = 60; targets['CBB'] = 20; targets['MB'] = 70; targets['TROLE'] = 30;
                globalSpeedMult = 1.5; globalJamProb = 0.002;
                estadoTxt = "NOCHE / FLUJO DESCENDENTE";
            }

            document.getElementById('status-display').innerText = estadoTxt;
            ajustarFlota();
        }

        function ajustarFlota() {
            Object.keys(targets).forEach(sys => {
                let actuales = unidadesActivas.filter(b => b.rutaObj.sys === sys);
                let diff = targets[sys] - actuales.length;
                
                if (diff > 0) {
                    for(let i=0; i<diff; i++) spawnUnidad(sys);
                } else if (diff < 0) {
                    let aRemover = actuales.slice(0, Math.abs(diff));
                    aRemover.forEach(busToRemove => {
                        map.removeLayer(busToRemove.marker);
                        unidadesActivas = unidadesActivas.filter(b => b !== busToRemove);
                    });
                }
            });
            recalcularContadoresUI();
        }

        function recalcularContadoresUI() {
            let cM = 0, cMB = 0, cCBB = 0, cT = 0;
            unidadesActivas.forEach(b => {
                if(b.rutaObj.sys === 'METRO') cM++;
                else if(b.rutaObj.sys === 'MB') cMB++;
                else if(b.rutaObj.sys === 'CBB') cCBB++;
                else if(b.rutaObj.sys === 'TROLE') cT++;
            });
            document.getElementById('txt-metro').innerText = cM;
            document.getElementById('txt-mb').innerText = cMB;
            document.getElementById('txt-cbb').innerText = cCBB;
            document.getElementById('txt-trole').innerText = cT;
            document.getElementById('txt-total').innerText = unidadesActivas.length;
        }

        function crearAtascoEspacial(sys, lat, lng, color) {
            const rippleIcon = L.divIcon({
                className: 'custom-ripple',
                html: `<div style="color: ${color}; position: relative; width: 24px; height: 24px; margin-left: -12px; margin-top: -12px;">
                          <div class="ripple-dot"></div>
                          <div class="ripple-center"></div>
                       </div>`,
                iconSize: [0, 0]
            });
            
            const marker = L.marker([lat, lng], { icon: rippleIcon }).addTo(map);
            atascosActivos.push({ sys: sys, lat: lat, lng: lng, marker: marker, timer: Math.random() * 8000 + 5000 });
        }

        function spawnUnidad(sysObj) {
            const rutasPermitidas = rutasEstructurales.filter(r => r.sys === sysObj);
            if(rutasPermitidas.length === 0) return;
            const rutaObj = rutasPermitidas[Math.floor(Math.random() * rutasPermitidas.length)];
            
            const naceEnInicio = Math.random() > 0.5;
            const idx = naceEnInicio ? 0 : rutaObj.nodos.length - 1;
            const dir = naceEnInicio ? 1 : -1;
            const targetIdx = idx + dir;

            unidadesActivas.push({
                rutaObj: rutaObj, nodos: rutaObj.nodos, 
                currentIdx: idx, targetIdx: targetIdx, dir: dir,
                startLat: rutaObj.nodos[idx][0], startLng: rutaObj.nodos[idx][1], 
                targetLat: rutaObj.nodos[targetIdx][0], targetLng: rutaObj.nodos[targetIdx][1],
                curLat: rutaObj.nodos[idx][0], curLng: rutaObj.nodos[idx][1],
                progress: 0, 
                // Velocidad convertida a kilómetros base por frame
                velBase: (Math.random() * 0.005) + 0.002, 
                velActual: 0,
                estado: 'movimiento', 
                timer: 0,
                chispaCoolDown: false,
                marker: L.circleMarker(rutaObj.nodos[idx], { 
                    radius: rutaObj.sys === 'METRO' ? 3 : 2, 
                    color: rutaObj.color, fillColor: rutaObj.color, fillOpacity: 1, weight: 1 
                }).addTo(map)
            });
        }

        // --- 4. MOTOR FÍSICO CINÉTICO CONTINUO ---
        let lastTimeFisicas = performance.now();
        let frameCounter = 0; 
        let notasEsteFrame = 0; 

        function animarFisicas() {
            const currentTime = performance.now(); 
            const deltaTime = currentTime - lastTimeFisicas; 
            lastTimeFisicas = currentTime;
            notasEsteFrame = 0;

            if (Math.random() < globalJamProb * 0.05 && unidadesActivas.length > 0) {
                let bus = unidadesActivas[Math.floor(Math.random() * unidadesActivas.length)];
                crearAtascoEspacial(bus.rutaObj.sys, bus.curLat, bus.curLng, bus.rutaObj.color);
            }

            for (let i = atascosActivos.length - 1; i >= 0; i--) {
                atascosActivos[i].timer -= deltaTime;
                if (atascosActivos[i].timer <= 0) {
                    map.removeLayer(atascosActivos[i].marker);
                    atascosActivos.splice(i, 1);
                }
            }

            unidadesActivas.forEach(bus => {
                if (bus.estado === 'estacion') {
                    bus.timer -= deltaTime;
                    if (bus.timer <= 0) bus.estado = 'movimiento';
                }

                if (bus.estado === 'movimiento') {
                    let jamMultiplier = 1.0;
                    
                    for (let atasco of atascosActivos) {
                        if (atasco.sys === bus.rutaObj.sys) {
                            let distKm = calcDistancia(bus.curLat, bus.curLng, atasco.lat, atasco.lng);
                            if (distKm < 0.3) { 
                                let localMult = Math.max(0.05, distKm / 0.3); 
                                if (localMult < jamMultiplier) jamMultiplier = localMult;
                            }
                        }
                    }

                    // MOVIMIENTO CONTINUO: Consumir distancia en km
                    bus.velActual = bus.velBase * globalSpeedMult * jamMultiplier;
                    let distanceToMove = bus.velActual;
                    
                    while (distanceToMove > 0) {
                        let distTramo = calcDistancia(bus.startLat, bus.startLng, bus.targetLat, bus.targetLng);
                        if (distTramo < 0.0001) distTramo = 0.0001; // Protección matemática
                        
                        let distRestante = distTramo * (1 - bus.progress);
                        
                        if (distanceToMove >= distRestante) {
                            // Alcanza el nodo actual
                            distanceToMove -= distRestante;
                            bus.progress = 0;
                            bus.currentIdx = bus.targetIdx;
                            bus.targetIdx += bus.dir;
                            
                            // Rebotar en los extremos reales
                            if(bus.targetIdx >= bus.nodos.length || bus.targetIdx < 0) { 
                                bus.dir *= -1; 
                                bus.targetIdx = bus.currentIdx + bus.dir; 
                            }
                            
                            bus.startLat = bus.nodos[bus.currentIdx][0]; bus.startLng = bus.nodos[bus.currentIdx][1];
                            bus.targetLat = bus.nodos[bus.targetIdx][0]; bus.targetLng = bus.nodos[bus.targetIdx][1];
                            
                            // Evaluación de estación
                            if (bus.rutaObj.esEstacion[bus.currentIdx]) {
                                bus.estado = 'estacion';
                                bus.timer = 5000; // 5 segundos reales

                                if(audioActivo && notasEsteFrame < 3 && bus.rutaObj.sys !== 'METRO') {
                                    notasEsteFrame++;
                                    try {
                                        const escala = progresión[indiceArmonia].escala;
                                        const nota = escala[Math.floor(Math.random() * escala.length)];
                                        synths[bus.rutaObj.sys].triggerAttackRelease(nota, "8n", "+0.05", 0.3); 
                                        
                                        bus.marker.setStyle({ fillColor: '#ffffff', radius: 4 });
                                        setTimeout(() => { if(bus.marker) bus.marker.setStyle({ fillColor: bus.rutaObj.color, radius: 2 }); }, 200);
                                    } catch (e) { }
                                }
                                break; // Detiene el bucle de movimiento de este frame
                            }
                        } else {
                            // Avanza dentro del tramo
                            bus.progress += distanceToMove / distTramo;
                            distanceToMove = 0; // Se consumió toda la velocidad
                        }
                    }
                }

                // Renderizar posición visual interpolada
                bus.curLat = bus.startLat + (bus.targetLat - bus.startLat) * bus.progress;
                bus.curLng = bus.startLng + (bus.targetLng - bus.startLng) * bus.progress;
                bus.marker.setLatLng([bus.curLat, bus.curLng]);
            });

            // LÓGICA DE INTERSECCIONES Y CHISPAS
            frameCounter++;
            if (frameCounter >= 5) {
                frameCounter = 0;
                
                for (let i = 0; i < unidadesActivas.length; i++) {
                    for (let j = i + 1; j < unidadesActivas.length; j++) {
                        const b1 = unidadesActivas[i]; const b2 = unidadesActivas[j];
                        const distKm = calcDistancia(b1.curLat, b1.curLng, b2.curLat, b2.curLng);
                        
                        if (distKm < 0.05 && !b1.chispaCoolDown && !b2.chispaCoolDown && audioActivo) {
                            
                            let hacenChispa = false;
                            if (b1.dir !== b2.dir) hacenChispa = true;
                            if (b1.rutaObj.sys !== b2.rutaObj.sys) hacenChispa = true;

                            if (b1.rutaObj.sys === b2.rutaObj.sys && b1.dir === b2.dir) {
                                hacenChispa = false;
                                if(b1.estado === 'estacion' || b1.velActual < b1.velBase) b2.velActual *= 0.5;
                            }

                            if (hacenChispa && notasEsteFrame < 5) {
                                notasEsteFrame++;
                                try {
                                    const escala = progresión[indiceArmonia].escala;
                                    const nota = escala[Math.floor(Math.random() * escala.length)];
                                    
                                    synths[b1.rutaObj.sys].triggerAttackRelease(nota, "16n", "+0.05", 0.8);
                                    if (b2.rutaObj.sys === 'MB' || b2.rutaObj.sys === 'TROLE') {
                                        synths['PERC'].triggerAttackRelease("16n", "+0.05", 0.5);
                                    }

                                    b1.marker.setStyle({ fillColor: '#ffffff', color: '#ffffff', radius: 5 });
                                    b2.marker.setStyle({ fillColor: '#ffffff', color: '#ffffff', radius: 5 });
                                    
                                    setTimeout(() => { 
                                        if(b1.marker) b1.marker.setStyle({ fillColor: b1.rutaObj.color, color: b1.rutaObj.color, radius: 2 }); 
                                        if(b2.marker) b2.marker.setStyle({ fillColor: b2.rutaObj.color, color: b2.rutaObj.color, radius: 2 }); 
                                    }, 300);

                                    b1.chispaCoolDown = true; b2.chispaCoolDown = true;
                                    setTimeout(() => { b1.chispaCoolDown = false; b2.chispaCoolDown = false; }, 2000);
                                } catch(e) {}
                            }
                        }
                    }
                }
            }

            requestAnimationFrame(animarFisicas);
        }

        // --- 5. GADGETS ---
        function toggleGadget(id, btn) {
            const el = document.getElementById(id);
            if(el.classList.contains('active')) {
                el.classList.remove('active'); btn.classList.remove('active');
            } else {
                el.classList.add('active'); btn.classList.add('active');
                redimensionarCanvases(); 
            }
        }

        document.getElementById('ctrl-lp').addEventListener('input', e => { biquadFilter.frequency.value = e.target.value; document.getElementById('val-lp').innerText = e.target.value; });
        document.getElementById('ctrl-dist').addEventListener('input', e => { distortionNode.curve = makeDistortionCurve(parseInt(e.target.value)); document.getElementById('val-dist').innerText = e.target.value; });
        document.getElementById('ctrl-glitch').addEventListener('input', e => { document.getElementById('val-glitch').innerText = e.target.value; });

        const wCanvas = document.getElementById('canvas-wave'); const wCtx = wCanvas.getContext('2d');
        const fCanvas = document.getElementById('canvas-fft'); const fCtx = fCanvas.getContext('2d');

        function redimensionarCanvases() {
            if(document.getElementById('gadget-wave').classList.contains('active')) { wCanvas.width = wCanvas.parentElement.clientWidth - 20; wCanvas.height = wCanvas.parentElement.clientHeight - 40; }
            if(document.getElementById('gadget-fft').classList.contains('active')) { fCanvas.width = fCanvas.parentElement.clientWidth - 20; fCanvas.height = fCanvas.parentElement.clientHeight - 40; }
            if(is3DReady && document.getElementById('gadget-3d').classList.contains('active')) {
                const wrapper = document.getElementById('c3d-wrapper');
                renderer3D.setSize(wrapper.clientWidth, wrapper.clientHeight);
                camera3D.aspect = wrapper.clientWidth / wrapper.clientHeight; camera3D.updateProjectionMatrix();
            }
        }
        window.addEventListener('resize', redimensionarCanvases);

        // --- 6. 3D Y DIBUJO ---
        let is3DReady = false;
        let renderer3D, scene3D, camera3D, organicMesh3D, organicBaseVerts;

        function iniciarVisualizador3D() {
            const wrapper = document.getElementById('c3d-wrapper');
            const canvas = document.getElementById('canvas-3d');
            renderer3D = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            scene3D = new THREE.Scene();
            camera3D = new THREE.PerspectiveCamera(60, 1, 0.1, 1000); camera3D.position.z = 10;

            scene3D.add(new THREE.AmbientLight(0x222222));
            const mainLight = new THREE.PointLight(0x00f0ff, 2, 50); mainLight.position.set(5, 5, 5); scene3D.add(mainLight);

            const organicGeo = new THREE.IcosahedronGeometry(3.5, 40); organicBaseVerts = [];
            for(let i=0; i < organicGeo.attributes.position.count; i++) organicBaseVerts.push(new THREE.Vector3(organicGeo.attributes.position.getX(i), organicGeo.attributes.position.getY(i), organicGeo.attributes.position.getZ(i)));
            
            const organicMat = new THREE.MeshStandardMaterial({ color: 0x111111, emissive: 0x00f0ff, emissiveIntensity: 0.2, wireframe: true, roughness: 0.2 });
            organicMesh3D = new THREE.Mesh(organicGeo, organicMat); 
            
            organicMesh3D.position.y = 0.8; 
            scene3D.add(organicMesh3D);

            is3DReady = true;
            
            document.getElementById('gadget-3d').addEventListener('wheel', (e) => {
                e.preventDefault(); camera3D.position.z += e.deltaY * 0.01; camera3D.position.z = Math.max(4, Math.min(20, camera3D.position.z));
            }, { passive: false });

            drawGadgets();
        }

        function drawGadgets() {
            requestAnimationFrame(drawGadgets);
            if(!audioActivo) return;

            const dataArrayFft = new Uint8Array(analyserFFT.frequencyBinCount); analyserFFT.getByteFrequencyData(dataArrayFft);
            
            let waveData = [];
            if(analyserWave) waveData = analyserWave.getValue();
            
            let sum = 0; for(let i=0; i<dataArrayFft.length; i++) sum += dataArrayFft[i];
            let avgNorm = (sum / dataArrayFft.length) / 255;
            let glitchVal = parseInt(document.getElementById('ctrl-glitch').value) / 100;

            if(document.getElementById('gadget-wave').classList.contains('active') && waveData.length > 0) {
                wCtx.clearRect(0, 0, wCanvas.width, wCanvas.height);
                wCtx.lineWidth = 2; wCtx.beginPath(); 
                wCtx.strokeStyle = '#00f0ff'; 
                let sliceWidth = wCanvas.width * 1.0 / waveData.length; let wx = 0;
                
                for(let i = 0; i < waveData.length; i++) {
                    let val = waveData[i] * 3.0; 
                    if (val > 1.0) val = 1.0; if (val < -1.0) val = -1.0; 
                    let y = (1 - (val + 1) / 2) * wCanvas.height; 
                    if(i === 0) wCtx.moveTo(wx, y); else wCtx.lineTo(wx, y); wx += sliceWidth;
                }
                wCtx.stroke();
            }

            if(document.getElementById('gadget-fft').classList.contains('active')) {
                fCtx.clearRect(0, 0, fCanvas.width, fCanvas.height);
                let bars = 64; let barWidth = (fCanvas.width / bars); let x = 0;
                for(let i = 0; i < bars; i++) {
                    let barHeight = dataArrayFft[i] * (fCanvas.height / 255);
                    fCtx.fillStyle = (barHeight > 150) ? '#ff003c' : '#00f0ff';
                    fCtx.fillRect(x, fCanvas.height - barHeight, barWidth - 1, barHeight); x += barWidth;
                }
            }

            if(is3DReady && document.getElementById('gadget-3d').classList.contains('active')) {
                organicMesh3D.rotation.y += 0.003; organicMesh3D.rotation.z = avgNorm * 0.1;
                const pos = organicMesh3D.geometry.attributes.position;
                let time = performance.now() * 0.001;

                for(let i=0; i < organicBaseVerts.length; i++) {
                    let freq = dataArrayFft[i % 256]; let base = organicBaseVerts[i];
                    let asymNoise = Math.sin(base.x * 2.0 + time) * Math.cos(base.y * 2.0 + time);
                    let displacement = (freq / 255.0) * 1.5 + (asymNoise * 0.5 * (freq/255.0)) + (glitchVal * Math.random());
                    let dir = base.clone().normalize(); let newPos = base.clone().add(dir.multiplyScalar(displacement));
                    pos.setXYZ(i, newPos.x, newPos.y, newPos.z);
                }
                pos.needsUpdate = true; organicMesh3D.material.emissiveIntensity = 0.1 + (avgNorm * 1.5);
                renderer3D.render(scene3D, camera3D);
            }
        }
    </script>
