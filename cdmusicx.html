<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDMusicX</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --bg: #050505; --text: #e0e0e0; --ui-accent: #00f0ff;
            --l1: #ff0000; --l2: #930093; --l3: #00a800; 
            --l4: #ff8000; --l5: #0000ff; --l6: #ff00ff; --l7: #00ff00;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        /* --- PANTALLA DIVIDIDA --- */
        #main-wrapper { display: flex; width: 100vw; height: 100vh; }

        #map-container {
            width: 100vw; height: 100vh; position: relative;
            transition: width 0.7s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 2; box-shadow: 5px 0 20px rgba(0,0,0,0.9);
        }
        #map { width: 100%; height: 100%; background: var(--bg); }
        .leaflet-control-zoom, .leaflet-control-attribution { display: none; }
        .leaflet-container { background: var(--bg) !important; }

        #visualizer-container {
            width: 60vw; height: 100vh; position: absolute; right: 0; top: 0;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease-in-out 0.3s;
            background: #020202; z-index: 1; display: flex; justify-content: center; align-items: center;
        }
        #visualizer-canvas { width: 100%; height: 100%; filter: drop-shadow(0 0 15px rgba(0, 240, 255, 0.1)); }

        body.split-mode #map-container { width: 40vw; }
        body.split-mode #visualizer-container { opacity: 1; pointer-events: auto; }

        /* --- PANTALLA DE INICIO --- */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(5, 5, 5, 0.95); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(10px); transition: opacity 0.5s;
        }
        #start-screen h1 { font-size: 3.5rem; margin-bottom: 5px; letter-spacing: 4px; font-weight: 800; color: #fff; }
        #start-screen p { color: #888; margin-bottom: 40px; font-size: 1rem; letter-spacing: 1px; }
        
        button.play-btn {
            background: transparent; color: #fff; border: 1px solid #fff; padding: 15px 40px; font-size: 1rem; 
            border-radius: 30px; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;
        }
        button.play-btn:hover:not(:disabled) { background: #fff; color: #000; box-shadow: 0 0 20px rgba(255,255,255,0.3); }
        button.play-btn:disabled { opacity: 0.5; cursor: wait; }

        /* --- UI LAYER --- */
        #ui-layer {
            position: absolute; top: 30px; left: 30px; z-index: 1000; pointer-events: none;
            display: flex; flex-direction: column; gap: 20px;
        }
        body.split-mode #ui-layer { left: 20px; transform: scale(0.9); transform-origin: top left; transition: 0.5s; }

        .panel-box {
            background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(10px);
            border-radius: 8px; padding: 25px; border: 1px solid #222; pointer-events: auto;
            min-width: 280px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 0.75rem; color: #888; letter-spacing: 1px; }
        .led { width: 8px; height: 8px; border-radius: 50%; background: #ffaa00; box-shadow: 0 0 8px #ffaa00; }
        .led.online { background: #00ff00; box-shadow: 0 0 8px #00ff00; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-val { font-size: 2.5rem; font-weight: bold; color: #fff; line-height: 1; margin-bottom: 5px; }
        .stat-label { font-size: 0.65rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }

        .btn-3d {
            background: transparent; border: 1px solid var(--ui-accent); color: var(--ui-accent);
            width: 100%; padding: 10px; border-radius: 4px; cursor: pointer; text-transform: uppercase;
            font-size: 0.75rem; letter-spacing: 1px; transition: 0.3s; margin-bottom: 25px;
        }
        .btn-3d:hover { background: var(--ui-accent); color: #000; box-shadow: 0 0 10px var(--ui-accent); }

        .line-legend { display: flex; flex-direction: column; gap: 12px; }
        .line-row { display: flex; align-items: center; gap: 12px; }
        .line-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 5px currentColor; }
        .line-text { font-size: 0.8rem; color: #aaa; }
        .line-text strong { color: #fff; display: block; font-size: 0.85rem; margin-bottom: 2px; }

    </style>
</head>
<body>

    <div id="start-screen">
        <h1>CDMUSICX</h1>
        <p id="loading-txt">Sincronizando sistemas...</p>
        <button class="play-btn" id="init-btn" onclick="arrancarMotor()" disabled>Conectando...</button>
    </div>

    <div id="main-wrapper">
        <div id="map-container">
            <div id="map"></div>
            
            <div id="ui-layer" style="display: none;">
                <div class="panel-box">
                    <div class="status-row">
                        <div class="led" id="status-led"></div>
                        <span id="status-text" style="color: #fff;">SISTEMA ACTIVO</span>
                    </div>

                    <div class="stat-grid">
                        <div>
                            <div class="stat-val" id="val-buses">0</div>
                            <div class="stat-label">Unidades</div>
                        </div>
                        <div>
                            <div class="stat-val" id="val-bpm">0</div>
                            <div class="stat-label">BPM Global</div>
                        </div>
                    </div>

                    <button class="btn-3d" id="btn-toggle-3d" onclick="toggleVisualizer()">Expandir Visualizador 3D</button>

                    <div class="line-legend" id="legend-container"></div>
                </div>
            </div>
        </div>

        <div id="visualizer-container">
            <canvas id="visualizer-canvas"></canvas>
        </div>
    </div>

    <script>
        // --- 1. DATA OFICIAL ---
        const dataLineas = {
            '1': { nombre: 'Insurgentes', inst: 'Bombo Profundo', color: 'var(--l1)', notas: ['C2'], 
                   nodos: [[19.495,-99.118], [19.483,-99.123], [19.467,-99.136], [19.444,-99.153], [19.426,-99.163], [19.398,-99.172], [19.364,-99.184], [19.324,-99.186], [19.276,-99.167]] },
            '2': { nombre: 'Eje 4 Sur', inst: 'Caja rítmica (Snare)', color: 'var(--l2)', notas: ['16n'], 
                   nodos: [[19.393,-99.046], [19.395,-99.076], [19.398,-99.115], [19.401,-99.141], [19.405,-99.172], [19.401,-99.187]] },
            '3': { nombre: 'Eje 1 Poniente', inst: 'Bajo Sintético', color: 'var(--l3)', notas: ['C3', 'D3', 'F3'], 
                   nodos: [[19.533,-99.170], [19.490,-99.152], [19.450,-99.145], [19.420,-99.153], [19.395,-99.150], [19.380,-99.155]] },
            '4': { nombre: 'Centro Histórico', inst: 'Acordes Poly', color: 'var(--l4)', notas: [['C4','E4','G4'], ['A3','C4','E4']], 
                   nodos: [[19.445,-99.152], [19.435,-99.135], [19.430,-99.113], [19.435,-99.090]] },
            '5': { nombre: 'Eduardo Molina', inst: 'Pluck Melódico', color: 'var(--l5)', notas: ['C4', 'E4', 'G4', 'A4', 'C5'], 
                   nodos: [[19.492,-99.075], [19.470,-99.085], [19.448,-99.090], [19.430,-99.113], [19.405,-99.100], [19.355,-99.105], [19.300,-99.108]] },
            '6': { nombre: 'Eje 5 Norte', inst: 'Hi-Hats', color: 'var(--l6)', notas: ['32n'], 
                   nodos: [[19.504,-99.200], [19.495,-99.175], [19.485,-99.140], [19.475,-99.100], [19.460,-99.060]] },
            '7': { nombre: 'Reforma', inst: 'Atmósfera AMSynth', color: 'var(--l7)', notas: ['C5', 'D5', 'E5'], 
                   nodos: [[19.495,-99.118], [19.470,-99.125], [19.450,-99.135], [19.425,-99.175], [19.425,-99.195]] }
        };

        const COLORES_HEX = { '1': '#ff0000', '2': '#930093', '3': '#00a800', '4': '#ff8000', '5': '#0000ff', '6': '#ff00ff', '7': '#00ff00' };

        // --- 2. INICIALIZACIÓN DEL MAPA ---
        const map = L.map('map', { attributionControl: false, zoomControl: false }).setView([19.42, -99.14], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        Object.values(dataLineas).forEach(linea => {
            L.polyline(linea.nodos, { color: '#333', weight: 1.5, opacity: 0.6 }).addTo(map);
            linea.nodos.forEach(n => L.circleMarker(n, { radius: 2, color: '#222', fillColor: '#222', fillOpacity: 1, weight: 1 }).addTo(map));
        });

        const legendContainer = document.getElementById('legend-container');
        Object.keys(dataLineas).forEach(id => {
            const l = dataLineas[id];
            legendContainer.innerHTML += `<div class="line-row"><div class="line-dot" style="background: ${l.color}; color: ${l.color};"></div><div class="line-text"><strong>Línea ${id} - ${l.nombre}</strong>${l.inst}</div></div>`;
        });

        // --- 3. CONEXIÓN API Y LÓGICA DE RESPALDO ---
        let modoOffline = false;
        let unidadesData = {}; 
        let marcadoresUnidades = {};
        const API_URL = 'https://datos.cdmx.gob.mx/api/explore/v2.1/catalog/datasets/prueba_fetchdata_metrobus/records?limit=100';

        async function precargarDatos() {
            const btn = document.getElementById('init-btn');
            const txt = document.getElementById('loading-txt');
            
            try {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(API_URL)}`;
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error();
                
                txt.innerText = "Sistema preparado.";
                modoOffline = false;
            } catch (error) {
                txt.innerText = "Sistema preparado.";
                modoOffline = true;
            } finally {
                btn.innerText = "INICIAR SECUENCIA";
                btn.disabled = false;
            }
        }
        precargarDatos();

        // --- 4. MOTOR DE AUDIO (TONE.JS) ---
        let audioActivo = false;
        const synths = {};
        let analyserNode;

        async function arrancarMotor() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => { 
                document.getElementById('start-screen').style.display = 'none'; 
                document.getElementById('ui-layer').style.display = 'flex'; 
            }, 500);

            await Tone.start();
            Tone.Transport.start();
            audioActivo = true;

            analyserNode = new Tone.Analyser("fft", 256);
            Tone.getDestination().connect(analyserNode);

            const reverb = new Tone.Reverb(2.5).toDestination();
            const delay = new Tone.FeedbackDelay("8n", 0.5).connect(reverb);

            synths['1'] = new Tone.MembraneSynth().toDestination(); synths['1'].volume.value = 0;
            synths['2'] = new Tone.NoiseSynth({noise: {type: 'pink'}, envelope:{attack:0.01, decay:0.2}}).toDestination(); synths['2'].volume.value = -12;
            synths['3'] = new Tone.FMSynth({modulationIndex: 2}).connect(reverb); synths['3'].volume.value = -5;
            synths['4'] = new Tone.PolySynth(Tone.Synth).connect(reverb); synths['4'].volume.value = -10;
            synths['5'] = new Tone.Synth({oscillator: {type: 'sine'}}).connect(reverb); synths['5'].volume.value = -5;
            synths['6'] = new Tone.NoiseSynth({noise:{type:'white'}, envelope:{attack:0.005, decay:0.1}}).toDestination(); synths['6'].volume.value = -15;
            synths['7'] = new Tone.AMSynth().connect(delay); synths['7'].volume.value = -5;

            const led = document.getElementById('status-led');
            led.className = modoOffline ? 'led' : 'led online';

            iniciarVisualizador3D();
            
            if(modoOffline) {
                generarTraficoSimulado();
            } else {
                obtenerDatosAPI();
                setInterval(obtenerDatosAPI, 30000);
            }
            
            animarInterpolacion();
        }

        // --- 5. LÓGICA DE DATOS ---
        async function obtenerDatosAPI() {
            try {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(API_URL)}`;
                const res = await fetch(proxyUrl);
                if(!res.ok) throw new Error();
                const jsonText = await res.json();
                const jsonGob = JSON.parse(jsonText.contents);
                procesarVehiculos(jsonGob.results);
                document.getElementById('status-led').className = 'led online';
            } catch (e) {
                document.getElementById('status-led').className = 'led'; // Fallo temporal, vuelve a amarillo
            }
        }

        function procesarVehiculos(vehiculos) {
            if(!vehiculos) return;
            const activas = new Set();
            document.getElementById('val-buses').innerText = vehiculos.length;
            Tone.Transport.bpm.rampTo(Math.min(140, Math.max(60, 60 + (vehiculos.length * 0.4))), 2);
            document.getElementById('val-bpm').innerText = Math.floor(Tone.Transport.bpm.value);

            vehiculos.forEach(v => {
                const id = v.vehicle_id;
                const lat = v.position_latitude || (v.point ? v.point.lat : null);
                const lng = v.position_longitude || (v.point ? v.point.lon : null);
                let lStr = v.route_id ? String(v.route_id).replace(/\D/g,'') : "1";
                if(!COLORES_HEX[lStr]) lStr = "1";

                if (lat && lng && id) {
                    activas.add(id);
                    if (unidadesData[id]) {
                        const bus = unidadesData[id];
                        if(bus.targetLat !== lat || bus.targetLng !== lng) {
                            bus.startLat = bus.currentLat; bus.startLng = bus.currentLng;
                            bus.targetLat = lat; bus.targetLng = lng;
                            bus.progress = 0; bus.travelTime = 30000; bus.soundTriggered = false;
                        }
                    } else {
                        unidadesData[id] = {
                            linea: lStr,
                            startLat: lat, startLng: lng, currentLat: lat, currentLng: lng, targetLat: lat, targetLng: lng,
                            progress: 1, travelTime: 30000, soundTriggered: true
                        };
                        marcadoresUnidades[id] = L.circleMarker([lat, lng], { radius: 3, color: COLORES_HEX[lStr], fillColor: COLORES_HEX[lStr], fillOpacity: 1, weight: 1, className: 'bus-marker' }).addTo(map);
                    }
                }
            });

            for (let id in unidadesData) {
                if (!activas.has(id)) { map.removeLayer(marcadoresUnidades[id]); delete marcadoresUnidades[id]; delete unidadesData[id]; }
            }
        }

        function generarTraficoSimulado() {
            const numBuses = 65;
            document.getElementById('val-buses').innerText = numBuses;
            Tone.Transport.bpm.rampTo(Math.floor(60 + (numBuses * 0.4)), 1);
            document.getElementById('val-bpm').innerText = Math.floor(Tone.Transport.bpm.value);

            const keysLineas = Object.keys(dataLineas);
            for(let i=0; i<numBuses; i++) {
                const lId = keysLineas[Math.floor(Math.random() * keysLineas.length)];
                const nodos = dataLineas[lId].nodos;
                const idx = Math.floor(Math.random() * (nodos.length - 1));
                const id = `sim_${i}`;
                
                unidadesData[id] = {
                    linea: lId,
                    nodosArr: nodos, currentIdx: idx, targetIdx: idx + 1, dir: 1,
                    startLat: nodos[idx][0], startLng: nodos[idx][1], currentLat: nodos[idx][0], currentLng: nodos[idx][1],
                    targetLat: nodos[idx+1][0], targetLng: nodos[idx+1][1],
                    progress: Math.random(), travelTime: Math.random() * 20000 + 10000, soundTriggered: false
                };
                marcadoresUnidades[id] = L.circleMarker([nodos[idx][0], nodos[idx][1]], { radius: 3, color: COLORES_HEX[lId], fillColor: COLORES_HEX[lId], fillOpacity: 1, weight: 1, className: 'bus-marker' }).addTo(map);
            }
        }

        // --- 6. MOTOR DE RENDERIZADO ---
        let lastTime = performance.now();
        const notasEscala = ["C4", "D4", "F4", "G4", "A4"];

        function animarInterpolacion() {
            const currentTime = performance.now();
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            for (let id in unidadesData) {
                const bus = unidadesData[id];
                const marker = marcadoresUnidades[id];

                if (bus.progress < 1) {
                    bus.progress += deltaTime / bus.travelTime;
                    if (bus.progress >= 1) bus.progress = 1;

                    bus.currentLat = bus.startLat + (bus.targetLat - bus.startLat) * bus.progress;
                    bus.currentLng = bus.startLng + (bus.targetLng - bus.startLng) * bus.progress;
                    marker.setLatLng([bus.currentLat, bus.currentLng]);

                    if (bus.progress === 1 && !bus.soundTriggered && audioActivo) {
                        bus.soundTriggered = true;
                        
                        try {
                            const t = Tone.now() + (Math.random() * 0.05);
                            const l = bus.linea;
                            if(l === '1') synths[l].triggerAttackRelease("C2", "8n", t);
                            else if(l === '2') synths[l].triggerAttackRelease("16n", t);
                            else if(l === '3') synths[l].triggerAttackRelease("C3", "8n", t);
                            else if(l === '4') synths[l].triggerAttackRelease(["C4", "E4", "G4"], "4n", t);
                            else if(l === '6') synths[l].triggerAttackRelease("32n", t);
                            else if(l === '7') synths[l].triggerAttackRelease("C5", "2n", t);
                            else synths['5'].triggerAttackRelease(notasEscala[Math.floor(Math.random()*notasEscala.length)], "8n", t);
                            
                            const origColor = COLORES_HEX[l];
                            marker.setStyle({ fillColor: '#ffffff', color: '#ffffff', radius: 6 });
                            setTimeout(() => { if(marcadoresUnidades[id]) marker.setStyle({ fillColor: origColor, color: origColor, radius: 3 }); }, 200);
                        } catch (e) {}

                        if(modoOffline && bus.nodosArr) {
                            bus.currentIdx = bus.targetIdx;
                            bus.targetIdx += bus.dir;
                            if(bus.targetIdx >= bus.nodosArr.length || bus.targetIdx < 0) {
                                bus.dir *= -1;
                                bus.targetIdx = bus.currentIdx + bus.dir;
                            }
                            bus.startLat = bus.currentLat; bus.startLng = bus.currentLng;
                            bus.targetLat = bus.nodosArr[bus.targetIdx][0]; bus.targetLng = bus.nodosArr[bus.targetIdx][1];
                            bus.progress = 0; bus.soundTriggered = false;
                        }
                    }
                }
            }
            requestAnimationFrame(animarInterpolacion);
        }

        // --- 7. VISUALIZADOR 3D ---
        let is3DActive = false;
        let renderer3D, scene3D, camera3D, organicMesh3D, organicBaseVerts;

        function toggleVisualizer() {
            is3DActive = !is3DActive;
            const btn = document.getElementById('btn-toggle-3d');
            
            if(is3DActive) {
                document.body.classList.add('split-mode');
                btn.innerText = "Cerrar Visualizador 3D";
            } else {
                document.body.classList.remove('split-mode');
                btn.innerText = "Expandir Visualizador 3D";
            }
            
            setTimeout(() => {
                map.invalidateSize();
                if(renderer3D) {
                    const canvas = document.getElementById('visualizer-canvas');
                    renderer3D.setSize(canvas.parentElement.clientWidth, canvas.parentElement.clientHeight);
                    camera3D.aspect = canvas.parentElement.clientWidth / canvas.parentElement.clientHeight;
                    camera3D.updateProjectionMatrix();
                }
            }, 700);
        }

        function iniciarVisualizador3D() {
            const canvas = document.getElementById('visualizer-canvas');
            renderer3D = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            
            const w = document.body.clientWidth * 0.6; 
            const h = document.body.clientHeight;
            renderer3D.setSize(w, h);

            scene3D = new THREE.Scene();
            camera3D = new THREE.PerspectiveCamera(60, w / h, 0.1, 1000);
            camera3D.position.z = 10; 

            scene3D.add(new THREE.AmbientLight(0x222222));
            const mainLight = new THREE.PointLight(0x00f0ff, 2, 50); mainLight.position.set(5, 5, 5); scene3D.add(mainLight);

            const organicGeo = new THREE.IcosahedronGeometry(3.5, 40);
            organicBaseVerts = [];
            const posAttr = organicGeo.attributes.position;
            for(let i=0; i < posAttr.count; i++) { organicBaseVerts.push(new THREE.Vector3(posAttr.getX(i), posAttr.getY(i), posAttr.getZ(i))); }
            
            const organicMat = new THREE.MeshStandardMaterial({ color: 0x111111, emissive: 0x00f0ff, emissiveIntensity: 0.2, wireframe: true, roughness: 0.2 });
            organicMesh3D = new THREE.Mesh(organicGeo, organicMat);
            scene3D.add(organicMesh3D);

            animar3D();
        }

        function animar3D() {
            requestAnimationFrame(animar3D);
            if(!is3DActive || !analyserNode) return;

            const audioData = analyserNode.getValue();
            let sum = 0;
            const freqData = new Uint8Array(256);
            
            for(let i=0; i<audioData.length; i++) {
                let val = (audioData[i] + 100) * 2.55; 
                val = Math.max(0, Math.min(255, val));
                freqData[i] = val;
                sum += val;
            }
            let avgNorm = (sum / 256) / 255;

            organicMesh3D.rotation.y += 0.003;
            organicMesh3D.rotation.z = avgNorm * 0.1;
            
            const pos = organicMesh3D.geometry.attributes.position;
            let time = performance.now() * 0.001;

            for(let i=0; i < organicBaseVerts.length; i++) {
                let freq = freqData[i % 256];
                let base = organicBaseVerts[i];
                let asymNoise = Math.sin(base.x * 2.0 + time) * Math.cos(base.y * 2.0 + time);
                
                let displacement = (freq / 255.0) * 1.5 + (asymNoise * 0.5 * (freq/255.0));
                let dir = base.clone().normalize();
                let newPos = base.clone().add(dir.multiplyScalar(displacement));
                
                pos.setXYZ(i, newPos.x, newPos.y, newPos.z);
            }
            
            pos.needsUpdate = true;
            organicMesh3D.material.emissiveIntensity = 0.1 + (avgNorm * 1.5);

            renderer3D.render(scene3D, camera3D);
        }
    </script>
</body>
</html>
