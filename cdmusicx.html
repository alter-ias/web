<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDMusicX - Mapa Sonoro</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        :root {
            --bg: #111111;
            --panel: #1a1a1a;
            --text: #e0e0e0;
            --l1: #ff0000; --l2: #930093; --l3: #00a800; 
            --l4: #ff8000; --l5: #0000ff; --l6: #ff00ff; --l7: #00ff00;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg); color: var(--text); overflow: hidden;
        }

        #map { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; background: var(--bg); }
        .leaflet-control-zoom, .leaflet-control-attribution { display: none; }
        .leaflet-container { background: var(--bg) !important; }

        /* Pantalla de Inicio para desbloquear AudioContext */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(17, 17, 17, 0.95); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }

        #start-screen h1 { font-size: 3rem; margin-bottom: 10px; letter-spacing: 3px; }
        #start-screen p { color: #888; margin-bottom: 40px; font-size: 1.2rem; }
        
        button.play-btn {
            background: transparent; color: #fff; border: 2px solid #fff;
            padding: 15px 40px; font-size: 1.5rem; border-radius: 30px;
            cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;
        }
        button.play-btn:hover { background: #fff; color: #000; box-shadow: 0 0 20px rgba(255,255,255,0.5); }

        /* Panel Lateral estilo Train Jazz */
        #sidebar {
            position: absolute; right: 30px; top: 30px; width: 320px;
            background: rgba(26, 26, 26, 0.85); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 25px; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-height: 80vh; overflow-y: auto;
        }

        #stats {
            margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #333;
            display: flex; justify-content: space-between;
        }
        .stat-box { text-align: center; }
        .stat-val { font-size: 2rem; font-weight: bold; color: #fff; }
        .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        .line-item {
            display: flex; align-items: center; margin-bottom: 15px;
            padding: 10px; border-radius: 8px; transition: background 0.2s;
        }
        .line-item:hover { background: rgba(255,255,255,0.05); }
        
        .line-dot {
            width: 35px; height: 35px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; font-size: 0.9rem; margin-right: 15px;
            color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }

        .line-info h3 { margin: 0 0 4px 0; font-size: 1rem; color: #fff; }
        .line-info p { margin: 0; font-size: 0.8rem; color: #aaa; font-style: italic; }

        /* Animación de destello al sonar */
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 var(--pulse-color); }
            70% { box-shadow: 0 0 0 15px rgba(0,0,0,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); }
        }
        .flash-marker { animation: pulse-glow 0.5s ease-out; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>CDMUSICX</h1>
        <p>El ritmo del Metrobús en tiempo real</p>
        <button class="play-btn" onclick="iniciarExperiencia()">Sintonizar la Ciudad</button>
    </div>

    <div id="map"></div>

    <div id="sidebar" style="display: none;">
        <div id="stats">
            <div class="stat-box">
                <div class="stat-val" id="bus-count">0</div>
                <div class="stat-label">Unidades</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="bpm-count">0</div>
                <div class="stat-label">BPM</div>
            </div>
        </div>

        <div id="legend-container"></div>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN DEL MAPA ---
        const map = L.map('map', { attributionControl: false, zoomControl: false }).setView([19.41, -99.14], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        // --- 2. BASE DE DATOS LOCAL (FALLBACK 100% SEGURO) ---
        // Si el gobierno falla, estas coordenadas trazan las 7 líneas reales con precisión
        const dataLineas = {
            'L1': { id: 'L1', nombre: 'Insurgentes', inst: 'Bombo Profundo', color: 'var(--l1)', notas: ['C2'], 
                    nodos: [[19.495,-99.118], [19.483,-99.123], [19.467,-99.136], [19.444,-99.153], [19.426,-99.163], [19.398,-99.172], [19.364,-99.184], [19.324,-99.186], [19.276,-99.167]] },
            'L2': { id: 'L2', nombre: 'Eje 4 Sur', inst: 'Caja rítmica (Snare)', color: 'var(--l2)', notas: ['16n'], 
                    nodos: [[19.393,-99.046], [19.395,-99.076], [19.398,-99.115], [19.401,-99.141], [19.405,-99.172], [19.401,-99.187]] },
            'L3': { id: 'L3', nombre: 'Eje 1 Poniente', inst: 'Bajo Sintético', color: 'var(--l3)', notas: ['C3', 'D3', 'F3'], 
                    nodos: [[19.533,-99.170], [19.490,-99.152], [19.450,-99.145], [19.420,-99.153], [19.395,-99.150], [19.380,-99.155]] },
            'L4': { id: 'L4', nombre: 'Centro Histórico', inst: 'Acordes Clásicos', color: 'var(--l4)', notas: [['C4','E4','G4'], ['A3','C4','E4']], 
                    nodos: [[19.445,-99.152], [19.435,-99.135], [19.430,-99.113], [19.435,-99.090]] },
            'L5': { id: 'L5', nombre: 'Eduardo Molina', inst: 'Pluck Melódico', color: 'var(--l5)', notas: ['C4', 'E4', 'G4', 'A4', 'C5'], 
                    nodos: [[19.492,-99.075], [19.470,-99.085], [19.448,-99.090], [19.430,-99.113], [19.405,-99.100], [19.355,-99.105], [19.300,-99.108]] },
            'L6': { id: 'L6', nombre: 'Eje 5 Norte', inst: 'Platillos (Hi-hat)', color: 'var(--l6)', notas: ['32n'], 
                    nodos: [[19.504,-99.200], [19.495,-99.175], [19.485,-99.140], [19.475,-99.100], [19.460,-99.060]] },
            'L7': { id: 'L7', nombre: 'Paseo de la Reforma', inst: 'Atmósfera Ecos', color: 'var(--l7)', notas: ['C5', 'D5', 'E5'], 
                    nodos: [[19.495,-99.118], [19.470,-99.125], [19.450,-99.135], [19.425,-99.175], [19.425,-99.195]] }
        };

        // Dibujar las líneas grises tenues en el mapa (como el video)
        Object.values(dataLineas).forEach(linea => {
            L.polyline(linea.nodos, { color: '#555', weight: 3, opacity: 0.5 }).addTo(map);
            
            // Dibujar las "estaciones" (nodos) como puntitos
            linea.nodos.forEach(nodo => {
                L.circleMarker(nodo, { radius: 2, color: '#333', fillColor: '#333', fillOpacity: 1 }).addTo(map);
            });
        });

        // Construir la leyenda UI
        const legendContainer = document.getElementById('legend-container');
        Object.values(dataLineas).forEach(linea => {
            legendContainer.innerHTML += `
                <div class="line-item">
                    <div class="line-dot" style="background-color: ${linea.color}">${linea.id}</div>
                    <div class="line-info">
                        <h3>${linea.nombre}</h3>
                        <p>${linea.inst}</p>
                    </div>
                </div>
            `;
        });

        // --- 3. MOTOR DE AUDIO (TONE.JS) ---
        let audioIniciado = false;
        const synths = {};

        async function iniciarExperiencia() {
            // Eliminar pantalla de bloqueo
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('sidebar').style.display = 'block';
            }, 500);

            // Iniciar Web Audio API y Tone.js legalmente
            await Tone.start();
            Tone.Transport.start();
            audioIniciado = true;

            const reverb = new Tone.Reverb(2).toDestination();
            const delay = new Tone.FeedbackDelay("8n", 0.4).connect(reverb);

            // Configurar instrumentos precisos
            synths['L1'] = new Tone.MembraneSynth().toDestination(); 
            synths['L1'].volume.value = 2;

            synths['L2'] = new Tone.NoiseSynth({noise: {type: 'pink'}}).toDestination(); 
            synths['L2'].volume.value = -10;

            synths['L3'] = new Tone.FMSynth({modulationIndex: 2}).toDestination(); 
            synths['L3'].volume.value = -5;

            synths['L4'] = new Tone.PolySynth(Tone.Synth).connect(reverb); 
            synths['L4'].volume.value = -12;

            synths['L5'] = new Tone.Synth({oscillator: {type: 'sine'}}).connect(reverb); 
            synths['L5'].volume.value = -8;

            synths['L6'] = new Tone.MetalSynth({resonance: 8000}).toDestination(); 
            synths['L6'].volume.value = -15;

            synths['L7'] = new Tone.AMSynth().connect(delay); 
            synths['L7'].volume.value = -8;

            iniciarTrafico();
        }

        // --- 4. MOTOR FÍSICO Y LOGICA MUSICAL (CORREGIDO) ---
        let autobuses = [];

        function iniciarTrafico() {
            const numAutobuses = 60; // Cantidad base
            document.getElementById('bus-count').innerText = numAutobuses;
            
            // BPM basado en la cantidad de autobuses
            const bpm = Math.floor(80 + (numAutobuses * 0.5));
            Tone.Transport.bpm.rampTo(bpm, 1);
            document.getElementById('bpm-count').innerText = bpm;

            const idsLineas = Object.keys(dataLineas);

            // Crear flota
            for(let i=0; i<numAutobuses; i++) {
                const lineaAleatoria = idsLineas[Math.floor(Math.random() * idsLineas.length)];
                const lineaDatos = dataLineas[lineaAleatoria];
                
                // Empezar en un nodo aleatorio de la ruta
                const nodoInicialIndex = Math.floor(Math.random() * (lineaDatos.nodos.length - 1));

                autobuses.push({
                    id_DOM: `bus_${i}`, // Para aplicar CSS
                    linea: lineaDatos,
                    nodoActual: nodoInicialIndex,
                    nodoDestino: nodoInicialIndex + 1,
                    progresoEntreNodos: 0,
                    velocidad: (Math.random() * 0.01) + 0.005, // Velocidad a la que viaja
                    direccion: 1, // 1 = adelante, -1 = reversa
                    marker: L.circleMarker(lineaDatos.nodos[nodoInicialIndex], { 
                        radius: 4, 
                        color: lineaDatos.color, 
                        fillColor: lineaDatos.color, 
                        fillOpacity: 1, 
                        weight: 2 
                    }).addTo(map)
                });
            }

            animarFlota();
        }

        function animarFlota() {
            autobuses.forEach(bus => {
                const ruta = bus.linea.nodos;
                
                // Avanzar hacia el siguiente nodo
                bus.progresoEntreNodos += bus.velocidad;

                // ¿Llegó al nodo destino (Estación)?
                if (bus.progresoEntreNodos >= 1) {
                    bus.progresoEntreNodos = 0;
                    bus.nodoActual = bus.nodoDestino;
                    bus.nodoDestino += bus.direccion;

                    // Si llega a la terminal (inicio o fin de la ruta), da la vuelta
                    if (bus.nodoDestino >= ruta.length || bus.nodoDestino < 0) {
                        bus.direccion *= -1;
                        bus.nodoDestino = bus.nodoActual + bus.direccion;
                    }

                    // --- GATILLO MUSICAL: Llegó a la estación ---
                    if (audioIniciado) {
                        const notaArr = bus.linea.notas;
                        const notaAleatoria = notaArr[Math.floor(Math.random() * notaArr.length)];
                        
                        // Pequeño jitter de tiempo para que los acordes no saturen si chocan 2 buses
                        const tiempo = Tone.now() + (Math.random() * 0.05);
                        
                        // Tocar instrumento
                        synths[bus.linea.id].triggerAttackRelease(notaAleatoria, "8n", tiempo);

                        // Efecto visual: Destello (Glow)
                        const radioOriginal = bus.marker.options.radius;
                        bus.marker.setRadius(12); // Crece de golpe
                        
                        // Vuelve a su tamaño suavemente
                        setTimeout(() => {
                            if(bus.marker) bus.marker.setRadius(radioOriginal);
                        }, 150);
                    }
                }

                // Interpolar coordenada exacta entre nodoActual y nodoDestino
                const p1 = ruta[bus.nodoActual];
                const p2 = ruta[bus.nodoDestino];
                
                const lat = p1[0] + (p2[0] - p1[0]) * bus.progresoEntreNodos;
                const lng = p1[1] + (p2[1] - p1[1]) * bus.progresoEntreNodos;
                
                bus.marker.setLatLng([lat, lng]);
            });

            requestAnimationFrame(animarFlota); // Animación fluida a 60 FPS
        }
    </script>
</body>
</html>
