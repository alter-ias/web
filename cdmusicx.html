<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDMusicX - En Vivo</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        :root {
            --bg-dark: #111; --panel-bg: rgba(20, 20, 20, 0.95);
            --text-main: #eee; --text-muted: #888;
            --l1: #ff0055; --l2: #930093; --l3: #00a800; --l4: #ff8000;
            --l5: #0000ff; --l6: #ff00ff; --l7: #00ff00;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg-dark); color: var(--text-main); overflow: hidden; }

        /* --- MAPA --- */
        #map-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #map { width: 100%; height: 100%; background: var(--bg-dark); }
        .leaflet-control-zoom, .leaflet-control-attribution { display: none; }
        .leaflet-container { background: var(--bg-dark) !important; }

        /* --- PANTALLA DE CARGA (Estilo Organillero) --- */
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(17, 17, 17, 0.98); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s ease; backdrop-filter: blur(10px);
        }
        
        .title-box { text-align: center; margin-bottom: 50px; }
        .title-box h1 { font-size: 3rem; margin: 0 0 10px 0; letter-spacing: 5px; font-weight: 800; }
        .title-box p { color: var(--text-muted); margin: 0; font-size: 1.1rem; letter-spacing: 1px; }

        .loader-container { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 300px; }
        #status-msg { font-size: 0.9rem; color: #aaa; text-transform: uppercase; letter-spacing: 2px; }
        
        #btn-start {
            background: transparent; color: #555; border: 2px solid #555;
            padding: 12px 40px; font-size: 1.2rem; border-radius: 30px;
            cursor: not-allowed; text-transform: uppercase; font-weight: bold; transition: all 0.3s;
        }
        #btn-start.ready {
            color: #fff; border-color: #fff; cursor: pointer; box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }
        #btn-start.ready:hover { background: #fff; color: #000; }

        /* --- PANEL LATERAL --- */
        #sidebar {
            position: absolute; right: 30px; top: 30px; width: 320px;
            background: var(--panel-bg); border: 1px solid #333; border-radius: 12px;
            padding: 25px; z-index: 1000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        .header h2 { margin: 0; font-size: 1.2rem; letter-spacing: 2px; }
        .live-badge { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: #00ffcc; font-weight: bold; }
        .live-dot { width: 8px; height: 8px; background: #00ffcc; border-radius: 50%; box-shadow: 0 0 8px #00ffcc; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-box { text-align: left; }
        .stat-val { font-size: 2.2rem; font-weight: bold; color: #fff; line-height: 1; }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }

        .legend-list { display: flex; flex-direction: column; gap: 15px; }
        .legend-item { display: flex; align-items: center; gap: 15px; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; box-shadow: 0 0 8px currentColor; }
        .legend-text { display: flex; flex-direction: column; }
        .legend-text strong { font-size: 0.95rem; color: #fff; }
        .legend-text span { font-size: 0.8rem; color: var(--text-muted); }

        /* Animación suave para los autobuses */
        .bus-marker { transition: r 0.2s ease; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="title-box">
            <h1>CDMUSICX</h1>
            <p>Pieza sonora para siete líneas</p>
        </div>
        <div class="loader-container">
            <div id="status-msg">Ubicando autobuses en el mapa...</div>
            <button id="btn-start" disabled>Cargando</button>
        </div>
    </div>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <div id="sidebar">
        <div class="header">
            <h2>CDMUSICX</h2>
            <div class="live-badge"><div class="live-dot"></div> EN VIVO</div>
        </div>
        
        <div class="stat-grid">
            <div class="stat-box"><div class="stat-val" id="ui-buses">0</div><div class="stat-label">Unidades</div></div>
            <div class="stat-box"><div class="stat-val" id="ui-bpm">0</div><div class="stat-label">BPM Global</div></div>
        </div>

        <div class="legend-list" id="leyenda"></div>
    </div>

    <script>
        // ==========================================
        // 1. DIBUJO DEL MAPA Y LÍNEAS (SIN DEPENDER DE LA API)
        // ==========================================
        const map = L.map('map', { attributionControl: false, zoomControl: false }).setView([19.41, -99.14], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        const configLineas = {
            '1': { nombre: 'Insurgentes', inst: 'Bombo (Kick)', color: 'var(--l1)', hex: '#ff0055', notas: ['C2'] },
            '2': { nombre: 'Eje 4 Sur', inst: 'Caja (Snare)', color: 'var(--l2)', hex: '#930093', notas: ['16n'] },
            '3': { nombre: 'Eje 1 Poniente', inst: 'Bajo Sintético', color: 'var(--l3)', hex: '#00a800', notas: ['C3', 'D3'] },
            '4': { nombre: 'Buenavista', inst: 'Acordes Clásicos', color: 'var(--l4)', hex: '#ff8000', notas: [['C4','E4','G4']] },
            '5': { nombre: 'Eje 3 Oriente', inst: 'Pluck Melódico', color: 'var(--l5)', hex: '#0000ff', notas: ['E4', 'G4', 'A4'] },
            '6': { nombre: 'Villa de Aragón', inst: 'Hi-Hats', color: 'var(--l6)', hex: '#ff00ff', notas: ['32n'] },
            '7': { nombre: 'Reforma', inst: 'Atmósfera', color: 'var(--l7)', hex: '#00ff00', notas: ['C5'] }
        };

        // TRAZOS DUROS: Garantiza que las líneas se vean siempre, falle o no la API
        const trazosBase = {
            '1': [[19.495,-99.118], [19.467,-99.136], [19.426,-99.163], [19.364,-99.184], [19.276,-99.167]],
            '2': [[19.393,-99.046], [19.398,-99.115], [19.405,-99.172], [19.401,-99.187]],
            '3': [[19.533,-99.170], [19.450,-99.145], [19.380,-99.155]],
            '4': [[19.445,-99.152], [19.435,-99.135], [19.430,-99.090]],
            '5': [[19.492,-99.075], [19.448,-99.090], [19.405,-99.100], [19.300,-99.108]],
            '6': [[19.504,-99.200], [19.485,-99.140], [19.460,-99.060]],
            '7': [[19.495,-99.118], [19.450,-99.135], [19.425,-99.195]]
        };

        // Dibujar las líneas en el mapa
        Object.keys(trazosBase).forEach(key => {
            L.polyline(trazosBase[key], { color: '#333', weight: 3, opacity: 0.6 }).addTo(map);
        });

        // Construir Leyenda UI
        const leyendaEl = document.getElementById('leyenda');
        Object.keys(configLineas).forEach(k => {
            const l = configLineas[k];
            leyendaEl.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background: ${l.color}; color: ${l.color};"></div><div class="legend-text"><strong>${l.nombre}</strong><span>${l.inst}</span></div></div>`;
        });


        // ==========================================
        // 2. GESTIÓN DE ESTADO Y DATOS (API SEMOVI)
        // ==========================================
        let datosListos = false;
        let flotaData = {};
        let marcadores = {};
        
        // Proxy para evadir CORS en GH Pages
        const API_URL = 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://datos.cdmx.gob.mx/api/explore/v2.1/catalog/datasets/prueba_fetchdata_metrobus/records?limit=100');

        async function preCargarDatos() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Error en red");
                
                const dataText = await response.json();
                const jsonGobierno = JSON.parse(dataText.contents);
                
                procesarUbicaciones(jsonGobierno.results);
                
                // Habilitar Botón
                datosListos = true;
                const btn = document.getElementById('btn-start');
                document.getElementById('status-msg').innerText = "Sistema listo.";
                btn.innerText = "Entrar";
                btn.classList.add('ready');
                btn.disabled = false;

            } catch (error) {
                console.error("Fallo API:", error);
                document.getElementById('status-msg').innerText = "Usando caché de respaldo...";
                // Fallback de prueba para que no se rompa la app
                setTimeout(habilitarFallback, 1500);
            }
            
            // Refrescar datos cada 30 segundos silenciosamente
            setTimeout(preCargarDatos, 30000);
        }

        function habilitarFallback() {
            datosListos = true;
            const btn = document.getElementById('btn-start');
            btn.innerText = "Entrar (Modo Offline)";
            btn.classList.add('ready');
            btn.disabled = false;
        }

        function procesarUbicaciones(busesAPI) {
            if(!busesAPI) return;
            const activas = new Set();
            document.getElementById('ui-buses').innerText = busesAPI.length;

            busesAPI.forEach(vehiculo => {
                const id = vehiculo.vehicle_id;
                const lat = vehiculo.position_latitude || (vehiculo.point ? vehiculo.point.lat : null);
                const lng = vehiculo.position_longitude || (vehiculo.point ? vehiculo.point.lon : null);
                let lID = vehiculo.route_id ? String(vehiculo.route_id).replace(/\D/g,'') : "1";
                if(!configLineas[lID]) lID = "1";

                if (lat && lng && id) {
                    activas.add(id);
                    if (flotaData[id]) {
                        const b = flotaData[id];
                        // Solo actualiza si se movió realmente
                        if(b.targetLat !== lat || b.targetLng !== lng) {
                            b.startLat = b.currentLat; b.startLng = b.currentLng;
                            b.targetLat = lat; b.targetLng = lng;
                            b.progress = 0; b.trigger = false;
                        }
                    } else {
                        // Nace la unidad
                        flotaData[id] = { linea: lID, startLat: lat, startLng: lng, currentLat: lat, currentLng: lng, targetLat: lat, targetLng: lng, progress: 1, trigger: true };
                        marcadores[id] = L.circleMarker([lat, lng], { radius: 4, color: configLineas[lID].hex, fillColor: configLineas[lID].hex, fillOpacity: 1, weight: 1 }).addTo(map);
                    }
                }
            });

            // Limpieza
            for (let id in flotaData) {
                if (!activas.has(id)) { map.removeLayer(marcadores[id]); delete marcadores[id]; delete flotaData[id]; }
            }
        }

        // Iniciar la pre-carga inmediatamente al abrir la página
        preCargarDatos();


        // ==========================================
        // 3. MOTOR DE AUDIO (TONE.JS)
        // ==========================================
        let audioIniciado = false;
        let synths = {};

        // Esta función SOLO se ejecuta cuando el usuario hace clic en "Entrar"
        document.getElementById('btn-start').addEventListener('click', async () => {
            if(!datosListos) return;

            // Transición de UI
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => { 
                document.getElementById('loading-screen').style.display = 'none'; 
                document.getElementById('sidebar').style.display = 'block'; 
            }, 800);

            // Inicializar Tone.js legalmente
            await Tone.start();
            Tone.Transport.start();
            audioIniciado = true;

            const reverb = new Tone.Reverb(2.5).toDestination();
            
            // Instrumentos (PolySynths para evitar el error de tiempos solapados)
            synths['1'] = new Tone.MembraneSynth().toDestination(); synths['1'].volume.value = 0;
            synths['2'] = new Tone.NoiseSynth({noise: {type: 'pink'}, envelope: {attack:0.01, decay:0.1}}).toDestination(); synths['2'].volume.value = -12;
            synths['3'] = new Tone.PolySynth(Tone.FMSynth).connect(reverb); synths['3'].volume.value = -8;
            synths['4'] = new Tone.PolySynth(Tone.Synth).connect(reverb); synths['4'].volume.value = -10;
            synths['5'] = new Tone.PolySynth(Tone.Synth).connect(reverb); synths['5'].volume.value = -8;
            synths['6'] = new Tone.NoiseSynth({noise:{type:'white'}, envelope:{attack:0.005, decay:0.05}}).toDestination(); synths['6'].volume.value = -18;
            synths['7'] = new Tone.PolySynth(Tone.AMSynth).connect(reverb); synths['7'].volume.value = -8;

            // Arrancar el motor de animación visual
            animarMapa();
        });


        // ==========================================
        // 4. ANIMACIÓN Y GATILLO MUSICAL (LERP)
        // ==========================================
        let lastTime = performance.now();
        const TIEMPO_VIAJE = 30000; // 30 segundos de interpolación para que coincida con la API

        function animarMapa() {
            const currentTime = performance.now();
            const delta = currentTime - lastTime;
            lastTime = currentTime;

            let busesActivos = 0;

            for (let id in flotaData) {
                busesActivos++;
                const b = flotaData[id];
                const m = marcadores[id];

                if (b.progress < 1) {
                    b.progress += delta / TIEMPO_VIAJE;
                    if (b.progress >= 1) b.progress = 1;

                    // Interpolación lineal matemática (movimiento suave)
                    b.currentLat = b.startLat + (b.targetLat - b.startLat) * b.progress;
                    b.currentLng = b.startLng + (b.targetLng - b.startLng) * b.progress;
                    m.setLatLng([b.currentLat, b.currentLng]);

                    // GATILLO MUSICAL: Llegó a su destino
                    if (b.progress === 1 && !b.trigger && audioIniciado) {
                        b.trigger = true;
                        try {
                            const conf = configLineas[b.linea];
                            const nota = conf.notas[Math.floor(Math.random() * conf.notas.length)];
                            
                            // Disparar sonido
                            synths[b.linea].triggerAttackRelease(nota, "8n", Tone.now());
                            
                            // Efecto visual (latido)
                            m.setStyle({ fillColor: '#ffffff', radius: 8 });
                            setTimeout(() => { if(marcadores[id]) m.setStyle({ fillColor: conf.hex, radius: 4 }); }, 150);
                        } catch (e) {
                            // Silenciar errores de colisión de Tone.js
                        }
                    }
                }
            }

            // Ajuste dinámico de BPM
            if (busesActivos > 0) {
                const bpm = Math.min(140, Math.max(60, 60 + (busesActivos * 0.5)));
                Tone.Transport.bpm.rampTo(bpm, 2);
                document.getElementById('ui-bpm').innerText = Math.floor(bpm);
            }

            requestAnimationFrame(animarMapa);
        }
    </script>
</body>
</html>
