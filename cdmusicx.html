<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDMusicX - El Sonido de la Ciudad</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --bg: #0a0a0a; --text: #e0e0e0; --ui-accent: #00f0ff;
            --l1: #ff0000; --l2: #930093; --l3: #00a800; 
            --l4: #ff8000; --l5: #0000ff; --l6: #ff00ff; --l7: #00ff00;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg); color: var(--text); overflow: hidden;
        }

        /* --- SISTEMA DE PANTALLA DIVIDIDA --- */
        #main-wrapper { display: flex; width: 100vw; height: 100vh; }

        #map-container {
            width: 100vw; height: 100vh; position: relative;
            transition: width 0.7s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 2; box-shadow: 5px 0 20px rgba(0,0,0,0.8);
        }
        #map { width: 100%; height: 100%; background: var(--bg); }
        .leaflet-control-zoom, .leaflet-control-attribution { display: none; }
        .leaflet-container { background: var(--bg) !important; }

        #visualizer-container {
            width: 60vw; height: 100vh; position: absolute; right: 0; top: 0;
            opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease-in-out 0.3s;
            background: #050505; z-index: 1; display: flex; justify-content: center; align-items: center;
        }
        #visualizer-canvas { width: 100%; height: 100%; filter: contrast(1.2) drop-shadow(0 0 20px rgba(0, 240, 255, 0.2)); }

        body.split-mode #map-container { width: 40vw; }
        body.split-mode #visualizer-container { opacity: 1; pointer-events: auto; cursor: grab; }
        body.split-mode #visualizer-container:active { cursor: grabbing; }

        /* --- INTERFAZ DE USUARIO --- */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(10, 10, 10, 0.95); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(5px); transition: opacity 0.5s;
        }
        #start-screen h1 { font-size: 3.5rem; margin-bottom: 5px; letter-spacing: 4px; font-weight: 800; color: #fff; text-shadow: 0 0 20px var(--ui-accent); }
        #start-screen p { color: #888; margin-bottom: 40px; font-size: 1.2rem; letter-spacing: 1px; }
        
        button.play-btn {
            background: transparent; color: #fff; border: 2px solid #fff;
            padding: 15px 40px; font-size: 1.5rem; border-radius: 30px;
            cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;
        }
        button.play-btn:hover { background: #fff; color: #000; box-shadow: 0 0 20px rgba(255,255,255,0.5); }

        #sidebar {
            position: absolute; right: 30px; top: 30px; width: 320px;
            background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 25px; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #333;
            max-height: 85vh; overflow-y: auto; transition: right 0.7s, left 0.7s;
        }
        
        body.split-mode #sidebar { right: auto; left: 30px; width: 280px; }

        .header-title { font-size: 1.5rem; font-weight: 800; margin: 0 0 15px 0; color: #fff; letter-spacing: 2px; }

        #stats { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #333; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-box { text-align: left; }
        .stat-val { font-size: 2rem; font-weight: bold; color: #fff; }
        .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        .btn-3d {
            background: rgba(0, 240, 255, 0.1); border: 1px solid var(--ui-accent); color: var(--ui-accent);
            width: 100%; padding: 12px; border-radius: 6px; cursor: pointer; text-transform: uppercase;
            font-weight: bold; letter-spacing: 1px; transition: 0.3s; margin-bottom: 20px;
        }
        .btn-3d:hover { background: var(--ui-accent); color: #000; box-shadow: 0 0 15px var(--ui-accent); }

        .line-legend { font-size: 0.85rem; display: flex; flex-direction: column; gap: 12px; }
        .line-row { display: flex; align-items: center; gap: 12px; }
        .line-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 5px currentColor; }
        .line-text { color: #ccc; }
        .line-text strong { color: #fff; display: block; margin-bottom: 2px; }

        .bus-marker { transition: r 0.3s ease-out; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>CDMUSICX</h1>
        <p>El ritmo de la ciudad en tiempo real</p>
        <button class="play-btn" onclick="iniciarSistema()">Sintonizar</button>
    </div>

    <div id="main-wrapper">
        <div id="map-container">
            <div id="map"></div>
            
            <div id="sidebar" style="display: none;">
                <h2 class="header-title">CDMUSICX</h2>
                
                <div id="stats">
                    <div class="stat-box"><div class="stat-val" id="val-buses">0</div><div class="stat-label">Unidades</div></div>
                    <div class="stat-box"><div class="stat-val" id="val-bpm">0</div><div class="stat-label">BPM Global</div></div>
                </div>

                <button class="btn-3d" id="btn-toggle-3d" onclick="toggleVisualizer()">Activar Holografía</button>

                <div class="line-legend" id="legend-container">
                    </div>
            </div>
        </div>

        <div id="visualizer-container">
            <canvas id="visualizer-canvas"></canvas>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN DEL MAPA ---
        const map = L.map('map', { attributionControl: false, zoomControl: false }).setView([19.4326, -99.1332], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        const dataLineas = {
            'L1': { id: 'L1', nombre: 'Línea 1', inst: 'Bombo (Kick)', color: 'var(--l1)', notas: ['C2'] },
            'L2': { id: 'L2', nombre: 'Línea 2', inst: 'Percusión (Snare)', color: 'var(--l2)', notas: ['16n'] },
            'L3': { id: 'L3', nombre: 'Línea 3', inst: 'Bajo Sintético', color: 'var(--l3)', notas: ['C3', 'D3', 'F3'] },
            'L4': { id: 'L4', nombre: 'Línea 4', inst: 'Acordes Clásicos', color: 'var(--l4)', notas: [['C4','E4','G4'], ['A3','C4','E4']] },
            'L5': { id: 'L5', nombre: 'Línea 5', inst: 'Pluck Melódico', color: 'var(--l5)', notas: ['C4', 'E4', 'G4', 'A4', 'C5'] },
            'L6': { id: 'L6', nombre: 'Línea 6', inst: 'Hi-Hats', color: 'var(--l6)', notas: ['32n'] },
            'L7': { id: 'L7', nombre: 'Línea 7', inst: 'Atmósfera Ecos', color: 'var(--l7)', notas: ['C5', 'D5', 'E5'] }
        };

        const legendContainer = document.getElementById('legend-container');
        Object.values(dataLineas).forEach(linea => {
            legendContainer.innerHTML += `<div class="line-row"><div class="line-dot" style="background: ${linea.color}; color: ${linea.color};"></div><div class="line-text"><strong>${linea.nombre}</strong> ${linea.inst}</div></div>`;
        });

        // Trazado estético del mapa (para que no se vea vacío)
        const trazosEsteticos = [
            [[19.495,-99.118], [19.276,-99.167]], // L1
            [[19.393,-99.046], [19.401,-99.187]], // L2
            [[19.533,-99.170], [19.380,-99.155]]  // L3
        ];
        trazosEsteticos.forEach(t => L.polyline(t, { color: '#333', weight: 2, opacity: 0.5 }).addTo(map));

        // --- VARIABLES GLOBALES ---
        let audioActivo = false;
        const synths = {};
        let analyserNode;
        
        let marcadoresUnidades = {}; 
        let unidadesData = {}; 

        // --- 2. INICIO DEL SISTEMA (Botón "Sintonizar") ---
        async function iniciarSistema() {
            // Ocultar pantalla
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => { 
                document.getElementById('start-screen').style.display = 'none'; 
                document.getElementById('sidebar').style.display = 'block'; 
            }, 500);

            // Iniciar Audio SIEMPRE dentro del evento del clic
            await Tone.start();
            Tone.Transport.start();
            audioActivo = true;

            // Configurar 3D Analyser
            analyserNode = new Tone.Analyser("fft", 256);
            Tone.getDestination().connect(analyserNode);

            // Efectos
            const reverb = new Tone.Reverb(2).toDestination();
            const delay = new Tone.FeedbackDelay("8n", 0.4).connect(reverb);

            // Instrumentos
            synths['L1'] = new Tone.MembraneSynth().toDestination(); synths['L1'].volume.value = 0;
            synths['L2'] = new Tone.NoiseSynth({noise: {type: 'pink'}, envelope: {attack:0.01, decay:0.2}}).toDestination(); synths['L2'].volume.value = -10;
            synths['L3'] = new Tone.FMSynth({modulationIndex: 2}).connect(reverb); synths['L3'].volume.value = -5;
            synths['L4'] = new Tone.PolySynth(Tone.Synth).connect(reverb); synths['L4'].volume.value = -10;
            synths['L5'] = new Tone.Synth({oscillator: {type: 'sine'}}).connect(reverb); synths['L5'].volume.value = -5;
            synths['L6'] = new Tone.NoiseSynth({noise:{type:'white'}, envelope:{attack:0.005, decay:0.1}}).toDestination(); synths['L6'].volume.value = -15;
            synths['L7'] = new Tone.AMSynth().connect(delay); synths['L7'].volume.value = -5;

            // Arrancar módulos
            iniciarVisualizador3D();
            conectarAPIReal();
            animarInterpolacion(); 
        }

        // --- 3. CONEXIÓN A LA API ---
        const INTERVALO_ACTUALIZACION = 30000;
        // Obtenemos los datos con un proxy para evitar problemas CORS en GitHub Pages
        const API_URL = 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://datos.cdmx.gob.mx/api/explore/v2.1/catalog/datasets/prueba_fetchdata_metrobus/records?limit=100');

        async function conectarAPIReal() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Falla en la red");
                
                const dataText = await response.json();
                const jsonGobierno = JSON.parse(dataText.contents);
                
                procesarDatosReales(jsonGobierno.results);
            } catch (error) {
                console.error("Esperando datos...", error);
            }
            setTimeout(conectarAPIReal, INTERVALO_ACTUALIZACION);
        }

        // --- 4. PROCESAMIENTO Y MATEMÁTICA ---
        const notasAleatorias = ["C4", "D4", "F4", "G4", "A4"]; 

        function getColorHex(lineaId) {
            const hex = { 'L1': '#ff0000', 'L2': '#930093', 'L3': '#00a800', 'L4': '#ff8000', 'L5': '#0000ff', 'L6': '#ff00ff', 'L7': '#00ff00' };
            return hex[lineaId] || '#ffffff';
        }

        function procesarDatosReales(autobuses) {
            if(!autobuses) return;
            
            const unidadesActivas = new Set();
            document.getElementById('val-buses').innerText = autobuses.length;
            
            const nuevoBPM = Math.min(140, Math.max(60, 60 + (autobuses.length * 0.4)));
            Tone.Transport.bpm.rampTo(nuevoBPM, 2);
            document.getElementById('val-bpm').innerText = Math.floor(nuevoBPM);

            autobuses.forEach(vehiculo => {
                const id = vehiculo.vehicle_id;
                const lat = vehiculo.position_latitude || (vehiculo.point ? vehiculo.point.lat : null);
                const lng = vehiculo.position_longitude || (vehiculo.point ? vehiculo.point.lon : null);
                
                let lineaStr = vehiculo.route_id ? String(vehiculo.route_id).replace(/\D/g,'') : "1";
                const lineaId = `L${lineaStr}`;

                if (lat && lng && id) {
                    unidadesActivas.add(id);

                    if (unidadesData[id]) {
                        const bus = unidadesData[id];
                        if(bus.targetLat !== lat || bus.targetLng !== lng) {
                            bus.startLat = bus.currentLat; bus.startLng = bus.currentLng;
                            bus.targetLat = lat; bus.targetLng = lng;
                            bus.progress = 0; 
                            bus.travelTime = INTERVALO_ACTUALIZACION; 
                            bus.soundTriggered = false; 
                        }
                    } else {
                        unidadesData[id] = {
                            lineaId: lineaId,
                            startLat: lat, startLng: lng, currentLat: lat, currentLng: lng, targetLat: lat, targetLng: lng,
                            progress: 1, travelTime: INTERVALO_ACTUALIZACION, soundTriggered: true
                        };
                        marcadoresUnidades[id] = L.circleMarker([lat, lng], {
                            radius: 4, className: 'bus-marker', color: getColorHex(lineaId), fillColor: getColorHex(lineaId), fillOpacity: 1, weight: 2
                        }).addTo(map);
                    }
                }
            });

            for (let id in unidadesData) {
                if (!unidadesActivas.has(id)) {
                    map.removeLayer(marcadoresUnidades[id]);
                    delete marcadoresUnidades[id];
                    delete unidadesData[id];
                }
            }
        }

        // --- 5. RENDERIZADO FLUIDO (LERP) ---
        let lastTime = performance.now();

        function animarInterpolacion() {
            const currentTime = performance.now();
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            for (let id in unidadesData) {
                const bus = unidadesData[id];
                const marker = marcadoresUnidades[id];

                if (bus.progress < 1) {
                    bus.progress += deltaTime / bus.travelTime;
                    if (bus.progress >= 1) bus.progress = 1;

                    // Lerp
                    bus.currentLat = bus.startLat + (bus.targetLat - bus.startLat) * bus.progress;
                    bus.currentLng = bus.startLng + (bus.targetLng - bus.startLng) * bus.progress;

                    marker.setLatLng([bus.currentLat, bus.currentLng]);

                    // Gatillo Musical
                    if (bus.progress === 1 && !bus.soundTriggered && audioActivo) {
                        bus.soundTriggered = true;
                        
                        try {
                            const tiempo = Tone.now() + (Math.random() * 0.05); 
                            const l = bus.lineaId;
                            const d = dataLineas[l];
                            
                            if (d && synths[l]) {
                                const notaAleatoria = d.notas[Math.floor(Math.random() * d.notas.length)];
                                
                                if(l === 'L5') {
                                    synths[l].triggerAttackRelease(notasAleatorias[Math.floor(Math.random()*notasAleatorias.length)], "8n", tiempo);
                                } else {
                                    synths[l].triggerAttackRelease(notaAleatoria, "8n", tiempo);
                                }
                            }
                            
                            marker.setStyle({ fillColor: '#ffffff', radius: 8 });
                            setTimeout(() => { if(marcadoresUnidades[id]) marker.setStyle({ fillColor: getColorHex(l), radius: 4 }); }, 150);

                        } catch (e) {} 
                    }
                }
            }
            requestAnimationFrame(animarInterpolacion);
        }

        // --- 6. MOTOR 3D Y ZOOM ---
        let is3DActive = false;
        let renderer3D, scene3D, camera3D, organicMesh3D, organicBaseVerts;

        function toggleVisualizer() {
            is3DActive = !is3DActive;
            const btn = document.getElementById('btn-toggle-3d');
            
            if(is3DActive) {
                document.body.classList.add('split-mode');
                btn.innerText = "Cerrar Holografía";
            } else {
                document.body.classList.remove('split-mode');
                btn.innerText = "Activar Holografía";
            }
            
            setTimeout(() => {
                map.invalidateSize();
                if(renderer3D) {
                    const canvas = document.getElementById('visualizer-canvas');
                    renderer3D.setSize(canvas.parentElement.clientWidth, canvas.parentElement.clientHeight);
                    camera3D.aspect = canvas.parentElement.clientWidth / canvas.parentElement.clientHeight;
                    camera3D.updateProjectionMatrix();
                }
            }, 750);
        }

        function iniciarVisualizador3D() {
            const container = document.getElementById('visualizer-container');
            const canvas = document.getElementById('visualizer-canvas');
            renderer3D = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            
            const w = document.body.clientWidth * 0.6; 
            const h = document.body.clientHeight;
            renderer3D.setSize(w, h);

            scene3D = new THREE.Scene();
            camera3D = new THREE.PerspectiveCamera(60, w / h, 0.1, 1000);
            camera3D.position.z = 10; 

            scene3D.add(new THREE.AmbientLight(0x222222));
            const mainLight = new THREE.PointLight(0x00f0ff, 2, 50); mainLight.position.set(5, 5, 5); scene3D.add(mainLight);
            const fillLight = new THREE.PointLight(0xff003c, 1, 50); fillLight.position.set(-5, -5, -2); scene3D.add(fillLight);

            const organicGeo = new THREE.IcosahedronGeometry(3.5, 30);
            organicBaseVerts = [];
            const posAttr = organicGeo.attributes.position;
            for(let i=0; i < posAttr.count; i++) {
                organicBaseVerts.push(new THREE.Vector3(posAttr.getX(i), posAttr.getY(i), posAttr.getZ(i)));
            }
            const organicMat = new THREE.MeshStandardMaterial({ 
                color: 0x111111, emissive: 0x00f0ff, emissiveIntensity: 0.5, 
                wireframe: true, roughness: 0.2, metalness: 0.9 
            });
            
            organicMesh3D = new THREE.Mesh(organicGeo, organicMat);
            scene3D.add(organicMesh3D);

            container.addEventListener('wheel', (e) => {
                e.preventDefault(); 
                camera3D.position.z += e.deltaY * 0.01;
                camera3D.position.z = Math.max(5, Math.min(30, camera3D.position.z));
            }, { passive: false });

            animar3D();
        }

        function animar3D() {
            requestAnimationFrame(animar3D);
            if(!is3DActive || !analyserNode) return;

            const audioData = analyserNode.getValue();
            let sum = 0;
            const freqData = new Uint8Array(256);
            
            for(let i=0; i<audioData.length; i++) {
                let val = (audioData[i] + 100) * 2.55; 
                val = Math.max(0, Math.min(255, val));
                freqData[i] = val;
                sum += val;
            }
            let avgNorm = (sum / 256) / 255;

            organicMesh3D.rotation.y += 0.005;
            organicMesh3D.rotation.z = avgNorm * 0.2;
            
            const pos = organicMesh3D.geometry.attributes.position;
            let time = performance.now() * 0.001;

            for(let i=0; i < organicBaseVerts.length; i++) {
                let freq = freqData[i % 256];
                let base = organicBaseVerts[i];
                let asymNoise = Math.sin(base.x * 2.0 + time) * Math.cos(base.y * 2.0 + time);
                
                let displacement = (freq / 255.0) * 1.5 + (asymNoise * 0.5 * (freq/255.0));
                let dir = base.clone().normalize();
                let newPos = base.clone().add(dir.multiplyScalar(displacement));
                
                pos.setXYZ(i, newPos.x, newPos.y, newPos.z);
            }
            
            pos.needsUpdate = true;
            organicMesh3D.material.emissiveIntensity = 0.2 + (avgNorm * 2.0);

            renderer3D.render(scene3D, camera3D);
        }
    </script>
</body>
</html>
