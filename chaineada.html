<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alter.Lab - Arte Generativo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>

    <style>
        /* VARIABLES - Paleta Noir Brutalista */
        :root {
            --background-color: #050505; /* Más oscuro, más "cine" */
            --text-color: #FFFFFF;
            --secondary-text-color: #7a7a7a;
            --accent-color: #00E5FF; /* Tu cyan de las partículas */
            --border-color: rgba(255, 255, 255, 0.12);
            --overlay-color: rgba(5, 5, 5, 0.75); /* Filtro sobre el video */
            --font-main: 'Montserrat', sans-serif;
            --font-mono: 'JetBrains Mono', monospace; /* Para los detalles técnicos */
        }

        /* FIX PARA LENIS SMOOTH SCROLL */
        html.lenis, html.lenis body { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto !important; }
        .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
        .lenis.lenis-stopped { overflow: hidden; }
        .lenis.lenis-scrolling iframe { pointer-events: none; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            color: var(--text-color); 
            font-family: var(--font-main); 
            overflow-x: hidden; 
            background-color: var(--background-color); 
        }

        /* CAPAS DE FONDO INTÁCTAS */
        #background-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -3; object-fit: cover; filter: brightness(0.4); 
        }
        
        #canvas-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; pointer-events: none; 
        }

        /* OVERLAY BRUTALISTA */
        .video-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--overlay-color); z-index: -1; pointer-events: none;
        }

        /* HEADER & NAVEGACIÓN FIJA */
        .main-header { 
            position: fixed; top: 0; width: 100%; z-index: 100;
            display: flex; justify-content: space-between; align-items: center; 
            padding: 1.5rem 3rem; border-bottom: 1px solid var(--border-color);
            background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(5px);
        }

        .logo a { 
            display: flex; align-items: center; gap: 10px; text-decoration: none; 
        }
        
        .logo img { height: 30px; width: auto; filter: grayscale(100%); transition: filter 0.3s;}
        .logo:hover img { filter: grayscale(0%); }
        
        .logo .logo-text { 
            font-size: 1.2rem; font-weight: 900; letter-spacing: 2px; color: var(--text-color); 
        }

        .main-nav { display: flex; gap: 2rem; }
        .nav-button {
            background: transparent; border: none; color: var(--secondary-text-color);
            cursor: pointer; text-decoration: none; font-family: var(--font-mono);
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;
            transition: color 0.3s ease;
        }
        .nav-button:hover, .nav-button.active { color: var(--text-color); }

        .lang-switcher button { 
            background: none; border: none; color: var(--secondary-text-color); 
            cursor: pointer; font-family: var(--font-mono); font-size: 0.8rem;
            transition: color 0.3s ease; margin-left: 10px;
        }
        .lang-switcher button:hover, .lang-switcher button.active { 
            color: var(--text-color); font-weight: bold; 
        }

        /* ESTRUCTURA BRUTALISTA POR SECCIONES */
        .section-container {
            display: flex; min-height: 100vh; border-bottom: 1px solid var(--border-color);
            padding-top: 80px; box-sizing: border-box; position: relative; z-index: 2;
        }

        /* TEXTO LATERAL GIGANTE */
        .side-label {
            width: 150px; border-right: 1px solid var(--border-color);
            display: flex; justify-content: center; align-items: center; flex-shrink: 0;
            background: rgba(5,5,5,0.2); /* Sutil contraste */
        }
        .side-label h2 {
            writing-mode: vertical-rl; transform: rotate(180deg);
            font-size: clamp(4rem, 8vw, 10rem); font-weight: 900; line-height: 0.8;
            margin: 0; color: rgba(255, 255, 255, 0.05); /* Muy sutil */
            text-transform: uppercase; letter-spacing: -5px;
            -webkit-text-stroke: 1px rgba(255,255,255,0.2);
        }

        .content-area {
            flex-grow: 1; padding: 4rem; display: flex; flex-direction: column; justify-content: center;
        }

        /* INICIO (HERO) */
        .hero-text h1 {
            font-size: clamp(3rem, 6vw, 6rem); font-weight: 900; line-height: 0.9;
            letter-spacing: -2px; margin-bottom: 1.5rem; text-transform: uppercase;
        }
        .hero-text p {
            font-family: var(--font-mono); font-size: 1rem; color: var(--secondary-text-color);
            margin-bottom: 3rem; max-width: 500px; line-height: 1.6;
        }
        
        .cta-buttons-container { display: flex; gap: 15px; flex-wrap: wrap; }
        .cta-button {
            display: inline-block; border: 1px solid var(--border-color); 
            padding: 15px 30px; color: var(--text-color); text-decoration: none; 
            font-family: var(--font-mono); font-size: 0.8rem; text-transform: uppercase;
            letter-spacing: 1px; transition: all 0.3s ease;
        }
        .cta-button:hover { background: var(--text-color); color: var(--background-color); }

        /* PORTAFOLIO */
        .intro-text { 
            font-family: var(--font-mono); color: var(--secondary-text-color);
            max-width: 600px; margin-bottom: 3rem; line-height: 1.5; font-size: 0.9rem;
        }

        .categories-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1px; background: var(--border-color); border: 1px solid var(--border-color);
        }

        .category-block { 
            background: rgba(5,5,5,0.6); backdrop-filter: blur(10px);
            padding: 2rem; display: flex; flex-direction: column;
        }
        
        .category-title { 
            font-family: var(--font-mono); font-size: 0.8rem; text-transform: uppercase;
            color: var(--secondary-text-color); margin-bottom: 1rem; text-align: left;
        }

        .grid-item {
            position: relative; overflow: hidden; aspect-ratio: 16 / 9;
            background-color: #000; cursor: pointer; border: 1px solid var(--border-color);
        }
        .grid-item video, .grid-item iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; filter: grayscale(100%) contrast(1.2); transition: all 0.5s ease;
        }
        .grid-item:hover video { filter: grayscale(0%) contrast(1); transform: scale(1.02); }

        .play-icon {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 50px; height: 50px; border: 1px solid var(--text-color); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s ease; pointer-events: none; z-index: 10;
        }
        .play-icon::after {
            content: ''; display: block; border-style: solid; border-width: 8px 0 8px 12px;
            border-color: transparent transparent transparent var(--text-color); margin-left: 4px;
        }
        .grid-item:hover .play-icon { opacity: 1; }

        /* CONTACTO */
        .contact-form-wrapper {
            background: rgba(5,5,5,0.4); border: 1px solid var(--border-color);
            padding: 3rem; max-width: 800px; backdrop-filter: blur(5px);
        }
        .contact-form-wrapper h2 { 
            font-size: 2rem; font-weight: 900; margin-bottom: 2rem; text-transform: uppercase; 
        }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-group label {
            display: block; margin-bottom: 0.5rem; color: var(--secondary-text-color);
            font-family: var(--font-mono); font-size: 0.75rem; text-transform: uppercase;
        }
        .form-group input, .form-group textarea {
            width: 100%; padding: 15px; background: transparent;
            border: 1px solid var(--border-color); color: var(--text-color);
            font-family: var(--font-main); font-size: 1rem; transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus { 
            outline: none; border-color: var(--accent-color); 
        }
        .row { display: flex; gap: 1.5rem; }
        .col-md-6 { flex: 1; }
        
        .submit-btn {
            background: var(--text-color); color: var(--background-color); border: none;
            padding: 15px 30px; font-family: var(--font-mono); font-size: 0.9rem;
            text-transform: uppercase; font-weight: bold; cursor: pointer; transition: opacity 0.3s;
            margin-top: 1rem;
        }
        .submit-btn:hover { opacity: 0.8; }

        /* FOOTER */
        .page-footer { padding: 2rem; text-align: center; border-top: 1px solid var(--border-color); z-index: 2; position: relative;}
        .social-links a { color: var(--secondary-text-color); font-size: 1.5rem; margin: 0 15px; transition: color 0.3s; }
        .social-links a:hover { color: var(--text-color); }

        @media (max-width: 900px) {
            .main-header { flex-direction: column; padding: 1rem; gap: 1rem;}
            .section-container { flex-direction: column; }
            .side-label { width: 100%; border-right: none; border-bottom: 1px solid var(--border-color); padding: 1rem 0;}
            .side-label h2 { writing-mode: horizontal-tb; transform: none; font-size: 3rem; letter-spacing: 0;}
            .content-area { padding: 2rem; }
            .row { flex-direction: column; gap: 0;}
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="background-video">
        <source src="assets/videos/web05.webm" type="video/webm">
        <source src="assets/videos/web05.mp4" type="video/mp4">
    </video>
    <div id="canvas-container"></div>
    <div class="video-overlay"></div> <header class="main-header" data-aos="fade-down" data-aos-duration="1000">
        <div class="logo">
            <a href="#inicio">
                <img src="assets/img/logo03.png" alt="Alter.Lab Logo">
                <span class="logo-text">ALTER.LAB</span>
            </a>
        </div>
        <div class="main-nav">
            <a href="#portafolio" class="nav-button" id="nav-portfolio">Portafolio</a>
            <a href="cursos.html" class="nav-button" id="nav-courses">Cursos</a>
            <a href="blog.html" class="nav-button" id="nav-blog">Blog</a>
            <a href="#contacto" class="nav-button" id="nav-contact">Contacto</a>
        </div>
        <div class="lang-switcher">
            <button id="lang-en">EN</button>
            <button id="lang-es" class="active">ES</button>
            <button id="lang-fr">FR</button>
        </div>
    </header>

    <main>
        <section id="inicio" class="section-container">
            <div class="side-label"><h2>CORE</h2></div>
            <div class="content-area">
                <div class="hero-text">
                    <h1 id="hero-title" data-aos="fade-up" data-aos-duration="1000"></h1>
                    <p id="hero-subtitle" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="150"></p>
                    
                    <div class="cta-buttons-container" data-aos="fade-up" data-aos-delay="300">
                        <a href="#portafolio" class="cta-button" id="cta-portfolio"></a>
                        <a href="#contacto" class="cta-button" id="cta-quote"></a>
                    </div>
                </div>
            </div>
        </section>

        <section id="portafolio" class="section-container">
            <div class="side-label"><h2>WORK</h2></div>
            <div class="content-area">
                <p class="intro-text" id="intro-text" data-aos="fade-up"></p>
                
                <div class="categories-container">
                    <div class="category-block">
                        <h2 class="category-title gsap-title" id="cat-music"></h2>
                        <div class="grid-item gsap-media" data-youtube-id="hSBg_XL0cfE">
                            <video autoplay muted loop playsinline><source src="assets/videos/portafolio01.webm" type="video/mp4"></video>
                            <div class="play-icon"></div>
                        </div>
                    </div>
                    
                    <div class="category-block">
                        <h2 class="category-title gsap-title" id="cat-shorts"></h2>
                        <div class="grid-item gsap-media" data-vimeo-id="1096475811">
                            <video autoplay muted loop playsinline><source src="assets/videos/portafolio02.webm" type="video/mp4"></video>
                            <div class="play-icon"></div>
                        </div>
                    </div>
                    
                    <div class="category-block">
                        <h2 class="category-title gsap-title" id="cat-web"></h2>
                        <div class="grid-item gsap-media" id="web-grid-item">
                            <video autoplay muted loop playsinline><source src="assets/videos/portafolio03.webm" type="video/mp4"></video>
                        </div>
                    </div>
                    
                    <div class="category-block">
                        <h2 class="category-title gsap-title" id="cat-music-projects"></h2>
                        <div class="grid-item gsap-media" id="co-laboratorio-grid-item">
                            <video autoplay muted loop playsinline><source src="assets/videos/portafolio04.webm" type="video/mp4"></video>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="contacto" class="section-container">
            <div class="side-label"><h2>PING</h2></div>
            <div class="content-area">
                <div class="contact-form-wrapper" data-aos="fade-up">
                    <h2 id="contactTitle"></h2>
                    <form id="contact-form" action="https://formspree.io/f/manjlqwe" method="POST">
                        <div class="row">
                            <div class="col-md-6 form-group">
                                <label for="contact-name" id="label-name"></label>
                                <input type="text" id="contact-name" name="nombre" required>
                            </div>
                            <div class="col-md-6 form-group">
                                <label for="contact-email" id="label-email"></label>
                                <input type="email" id="contact-email" name="email" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="contact-subject" id="label-subject"></label>
                            <input type="text" id="contact-subject" name="asunto" required>
                        </div>
                        <div class="form-group">
                            <label for="contact-message" id="label-message"></label>
                            <textarea id="contact-message" name="mensaje" rows="4" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn" id="submit-button"></button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="page-footer">
        <div class="social-links">
            <a href="https://www.youtube.com/@AlterLabGen" target="_blank"><i class="bi bi-youtube"></i></a>
            <a href="https://www.facebook.com/alter.labgen/" target="_blank"><i class="bi bi-facebook"></i></a>
            <a href="https://www.instagram.com/alter.labgen/" target="_blank"><i class="bi bi-instagram"></i></a>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // 1. INICIALIZAR AOS
        AOS.init({ once: false, mirror: true, offset: 50 });

        // 2. INICIALIZAR LENIS Y GSAP
        const lenis = new Lenis({ duration: 1.2, easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), smooth: true });
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time)=>{ lenis.raf(time * 1000); });
        gsap.ticker.lagSmoothing(0);
        
        gsap.registerPlugin(ScrollTrigger);
        
        // Efectos GSAP de Portafolio
        gsap.utils.toArray('.gsap-title').forEach(title => {
            gsap.fromTo(title, { y: 20, opacity: 0 }, { y: 0, opacity: 1, ease: "none", scrollTrigger: { trigger: title, start: "top 90%", end: "top 70%", scrub: 1 } });
        });
        gsap.utils.toArray('.gsap-media').forEach(media => {
            gsap.fromTo(media, { y: 40, scale: 0.95 }, { y: 0, scale: 1, ease: "none", scrollTrigger: { trigger: media, start: "top 95%", end: "bottom 20%", scrub: 1 } });
        });

        // 3. SCRIPT DE MULTI-IDIOMA UNIFICADO
        document.addEventListener('DOMContentLoaded', function() {
            const translations = {
                es: {
                    'hero-title': 'LABORATORIO DE ARTE GENERATIVO', 'hero-subtitle': 'Explorando la intersección entre creatividad y tecnología',
                    'cta-portfolio': 'EXPLORAR TRABAJOS', 'cta-quote': 'COTIZA TU PROYECTO', 'nav-portfolio': 'Portafolio', 'nav-courses': 'Cursos', 'nav-blog': 'Blog', 'nav-contact': 'Contacto',
                    'intro-text': 'Estos son algunos de los últimos proyectos del Laboratorio. Haz clic para verlos en acción.',
                    'cat-music': 'Videos Musicales', 'cat-shorts': 'Cortos Animados', 'cat-web': 'Páginas Web', 'cat-music-projects': 'Co-Laboratorio',
                    'contactTitle': 'Contacto', 'label-name': 'Nombre', 'label-email': 'Correo', 'label-subject': 'Asunto', 'label-message': 'Mensaje', 'submit-button': 'Enviar'
                },
                en: {
                    'hero-title': 'GENERATIVE ART LABORATORY', 'hero-subtitle': 'Exploring the intersection of creativity and technology',
                    'cta-portfolio': 'EXPLORE WORKS', 'cta-quote': 'QUOTE YOUR PROJECT', 'nav-portfolio': 'Portfolio', 'nav-courses': 'Courses', 'nav-blog': 'Blog', 'nav-contact': 'Contact',
                    'intro-text': 'These are some of our latest projects. Click to see them in action.',
                    'cat-music': 'Music Videos', 'cat-shorts': 'Animated Shorts', 'cat-web': 'Websites', 'cat-music-projects': 'Co-Lab',
                    'contactTitle': 'Contact', 'label-name': 'Name', 'label-email': 'Email', 'label-subject': 'Subject', 'label-message': 'Message', 'submit-button': 'Send'
                },
                fr: {
                    'hero-title': "LABORATOIRE D'ART GÉNÉRATIF", 'hero-subtitle': "Explorer l'intersection entre créativité et technologie",
                    'cta-portfolio': 'EXPLORER LES TRAVAUX', 'cta-quote': 'DEMANDEZ UN DEVIS', 'nav-portfolio': 'Portfolio', 'nav-courses': 'Cours', 'nav-blog': 'Blog', 'nav-contact': 'Contact',
                    'intro-text': "Voici nos derniers projets. Cliquez pour les voir en action.",
                    'cat-music': 'Vidéos Musicales', 'cat-shorts': 'Courts Animés', 'cat-web': 'Sites Web', 'cat-music-projects': 'Co-Lab',
                    'contactTitle': 'Contact', 'label-name': 'Nom', 'label-email': 'Email', 'label-subject': 'Sujet', 'label-message': 'Message', 'submit-button': 'Envoyer'
                }
            };
            
            function setLanguage(lang) {
                const langData = translations[lang];
                Object.keys(langData).forEach(key => {
                    const el = document.getElementById(key); if (el) el.textContent = langData[key];
                });
                document.querySelectorAll('.lang-switcher button').forEach(btn => btn.classList.remove('active'));
                document.getElementById('lang-' + lang).classList.add('active');
            }
            
            document.getElementById('lang-en').addEventListener('click', () => setLanguage('en'));
            document.getElementById('lang-es').addEventListener('click', () => setLanguage('es'));
            document.getElementById('lang-fr').addEventListener('click', () => setLanguage('fr'));
            setLanguage('es');

            // 4. LÓGICA DE REPRODUCTOR DE VIDEO (PORTAFOLIO)
            const gridItems = document.querySelectorAll('.grid-item');
            gridItems.forEach(item => {
                if (item.id !== 'co-laboratorio-grid-item' && item.id !== 'web-grid-item') item.originalContent = item.innerHTML;
                
                item.addEventListener('click', function() {
                    if (this.id === 'co-laboratorio-grid-item') { window.location.href = 'co-laboratorio.html'; return; }
                    if (this.id === 'web-grid-item') { window.open('colmena.html', '_blank'); return; }
                    
                    const isPlaying = this.querySelector('iframe');
                    gridItems.forEach(otherItem => {
                        if (otherItem.id !== 'co-laboratorio-grid-item' && otherItem.id !== 'web-grid-item' && otherItem.originalContent) {
                            otherItem.innerHTML = otherItem.originalContent;
                        }
                    });
                    
                    if (!isPlaying) {
                        const vimeoId = this.dataset.vimeoId; const youtubeId = this.dataset.youtubeId;
                        let embedUrl = vimeoId ? `https://player.vimeo.com/video/${vimeoId}?autoplay=1&title=0&byline=0` : 
                                       youtubeId ? `https://www.youtube.com/embed/${youtubeId}?autoplay=1&rel=0` : '';
                        
                        if (embedUrl) {
                            const iframe = document.createElement('iframe');
                            iframe.src = embedUrl; iframe.style.cssText = 'width:100%; height:100%; border:none;';
                            iframe.setAttribute('allow', 'autoplay; fullscreen'); iframe.setAttribute('allowfullscreen', '');
                            this.innerHTML = ''; this.appendChild(iframe);
                            if (iframe.requestFullscreen) iframe.requestFullscreen();
                        }
                    }
                });
            });
        });

        // 5. THREE.JS (Tus partículas cyan y esfera)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const particlesGeometry = new THREE.BufferGeometry();
        const posArray = new Float32Array(700 * 3);
        for(let i = 0; i < 700 * 3; i++) posArray[i] = (Math.random() - 0.5) * 15;
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        
        const material = new THREE.PointsMaterial({ size: 0.02, color: 0x00E5FF, transparent: true, opacity: 0.8 });
        const particlesMesh = new THREE.Points(particlesGeometry, material); scene.add(particlesMesh);
        
        const sphere = new THREE.Mesh(new THREE.IcosahedronGeometry(4, 1), new THREE.MeshBasicMaterial({ color: 0x00E5FF, wireframe: true, transparent: true, opacity: 0.1 }));
        scene.add(sphere); camera.position.z = 5;

        let mouseX = 0, mouseY = 0, scrollY = 0;
        document.addEventListener('mousemove', (e) => { mouseX = (e.clientX - window.innerWidth/2); mouseY = (e.clientY - window.innerHeight/2); });
        window.addEventListener('scroll', () => { scrollY = window.scrollY; });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            sphere.rotation.y += 0.002 + (scrollY * 0.000005); sphere.rotation.x += 0.001;
            particlesMesh.rotation.y += 0.05 * ((mouseX * 0.001) - particlesMesh.rotation.y);
            particlesMesh.rotation.x += 0.05 * ((mouseY * 0.001) - particlesMesh.rotation.x);
            particlesMesh.rotation.z = clock.getElapsedTime() * 0.05;
            camera.position.y = -(scrollY * 0.001);
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
