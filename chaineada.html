<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alter.Lab - Ecosistema Generativo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>

    <style>
        /* VARIABLES - Paleta Noir Brutalista */
        :root {
            --background-color: #050505; 
            --text-color: #FFFFFF;
            --secondary-text-color: #7a7a7a;
            --accent-color: #00E5FF; 
            --border-color: rgba(255, 255, 255, 0.12);
            --overlay-color: rgba(5, 5, 5, 0.75); 
            --font-main: 'Montserrat', sans-serif;
            --font-mono: 'JetBrains Mono', monospace; 
        }

        html.lenis, html.lenis body { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto !important; }
        .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
        .lenis.lenis-stopped { overflow: hidden; }
        .lenis.lenis-scrolling iframe { pointer-events: none; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { color: var(--text-color); font-family: var(--font-main); overflow-x: hidden; background-color: var(--background-color); }

        /* CAPAS DE FONDO */
        #background-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3; object-fit: cover; filter: brightness(0.4); }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
        .video-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--overlay-color); z-index: -1; pointer-events: none; }

        /* HEADER & NAVEGACIÓN FIJA */
        .main-header { 
            position: fixed; top: 0; width: 100%; z-index: 100; display: flex; justify-content: space-between; align-items: center; 
            padding: 1.5rem 3rem; border-bottom: 1px solid var(--border-color); background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(5px);
        }
        .logo a { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo img { height: 30px; width: auto; filter: grayscale(100%); transition: filter 0.3s;}
        .logo:hover img { filter: grayscale(0%); }
        .logo .logo-text { font-size: 1.2rem; font-weight: 900; letter-spacing: 2px; color: var(--text-color); }
        .main-nav { display: flex; gap: 2rem; }
        .nav-button { background: transparent; border: none; color: var(--secondary-text-color); cursor: pointer; text-decoration: none; font-family: var(--font-mono); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s ease; }
        .nav-button:hover, .nav-button.active { color: var(--text-color); }
        .lang-switcher button { background: none; border: none; color: var(--secondary-text-color); cursor: pointer; font-family: var(--font-mono); font-size: 0.8rem; transition: color 0.3s ease; margin-left: 10px; }
        .lang-switcher button:hover, .lang-switcher button.active { color: var(--text-color); font-weight: bold; }

        /* ESTRUCTURA BRUTALISTA POR SECCIONES */
        .section-container { display: flex; min-height: 100vh; border-bottom: 1px solid var(--border-color); padding-top: 80px; box-sizing: border-box; position: relative; z-index: 2; }
        .side-label { width: 150px; border-right: 1px solid var(--border-color); display: flex; justify-content: center; align-items: center; flex-shrink: 0; background: rgba(5,5,5,0.2); }
        .side-label h2 { writing-mode: vertical-rl; transform: rotate(180deg); font-size: clamp(4rem, 8vw, 10rem); font-weight: 900; line-height: 0.8; margin: 0; color: rgba(255, 255, 255, 0.05); text-transform: uppercase; letter-spacing: -5px; -webkit-text-stroke: 1px rgba(255,255,255,0.2); }
        .content-area { flex-grow: 1; padding: 4rem; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }

        /* INICIO (HERO) */
        .hero-text h1 { font-size: clamp(3rem, 6vw, 6rem); font-weight: 900; line-height: 0.9; letter-spacing: -2px; margin-bottom: 1.5rem; text-transform: uppercase; }
        .hero-text p { font-family: var(--font-mono); font-size: 1rem; color: var(--secondary-text-color); margin-bottom: 3rem; max-width: 500px; line-height: 1.6; }
        .cta-buttons-container { display: flex; gap: 15px; flex-wrap: wrap; }
        .cta-button { display: inline-block; border: 1px solid var(--border-color); padding: 15px 30px; color: var(--text-color); text-decoration: none; font-family: var(--font-mono); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; }
        .cta-button:hover { background: var(--text-color); color: var(--background-color); }

        /* PORTAFOLIO & CURSOS */
        .intro-text { font-family: var(--font-mono); color: var(--secondary-text-color); max-width: 600px; margin-bottom: 3rem; line-height: 1.5; font-size: 0.9rem; }
        .categories-container, .cursos-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1px; background: var(--border-color); border: 1px solid var(--border-color); }
        .category-block { background: rgba(5,5,5,0.6); backdrop-filter: blur(10px); padding: 2rem; display: flex; flex-direction: column; }
        .category-title { font-family: var(--font-mono); font-size: 0.8rem; text-transform: uppercase; color: var(--secondary-text-color); margin-bottom: 1rem; text-align: left; }
        
        .grid-item { position: relative; overflow: hidden; aspect-ratio: 16 / 9; background-color: #000; cursor: pointer; border: 1px solid var(--border-color); }
        .grid-item video, .grid-item iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(1.2); transition: all 0.5s ease; border: none; }
        .grid-item:hover video { filter: grayscale(0%) contrast(1); transform: scale(1.02); }
        .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; border: 1px solid var(--text-color); border-radius: 50%; display: flex; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; z-index: 10; }
        .play-icon::after { content: ''; display: block; border-style: solid; border-width: 8px 0 8px 12px; border-color: transparent transparent transparent var(--text-color); margin-left: 4px; }
        .grid-item:hover .play-icon { opacity: 1; }

        /* ======== NUEVO SISTEMA BLOG (UN SOLO BLOQUE HORIZONTAL) ======== */
        .blog-row { 
            height: calc(100vh - 80px); /* El PIN será perfecto al ocupar el alto de pantalla sobrante */
            display: flex; align-items: center; width: 100%; overflow: hidden;
            background: rgba(5, 5, 5, 0.4); backdrop-filter: blur(5px);
        }
        
        .blog-track { display: flex; align-items: flex-start; height: 100%; width: max-content; }
        .blog-panel { width: 100vw; padding: 4rem 10vw; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; height: 100%; overflow-y: auto; }
        
        .blog-panel::-webkit-scrollbar { width: 4px; }
        .blog-panel::-webkit-scrollbar-thumb { background: var(--border-color); }
        
        .blog-panel h1, .blog-panel h2 { font-size: clamp(2rem, 4vw, 3.5rem); font-weight: 900; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 1.5rem; }
        .blog-panel h3 { font-family: var(--font-mono); font-size: 1rem; color: var(--accent-color); margin: 2rem 0 1rem 0; text-transform: uppercase; }
        .blog-panel p { font-size: 1.1rem; line-height: 1.7; color: var(--secondary-text-color); margin-bottom: 1.5rem; max-width: 900px; }
        
        .video-container { width: 100%; max-width: 900px; aspect-ratio: 16 / 9; margin-bottom: 2rem; border: 1px solid var(--border-color); background: #000; }
        .video-container iframe { width: 100%; height: 100%; border: none; filter: grayscale(100%); transition: filter 0.5s; }
        .video-container:hover iframe { filter: grayscale(0%); }

        .image-mosaic { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; margin: 2rem 0; max-width: 900px; background: var(--border-color); border: 1px solid var(--border-color); }
        .mosaic-item { position: relative; background: #000; aspect-ratio: 1; overflow: hidden; cursor: pointer; }
        .mosaic-item img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: all 0.4s ease; opacity: 0.7;}
        .mosaic-item:hover img { filter: grayscale(0%); opacity: 1; transform: scale(1.05); }

        .lightbox { position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; animation: fadeIn 0.3s ease; }
        .lightbox.visible { display: flex; }
        .lightbox-content { max-width: 85vw; max-height: 85vh; border: 1px solid var(--border-color); }
        .lightbox-close { position: absolute; top: 20px; right: 40px; color: var(--secondary-text-color); font-family: var(--font-mono); font-size: 2rem; cursor: pointer; transition: color 0.3s; }
        .lightbox-close:hover { color: #fff; }
        .lightbox-arrow { position: absolute; top: 50%; transform: translateY(-50%); color: var(--secondary-text-color); font-size: 2rem; cursor: pointer; padding: 20px; user-select: none; transition: color 0.3s; z-index: 1001; }
        .lightbox-arrow:hover { color: #fff; }
        #lightbox-prev { left: 20px; } #lightbox-next { right: 20px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* CURSOS */
        .course-card { background: rgba(5,5,5,0.6); padding: 3rem; display: flex; flex-direction: column; justify-content: space-between; }
        .course-card h3 { font-size: 1.5rem; font-weight: 800; text-transform: uppercase; margin-bottom: 1.5rem; line-height: 1.2; }
        .course-card p { color: var(--secondary-text-color); line-height: 1.6; margin-bottom: 1.5rem; }
        .course-card ul { margin-left: 1.5rem; margin-bottom: 2rem; color: var(--secondary-text-color); line-height: 1.6; }
        .course-meta { font-family: var(--font-mono); font-size: 0.8rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem; display: flex; justify-content: space-between; color: var(--text-color); }
        .status-badge { background: var(--border-color); padding: 4px 8px; border-radius: 2px; }

        /* CONTACTO */
        .contact-form-wrapper { background: rgba(5,5,5,0.4); border: 1px solid var(--border-color); padding: 3rem; max-width: 800px; backdrop-filter: blur(5px); margin: 0 auto; }
        .contact-form-wrapper h2 { font-size: 2rem; font-weight: 900; margin-bottom: 2rem; text-transform: uppercase; text-align: center; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--secondary-text-color); font-family: var(--font-mono); font-size: 0.75rem; text-transform: uppercase; }
        .form-group input, .form-group textarea { width: 100%; padding: 15px; background: transparent; border: 1px solid var(--border-color); color: var(--text-color); font-family: var(--font-main); font-size: 1rem; transition: border-color 0.3s; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--accent-color); }
        .row { display: flex; gap: 1.5rem; } .col-md-6 { flex: 1; }
        .submit-btn { background: var(--text-color); color: var(--background-color); border: none; padding: 15px 30px; font-family: var(--font-mono); font-size: 0.9rem; text-transform: uppercase; font-weight: bold; cursor: pointer; transition: opacity 0.3s; margin-top: 1rem; width: 100%; }
        .submit-btn:hover { opacity: 0.8; }

        .page-footer { padding: 2rem; text-align: center; border-top: 1px solid var(--border-color); z-index: 2; position: relative;}
        .social-links a { color: var(--secondary-text-color); font-size: 1.5rem; margin: 0 15px; transition: color 0.3s; }
        .social-links a:hover { color: var(--text-color); }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .main-header { flex-direction: column; padding: 1rem; gap: 1rem;}
            .section-container { flex-direction: column; }
            .side-label { width: 100%; border-right: none; border-bottom: 1px solid var(--border-color); padding: 1rem 0;}
            .side-label h2 { writing-mode: horizontal-tb; transform: none; font-size: 3rem; letter-spacing: 0;}
            .content-area { padding: 2rem; }
            
            .blog-row { height: auto; display: block; background: transparent; }
            .blog-track { flex-direction: column !important; width: 100% !important; transform: none !important; }
            .blog-panel { width: 100% !important; padding: 2rem 0 !important; border-bottom: 1px solid var(--border-color); }
            
            .row { flex-direction: column; gap: 0;}
            .image-mosaic { grid-template-columns: repeat(2, 1fr); }
            .cursos-container { grid-template-columns: 1fr; }
        }
    </style>
</head>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: false, mirror: true, offset: 50 });

        const lenis = new Lenis({ duration: 1.2, easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), smooth: true });
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time)=>{ lenis.raf(time * 1000); });
        gsap.ticker.lagSmoothing(0);
        
        gsap.registerPlugin(ScrollTrigger);

        gsap.utils.toArray('.gsap-media').forEach(media => { gsap.fromTo(media, { y: 40, scale: 0.98 }, { y: 0, scale: 1, ease: "none", scrollTrigger: { trigger: media, start: "top 95%", end: "bottom 20%", scrub: 1 } }); });

        // ===== LÓGICA DE SCROLL HORIZONTAL (SOLO PARA SAN JACINTO) =====
        let mm = gsap.matchMedia();
        mm.add("(min-width: 901px)", () => {
            const blogRow = document.querySelector('.blog-row');
            const blogTrack = document.querySelector('.blog-track');
            
            if (blogRow && blogTrack) {
                // Calcula el espacio sobrante del contenedor principal (restamos el menú lateral de 150px)
                let scrollDistance = blogTrack.scrollWidth - (window.innerWidth - 150);
                
                if (scrollDistance > 0) {
                    gsap.to(blogTrack, {
                        x: -scrollDistance,
                        ease: "none",
                        scrollTrigger: {
                            trigger: blogRow,

        // LIGHTBOX Y MOSAICO
        const mosaicBocetos = document.getElementById('mosaic-bocetos'), mosaicFinales = document.getElementById('mosaic-finales');
        const lightbox = document.getElementById('lightbox'), lightboxImg = document.getElementById('lightbox-img'), lightboxClose = document.getElementById('lightbox-close');
        let galleryImages = [], currentImageIndex = 0;
        
        const createMosaicItem = (src, alt, index) => {
            const itemDiv = document.createElement('div'); itemDiv.className = 'mosaic-item';
            const img = document.createElement('img'); img.src = src; img.alt = alt;
            img.addEventListener('click', () => { currentImageIndex = index; openLightbox(); });
            itemDiv.appendChild(img); return itemDiv;
        };
        
        const populateGalleries = () => {
            let imageIndexCounter = 0; galleryImages = []; mosaicBocetos.innerHTML = ''; mosaicFinales.innerHTML = '';
            for (let i = 1; i <= 12; i++) {
                const src = `assets/img/sanjacinto/boceto${String(i).padStart(2, '0')}.png`; galleryImages.push(src);
                mosaicBocetos.appendChild(createMosaicItem(src, `Boceto ${i}`, imageIndexCounter++));
            }
            for (let i = 1; i <= 12; i++) {
                const src = `assets/img/sanjacinto/final${String(i).padStart(2, '0')}.png`; galleryImages.push(src);
                mosaicFinales.appendChild(createMosaicItem(src, `Final ${i}`, imageIndexCounter++));
            }
        };
        
        const updateLightboxImage = () => { if (galleryImages.length > 0) { lightboxImg.style.opacity = 0; setTimeout(() => { lightboxImg.src = galleryImages[currentImageIndex]; lightboxImg.style.opacity = 1; }, 100); } };
        const showNextImage = () => { currentImageIndex = (currentImageIndex + 1) % galleryImages.length; updateLightboxImage(); };
        const showPrevImage = () => { currentImageIndex = (currentImageIndex - 1 + galleryImages.length) % galleryImages.length; updateLightboxImage(); };
        const openLightbox = () => { updateLightboxImage(); lightbox.classList.add('visible'); };
        const closeLightbox = () => { lightbox.classList.remove('visible'); };
        
        lightboxClose.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
        document.getElementById('lightbox-prev').addEventListener('click', showPrevImage); document.getElementById('lightbox-next').addEventListener('click', showNextImage);
        populateGalleries();

        // REPRODUCTOR PORTAFOLIO
        const gridItems = document.querySelectorAll('#portafolio .grid-item');
        gridItems.forEach(item => {
            if (item.id !== 'co-laboratorio-grid-item' && item.id !== 'web-grid-item') item.originalContent = item.innerHTML;
            item.addEventListener('click', function() {
                if (this.id === 'co-laboratorio-grid-item') { window.location.href = 'co-laboratorio.html'; return; }
                if (this.id === 'web-grid-item') { window.open('colmena.html', '_blank'); return; }
                const isPlaying = this.querySelector('iframe');
                gridItems.forEach(otherItem => { if (otherItem.id !== 'co-laboratorio-grid-item' && otherItem.id !== 'web-grid-item' && otherItem.originalContent) otherItem.innerHTML = otherItem.originalContent; });
                if (!isPlaying) {
                    const embedUrl = this.dataset.vimeoId ? `https://player.vimeo.com/video/${this.dataset.vimeoId}?autoplay=1` : this.dataset.youtubeId ? `https://www.youtube.com/embed/${this.dataset.youtubeId}?autoplay=1` : '';
                    if (embedUrl) {
                        const iframe = document.createElement('iframe'); iframe.src = embedUrl; iframe.style.cssText = 'width:100%; height:100%; border:none;'; iframe.setAttribute('allow', 'autoplay; fullscreen');
                        this.innerHTML = ''; this.appendChild(iframe); if (iframe.requestFullscreen) iframe.requestFullscreen();
                    }
                }
            });
        });

                    'cta-quote': 'COTIZA TU PROYECTO', 
                    'nav-portfolio': 'Portafolio', 'nav-courses': 'Cursos', 'nav-blog': 'Blog', 'nav-contact': 'Contacto',
                    'intro-text': 'Estos son algunos de los últimos proyectos del Laboratorio de Arte Generativo. Haz clic en cualquiera de ellos para verlos en acción.', 
                    'cat-music': 'Videos Musicales', 'cat-shorts': 'Cortos Animados', 'cat-web': 'Páginas Web', 'cat-music-projects': 'Co-Laboratorio',
                    
                    'blog-title': 'PETER GABRIEL - SAN JACINTO', 
                    'p1': 'La idea central del video es el poder de la comunidad. Buscamos representar la experiencia espiritual de San Jacinto —el crecimiento interior de un joven que presencia la desaparición de su comunidad y territorio— y, al mismo tiempo, el otro gran mensaje de la canción: la importancia de mantenerse firme ante las adversidades de la sociedad moderna.', 
                    'p2': 'Esperamos que el video no solo capture este mensaje, sino que también refleje que su creación es el resultado de un proceso comunitario. Compartimos ideas, herramientas y flujos de trabajo para crear y ensamblar cada elemento. Para lograrlo, el uso de herramientas generativas se complementó con técnicas tradicionales de animación y edición.', 
                    'p3': 'Nos honra formar parte de la iniciativa 5050, continuar con el importante legado de Peter Gabriel y unirnos a esta comunidad de increíbles artistas visuales.', 
                    
                    'solsbury-title': 'PETER GABRIEL - SOLSBURY HILL', 
                    'solsbury-p1': 'Crear una animación para una canción tan legendaria como "Solsbury Hill" ha sido un profundo honor para nuestro equipo. Como piedra angular del legado de Peter Gabriel, es una pista que ha conmovido a generaciones desde 1977 y que ocupa un lugar especial en nuestras propias historias.', 
                    'solsbury-p2': 'Nuestra animación busca capturar el poderoso mensaje central de la canción: el coraje de soltar y abrazar un nuevo comienzo, incluso frente a un futuro desconocido. Nos inspiramos en la rica historia visual de la canción, que entrelaza trabajos de directores como Graham Dean y Peter Campus, y presenta notablemente extractos de la película \'Cabbages\' de David Stewart y Wesley West. Buscamos reinterpretar estos elementos colectivos para expresar el momento crucial de transformación cuando Peter se embarcó en su viaje en solitario después de Genesis.', 
                    'solsbury-p3': 'Este tema también es profundamente personal para nosotros. En muchos sentidos, la animación es una alegoría de nuestros propios viajes. Cada miembro de nuestro equipo ha dado un salto de fe similar, dejando atrás la certeza para seguir una vida en el arte, un camino lleno de desafíos, pero también de una increíble satisfacción.', 
                    
                    'section-title-process': 'NUESTRO PROCESO CREATIVO: DEL TRAZO A MANO A LA ANIMACIÓN FINAL', 
                    'p4': 'En Alter.Lab trabajamos en constante diálogo con las técnicas clásicas del arte visual y las nuevas herramientas generativas, que permiten flujos mucho más eficientes en el proceso creativo.', 
                    'p5': 'Desde el dibujo convencional para crear bocetos y storyboards, hasta el video final, nuestras manos siguen siendo parte fundamental en el proceso de animación.', 
                    'p6': 'Esta combinación de técnicas y oficios, nos permite no sólo crear obras de mayor profundidad, sino controlar mucho mejor el resultado final de una animación, lo que significa mayor eficiencia y por lo tanto menor cantidad de recursos energéticos y menores costos monetarios.', 
                    'p7': 'Una vez creado el storyboard, que además se trata de un proceso colectivo en el que los integrantes del colectivo dialogamos sobre las mejores formas de abordar la historia, lo siguiente es definir el estilo visual y crear las imágenes que servirán de puntos de arranque en la animación. Esto se hace en entornos locales con herramientas como los modelos disponibles en Forge UI y/o ComfyUI, y herramientas en línea como Flux y Midjourney.', 
                    'p8': 'De la misma forma, la generación de videos se realiza de manera local en modelos de código abierto como Deforum, Wan y CogVideo. Para animaciones más finas usamos los modelos convencionales como Vidu, Kling y Veo. Por último el proceso de edición se realiza en Davinci Resolve Studio 19.', 
                    'p9': 'Durante el proceso, para consistencia y control de personajes y escenarios, utilizamos modelado en 3D y programas como Blender, para encontrar frames precisos que nos permiten resolver ideas concretas que de otra forma la arbitrariedad de los modelos generativos no pueden manejar.', 
                    
                    'pg-5050-title': 'SÍGUENOS EN EL PROYECTO 50:50 DE PETER GABRIEL', 
                    'pg-5050-desc1': 'Hay momentos que definen el viaje de un colectivo. Para nosotros en ALTER.LAB, este es uno de ellos.', 
                    'pg-5050-desc2': 'Desde que iniciamos nuestro laboratorio de arte generativo, hemos sostenido una creencia fundamental: que la tecnología no es un fin, sino un puente. Un lenguaje para tejer nuevas formas de belleza y, sobre todo, para construir comunidad. Soñábamos con encontrar ecos de esta visión en el mundo.', 
                    'pg-5050-desc3': 'Hoy, con una emoción que apenas cabe en palabras, anunciamos que hemos encontrado ese eco en un lugar que antes solo podíamos admirar desde la distancia: el universo del legendario Peter Gabriel.', 
                    'pg-5050-desc4': 'Nos sentimos profundamente honrados de anunciar nuestra participación en 5050.dev, su revolucionaria iniciativa de colaboración global para que diversos artistas visuales animen su importante legado sonoro.', 
                    'pg-5050-desc5': 'Que una leyenda de su talla no solo abrace las nuevas herramientas creativas, sino que las utilice para fomentar un ecosistema más justo y colaborativo, es una inspiración inmensa. Es la confirmación que el futuro del arte también se escribe en plural.', 
                    'pg-5050-desc6': 'Hemos volcado nuestro corazón y nuestro trabajo en dar vida visual a algunas de sus piezas musicales más hermosas. Pronto estrenaremos otro hermoso video para una de las canciones más icónicas de Peter Gabriel así que no te pierdas los detalles en nuestro perfil en la página oficial del proyecto 5050.dev:', 
                    
                    'ecos-title': 'ECOS DE FUEGO EN EL DESIERTO - CORTO ANIMADO', 
                    'ecos-p1': 'Un joven recuerda a su madre, desaparecida forzadamente en México. Desde el desierto, su voz regresa para consolarlo y darle esperanza. A través de su presencia espectral, ella no solo reconforta a su hijo, sino que también se convierte en un símbolo de resistencia para otras personas que sufren la misma tragedia. Este corto animado explora el amor, el duelo y la lucha por la justicia en un contexto de desapariciones forzadas.', 
                    'ecos-tech': 'Esta #animación fue creada mayoritariamente con herramientas de Código Abierto. Basada en el cuento "Morenito" de Omar Durán Guerra.', 
                    
                    'announcements-title': 'ANUNCIOS', 
                    'fest-italy-desc': 'Estamos profundamente honrados de anunciar que nuestro cortometraje ha sido seleccionado oficialmente para el <a href="https://www.futurefilmfestival.it/it/" target="_blank">24FRAME Future Film Fest 2025</a> en Módena, Italia. Este reconocimiento nos llena de alegría y refuerza nuestro compromiso con el cine como herramienta de transformación social. Agradecemos al equipo del festival por valorar nuestro trabajo y darnos la oportunidad de compartirlo en este prestigioso espacio. En los próximos días compartiremos más detalles sobre fechas y horarios de exhibición. Invitamos a todos a seguir de cerca la programación de este importante festival que celebra las nuevas voces del cine.', 
                    'fest-russia-desc': 'Estamos profundamente honrados de anunciar que nuestro cortometraje ha sido seleccionado oficialmente para el <a href="https://neuro-masters.com/" target="_blank">Neuro Masters AI Film Festival 2025</a>, que se llevará a cabo el 6 de junio en Moscú, Rusia. Este reconocimiento nos llena de entusiasmo y refuerza nuestra convicción de que el cine, apoyado por la inteligencia artificial, puede abrir nuevas rutas para la reflexión crítica y la transformación social. Agradecemos al equipo del festival por valorar nuestro trabajo y brindarnos la oportunidad de compartirlo en este espacio tan innovador. En los próximos días compartiremos más información sobre la programación y los horarios de exhibición. Invitamos a todas y todos a seguir de cerca las actividades de este festival que celebra las posibilidades creativas entre el arte y la tecnología.',
                    
                    'cursos-intro': 'Programas y talleres especializados.',

                    'c2-title': 'TALLER: DESARROLLO WEB CON HERRAMIENTAS GENERATIVAS', 'c2-desc': '¿No sabes programar pero quieres crear sitios web únicos, visualmente poderosos y completamente personalizados? Este taller está diseñado para llevarte paso a paso por el proceso de construcción de una página web integrando herramientas generativas para potenciar el diseño y la interactividad.', 'c2-lt': '¿Qué aprenderás?', 'c2-l1': 'Fundamentos para crear una página web desde cero.', 'c2-l2': 'Uso de herramientas generativas para imágenes, animaciones y entornos interactivos.', 'c2-l3': 'Introducción a modelos 3D y su integración en web.', 'c2-l4': 'Flujo completo de trabajo para desarrollos web creativos y funcionales.', 'c2-dur': 'Duración: 4 sesiones de 2 horas', 'c2-stat': 'No disponible',

                en: {
                    'label-core': 'CORE', 'label-work': 'PORTFOLIO', 'label-logs': 'LOGS', 'label-learn': 'COURSES', 'label-ping': 'SIGNAL',
                    'hero-title': 'GENERATIVE ART LABORATORY',

                    'cta-portfolio': 'EXPLORE WORKS', 
                    'cta-quote': 'QUOTE YOUR PROJECT', 
                    'nav-portfolio': 'Portfolio', 'nav-courses': 'Courses', 'nav-blog': 'Blog', 'nav-contact': 'Contact',
                    'intro-text': 'These are some of the latest projects from the Generative Art Laboratory. Click on any of them to see them in action.', 
                    'cat-music': 'Music Videos', 'cat-shorts': 'Animated Shorts', 'cat-web': 'Websites', 'cat-music-projects': 'Co-Laboratorio',
                    
                    'blog-title': 'PETER GABRIEL - SAN JACINTO', 
                    'p1': 'The central idea of the video is the power of community. We seek to represent the spiritual experience of San Jacinto—the inner growth of a young man witnessing the disappearance of his community and territory—and, at the same time, the other great message of the song: the importance of standing firm against the adversities of modern society.', 
                    'p2': 'We hope the video not only captures this message but also reflects that its creation is the result of a community process. We shared ideas, tools, and workflows to create and assemble each element. To achieve this, the use of generative tools was complemented by traditional animation and editing techniques.', 
                    'p3': 'We are honored to be part of the 5050 initiative, to continue the important legacy of Peter Gabriel, and to join this community of incredible visual artists.', 
                    
                    'solsbury-title': 'PETER GABRIEL - SOLSBURY HILL', 
                    'solsbury-p1': 'Creating an animation for a song as legendary as "Solsbury Hill" has been a profound honor for our team. As a cornerstone of Peter Gabriel\'s legacy, it\'s a track that has moved generations since 1977, and one that holds a special place in our own stories.', 
                    'solsbury-p2': 'Our animation aims to capture the song\'s powerful core message: the courage to let go and embrace a new beginning, even in the face of an unknown future. We drew inspiration from the rich visual history of the song, which weaves together work from directors like Graham Dean and Peter Campus, and notably features excerpts from the film \'Cabbages\' by David Stewart and Wesley West. We sought to reinterpret these collective elements to express the pivotal moment of transformation as Peter embarked on his solo journey after Genesis.', 
                    'solsbury-p3': 'This theme is also deeply personal to us. In many ways, the animation is an allegory for our own journeys. Every member of our team has taken a similar leap of faith, leaving certainty behind to pursue a life in art—a path filled with challenges, but also with incredible satisfaction.', 
                    
                    'section-title-process': 'OUR CREATIVE PROCESS: FROM HAND SKETCH TO FINAL ANIMATION', 
                    'p4': 'At Alter.Lab, we work in constant dialogue with classic visual art techniques and new generative tools, which enable much more efficient workflows in the creative process.', 
                    'p5': 'From conventional drawing to create sketches and storyboards, to the final video, our hands remain a fundamental part of the animation process.', 
                    'p6': 'This combination of techniques and crafts allows us not only to create works of greater depth but also to better control the final result of an animation, which means greater efficiency and therefore fewer energy resources and lower monetary costs.', 
                    'p7': 'Once the storyboard is created—a collective process where our members discuss the best ways to approach the story—the next step is to define the visual style and create the keyframes for the animation. This is done in local environments with tools like models available in Forge UI and/or ComfyUI, and online tools such as Flux and Midjourney.', 
                    'p8': 'Similarly, video generation is performed locally on open-source models like Deforum, Wan, and CogVideo. For finer animations, we use conventional models like Vidu, Kling, and Veo. Finally, the editing process is carried out in DaVinci Resolve Studio 19.', 
                    'p9': 'During the process, for consistency and control of characters and scenery, we use 3D modeling and programs like Blender to find precise frames that allow us to resolve specific ideas that the randomness of generative models cannot otherwise handle.', 
                    
                    'pg-5050-title': 'FOLLOW US ON PETER GABRIEL\'S 50:50 PROJECT', 
                    'pg-5050-desc1': 'There are moments that define the journey of a collective. For us at ALTER.LAB, this is one of them.', 
                    'pg-5050-desc2': 'Since we started our generative art laboratory, we have held a fundamental belief: that technology is not an end, but a bridge. A language to weave new forms of beauty and, above all, to build community. We dreamed of finding echoes of this vision in the world.', 
                    'pg-5050-desc3': 'Today, with an emotion that can barely be contained, we announce that we have found that echo in a place we could previously only admire from a distance: the universe of the legendary Peter Gabriel.', 
                    'pg-5050-desc4': 'We are deeply honored to announce our participation in 5050.dev, his revolutionary global collaboration initiative for diverse visual artists to animate his important sonic legacy.', 
                    'pg-5050-desc5': 'That a legend of his stature not only embraces new creative tools but also uses them to foster a fairer and more collaborative ecosystem is an immense inspiration. It is confirmation that the future of art is also written in the plural.', 
                    'pg-5050-desc6': 'We have poured our heart and work into visually bringing to life some of his most beautiful musical pieces. We will soon premiere another beautiful video for one of Peter Gabriel\'s most iconic songs, so don\'t miss the details on our profile on the official 5050.dev project page:', 
                    
                    'ecos-title': 'FIRE ECHOES IN THE DESERT - ANIMATED SHORT', 
                    'ecos-p1': 'A young man remembers his mother, who was forcibly disappeared in Mexico. From the desert, her voice returns to comfort him and offer hope. Through her spectral presence, she not only consoles her son but also becomes a symbol of resistance for other persons enduring the same tragedy. This animated short explores love, grief, and the fight for justice in the context of forced disappearances.', 
                    'ecos-tech': 'This #animation was primarily created using open-source tools. Based on the short story "Morenito" by Omar Durán Guerra.', 
                    
                    'announcements-title': 'ANNOUNCEMENTS', 
                    'fest-italy-desc': 'We are deeply honored to announce that our short film has been officially selected for the <a href="https://www.futurefilmfestival.it/it/" target="_blank">24FRAME Future Film Fest 2025</a> in Modena, Italy. This recognition fills us with joy and reinforces our commitment to cinema as a tool for social transformation. We thank the festival team for valuing our work and giving us the opportunity to share it in this prestigious space. In the coming days, we will share more details about screening dates and times. We invite everyone to closely follow the schedule of this important festival celebrating new voices in cinema.', 
                    'fest-russia-desc': 'We are deeply honored to announce that our short film has been officially selected for the <a href="https://neuro-masters.com/" target="_blank">Neuro Masters AI Film Festival 2025</a>, taking place on June 6th in Moscow, Russia. This recognition fills us with enthusiasm and reinforces our conviction that cinema, supported by artificial intelligence, can open new paths for critical reflection and social transformation. We thank the festival team for valuing our work and providing us the opportunity to share it in such an innovative space. In the coming days, we will share more information about the schedule and exhibition times. We invite everyone to closely follow the activities of this festival celebrating the creative possibilities between art and technology.',
                    
                    'cursos-intro': 'Specialized programs and workshops.',
                    'c1-title': 'INTENSIVE WORKSHOP: MUSIC VIDEO CREATION', 'c1-desc': 'In this intensive workshop we have prepared for you, you will learn to create striking audiovisual pieces using the most powerful generative tools of the moment. From image and animation generation to professional video editing, you will master the entire creative workflow in just 4 sessions.', 'c1-lt': 'What will you learn?', 'c1-l1': 'Mapping and practical use of specialized visual creation AIs.', 'c1-l2': 'Creation of images and animations for music videos.', 'c1-l3': 'Video editing with professional tools.', 'c1-l4': 'Optimized workflows for high-impact results.', 'c1-dur': 'Duration: 4 sessions of 2 hours', 'c1-stat': 'Unavailable',
                    'c2-title': 'WORKSHOP: GENERATIVE WEB DEVELOPMENT', 'c2-desc': 'Don\'t know how to code but want to create unique, visually powerful, and completely personalized websites? This workshop is designed to take you step by step through the process of building a webpage, integrating generative tools to enhance design and interactivity.', 'c2-lt': 'What will you learn?', 'c2-l1': 'Fundamentals to create a webpage from scratch.', 'c2-l2': 'Use of generative tools for images, animations, and interactive environments.', 'c2-l3': 'Introduction to 3D models and their web integration.', 'c2-l4': 'Complete workflow for creative and functional web development.', 'c2-dur': 'Duration: 4 sessions of 2 hours', 'c2-stat': 'Unavailable',
                    'c3-title': 'COURSE: ARTIFICIAL INTELLIGENCE FOR CREATIVE AGENCIES', 'c3-desc': 'Are you falling behind in the new technological revolution? Do subscription costs make you think working with AI is not viable for your agency? In this workshop, you will discover how to fully leverage generative tools to professionalize and accelerate your creative flow, without restrictions or extra expenses.', 'c3-lt': 'What will you learn?', 'c3-l1': 'Unlimited access and use of specialized generative tools.', 'c3-l2': 'Creation of images, animations, special effects, music, sounds, and voices.', 'c3-l3': '3D modeling, character consistency, and interactive environments.', 'c3-l4': 'Efficient integration with DaVinci Resolve and Blender for high-level post-production.', 'c3-dur': 'Duration: 4 sessions of 2 hours (extra sessions as needed)', 'c3-stat': 'Course not available',

                    'blog-title': 'PETER GABRIEL - SAN JACINTO', 
                    'p1': "L'idée centrale de la vidéo est le pouvoir de la communauté. Nous cherchons à représenter l'expérience spirituelle de San Jacinto —la croissance intérieure d'un jeune homme témoin de la disparition de sa communauté et de son territoire— et, en même temps, l'autre grand message de la chanson : l'importance de rester ferme face aux adversités de la société moderne.", 
                    'p2': "Nous espérons que la vidéo non seulement capture ce message, mais reflète également que sa création est le résultat d'un processus communautaire. Nous avons partagé des idées, des outils et des flux de travail pour créer et assembler chaque élément. Pour y parvenir, l'utilisation d'outils génératifs a été complétée par des techniques traditionnelles d'animation et de montage.", 
                    'p3': "Nous sommes honorés de faire partie de l'initiative 5050, de poursuivre l'important héritage de Peter Gabriel et de rejoindre cette communauté d'incroyables artistes visuels.", 
                    
                    'solsbury-title': 'PETER GABRIEL - SOLSBURY HILL', 
                    'solsbury-p1': 'Créer une animation pour une chanson aussi légendaire que "Solsbury Hill" a été un profond honneur pour notre équipe. En tant que pierre angulaire de l\'héritage de Peter Gabriel, c\'est un morceau qui a ému des générations depuis 1977 et qui occupe une place spéciale dans nos propres histoires.', 
                    'solsbury-p2': 'Notre animation vise à capturer le message central puissant de la chanson : le courage de lâcher prise et d\'embrasser un nouveau départ, même face à un avenir inconnu. Nous nous sommes inspirés de la riche histoire visuelle de la chanson, qui entremêle les œuvres de réalisateurs comme Graham Dean et Peter Campus, et présente notamment des extraits du film \'Cabbages\' de David Stewart et Wesley West. Nous avons cherché à réinterpréter ces éléments collectifs pour exprimer le moment charnière de transformation lorsque Peter s\'est lancé dans son parcours solo après Genesis.', 
                    'solsbury-p3': 'Ce thème est également profondément personnel pour nous. À bien des égards, l\'animation est une allégorie de nos propres parcours. Chaque membre de notre équipe a fait un saut de foi similaire, laissant derrière lui la certitude pour poursuivre une vie dans l\'art — un chemin semé d\'embûches, mais aussi d\'une satisfaction incroyable.', 
                    
                    'section-title-process': "NOTRE PROCESSUS CRÉATIF : DU CROQUIS À LA MAIN À L'ANIMATION FINALE", 
                    'p4': "Chez Alter.Lab, nous travaillons en dialogue constant avec les techniques classiques de l'art visuel et les nouveaux outils génératifs, qui permettent des flux de travail beaucoup plus efficaces dans le processus créatif.", 
                    'p5': "Du dessin conventionnel pour créer des croquis et des storyboards à la vidéo finale, nos mains restent un élément fondamental du processus d'animation.", 
                    'p6': "Cette combinaison de techniques et de métiers nous permet non seulement de créer des œuvres d'une plus grande profondeur, mais aussi de mieux contrôler le résultat final d'une animation, ce qui se traduit par une plus grande efficacité et donc moins de ressources énergétiques et des coûts monétaires réduits.", 
                    'p7': "Une fois le storyboard créé —un processus collectif où nos membres discutent des meilleures façons d'aborder l'histoire—, l'étape suivante consiste à définir le style visuel et à créer les images clés pour l'animation. Ceci est réalisé dans des environnements locaux avec des outils comme les modèles disponibles dans Forge UI et/ou ComfyUI, et des outils en ligne comme Flux et Midjourney.", 
                    'p8': "De la même forme, la génération de vidéos est effectuée localement sur des modèles open source comme Deforum, Wan et CogVideo. Pour des animations plus fines, nous utilisons des modèles conventionnels comme Vidu, Kling et Veo. Enfin, le processus de montage est réalisé dans DaVinci Resolve Studio 19.", 
                    'p9': "Pendant le processus, pour la cohérence et le contrôle des personnages et des décors, nous utilisons la modélisation 3D et des programmes comme Blender pour trouver des images précises qui nous permettent de résoudre des idées spécifiques que l'arbitraire des modèles génératifs ne peut autrement gérer.", 
                    
                    'pg-5050-title': 'SUIVEZ-NOUS SUR LE PROJET 50:50 DE PETER GABRIEL', 
                    'pg-5050-desc1': "Il y a des moments qui définissent le parcours d'un collectif. Pour nous, chez ALTER.LAB, c'en est un.", 
                    'pg-5050-desc2': "Depuis que nous avons lancé notre laboratoire d'art génératif, nous avons maintenu une conviction fondamentale : la technologie n'est pas une fin, mais un pont. Un langage pour tisser de nouvelles formes de beauté et, surtout, pour construire une communauté. Nous rêvions de trouver des échos de cette vision dans le monde.", 
                    'pg-5050-desc3': "Aujourd'hui, avec une émotion à peine contenue, nous annonçons que nous avons trouvé cet écho dans un lieu que nous ne pouvions auparavant qu'admirer de loin : l'univers du légendaire Peter Gabriel.", 
                    'pg-5050-desc4': "Nous sommes profondément honorés d'annoncer notre participation à 5050.dev, son initiative révolutionnaire de collaboration mondiale permettant à divers artistes visuels d'animer son important héritage sonore.", 
                    'pg-5050-desc5': "Qu'une légende de sa stature n'embrasse pas seulement les nouveaux outils créatifs, mais les utilise également pour favoriser un écosystème plus juste et plus collaboratif, est une immense source d'inspiration. C'est la confirmation que l'avenir de l'art s'écrit aussi au pluriel.", 
                    'pg-5050-desc6': "Nous avons mis tout notre cœur et notre travail à donner vie visuelle à certaines de ses plus belles pièces musicales. Nous allons bientôt sortir une autre belle vidéo pour l'une des chansons les plus emblématiques de Peter Gabriel, alors ne manquez pas les détails sur notre profil sur la page officielle du projet 5050.dev :", 
                    
                    'ecos-title': 'ÉCHOS DE FEU DANS LE DÉSERT - COURT MÉTRAGE D\'ANIMATION', 
                    'ecos-p1': "Un jeune homme se souvient de sa mère, disparue de force au Mexique. Depuis le désert, sa voix revient pour le consoler et lui donner de l'espoir. À travers sa présence spectrale, elle ne réconforte pas seulement son fils, mais devient aussi un symbole de résistance pour d'autres personnes souffrant de la même tragédie. Ce court métrage d'animation explore l'amour, le deuil et la lutte pour la justice dans un contexte de disparitions forcées.", 
                    'ecos-tech': 'Cette #animation a été créée principalement avec des outils Open Source. Basée sur la nouvelle "Morenito" d\'Omar Durán Guerra.', 
                    
                    'announcements-title': 'ANNONCES', 
                    'fest-italy-desc': "Nous sommes profondément honorés d'annoncer que notre court métrage a été officiellement sélectionné pour le <a href='https://www.futurefilmfestival.it/it/' target='_blank'>24FRAME Future Film Fest 2025</a> à Modène, en Italie. Cette reconnaissance nous remplit de joie et renforce notre engagement envers le cinéma comme outil de transformation sociale. Nous remercions l'équipe du festival de valoriser notre travail et de nous donner l'opportunité de le partager dans cet espace prestigieux. Dans les prochains jours, nous partagerons plus de détails sur les dates et horaires de projection. Nous invitons tout le monde à suivre de près la programmation de cet important festival qui célèbre les nouvelles voix du cinéma.", 
                    'fest-russia-desc': "Nous sommes profondément honorés d'annoncer que notre court métrage a été officiellement sélectionné pour le <a href='https://neuro-masters.com/' target='_blank'>Neuro Masters AI Film Festival 2025</a>, qui aura lieu le 6 juin à Moscou, en Russie. Cette reconnaissance nous remplit d'enthousiasme et renforce notre conviction que le cinéma, soutenu par l'intelligence artificielle, peut ouvrir de nouvelles voies à la réflexion critique et à la transformation sociale. Nous remercions l'équipe du festival de valoriser notre travail et de nous offrir l'opportunité de le partager dans cet espace si innovant. Dans les prochains jours, nous partagerons plus d'informations sur la programmation et les horaires de projection. Nous invitons toutes et tous à suivre de près les activités de ce festival qui célèbre les possibilités créatives entre l'art et la technologie.",
                    
                    'cursos-intro': 'Programmes et ateliers spécialisés.',
                    'c1-title': 'ATELIER INTENSIF : CRÉATION DE VIDÉOS MUSICALES', 'c1-desc': 'Dans cet atelier intensif que nous avons préparé pour vous, vous apprendrez à créer des œuvres audiovisuelles percutantes en utilisant les outils génératifs les plus puissants du moment. De la génération d\'images et d\'animations au montage vidéo professionnel, vous maîtriserez tout le flux de travail créatif en seulement 4 sessions.', 'c1-lt': 'Ce que vous apprendrez', 'c1-l1': 'Cartographie et utilisation pratique d\'IA spécialisées dans la création visuelle.', 'c1-l2': 'Création d\'images et d\'animations pour des clips vidéo.', 'c1-l3': 'Montage vidéo avec des outils professionnels.', 'c1-l4': 'Flux de travail optimisés pour des résultats à fort impact.', 'c1-dur': 'Durée : 4 sessions de 2 heures', 'c1-stat': 'Indisponible',
                    'c2-title': 'ATELIER : DÉVELOPPEMENT WEB AVEC OUTILS GÉNÉRATIFS', 'c2-desc': 'Vous ne savez pas coder mais vous souhaitez créer des sites web uniques, visuellement puissants et entièrement personnalisés ? Cet atelier est conçu pour vous guider pas à pas dans le processus de création d\'une page web en intégrant des outils génératifs pour améliorer le design et l\'interactivité.', 'c2-lt': 'Ce que vous apprendrez', 'c2-l1': 'Bases pour créer une page web à partir de zéro.', 'c2-l2': 'Utilisation d\'outils génératifs pour les images, animations et environnements interactifs.', 'c2-l3': 'Introduction aux modèles 3D et leur intégration web.', 'c2-l4': 'Flux de travail complet pour un développement web créatif et fonctionnel.', 'c2-dur': 'Durée : 4 sessions de 2 heures', 'c2-stat': 'Indisponible',
                    'c3-title': 'COURS : INTELLIGENCE ARTIFICIELLE POUR LES AGENCES CRÉATIVES', 'c3-desc': 'Prenez-vous du retard dans la nouvelle révolution technologique ? Les coûts d\'abonnement vous font-ils penser que travailler avec l\'IA n\'est pas viable pour votre agence ? Dans cet atelier, vous découvrirez comment tirer pleinement parti des outils génératifs pour professionnaliser et accélérer votre flux créatif, sans restrictions ni dépenses supplémentaires.', 'c3-lt': 'Ce que vous apprendrez', 'c3-l1': 'Accès et utilisation illimités d\'outils génératifs spécialisés.', 'c3-l2': 'Création d\'images, animations, effets spéciaux, musique, sons et voix.', 'c3-l3': 'Modélisation 3D, cohérence des personnages et environnements interactifs.', 'c3-l4': 'Intégration efficace avec DaVinci Resolve et Blender pour une post-production de haut niveau.', 'c3-dur': 'Durée : 4 sessions de 2 heures (sessions supplémentaires selon besoins)', 'c3-stat': 'Cours non disponible',
                    
                    'contactTitle': 'Contact', 'label-name': 'Nom', 'label-email': 'Email', 'label-subject': 'Sujet', 'label-message': 'Message', 'submit-button': 'Envoyer'
                }
            };
            
            function setLanguage(lang) {
                const langData = translations[lang];
                Object.keys(langData).forEach(key => { const el = document.getElementById(key); if (el) el.innerHTML = langData[key]; });
                document.querySelectorAll('.lang-switcher button').forEach(btn => btn.classList.remove('active'));
                document.getElementById('lang-' + lang).classList.add('active');
            }
            document.getElementById('lang-en').addEventListener('click', () => setLanguage('en'));
            document.getElementById('lang-es').addEventListener('click', () => setLanguage('es'));
            document.getElementById('lang-fr').addEventListener('click', () => setLanguage('fr'));
            setLanguage('es');
        });

        // THREE.JS FONDOS
        const scene = new THREE.Scene(), camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000), renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight); document.getElementById('canvas-container').appendChild(renderer.domElement);
        const posArray = new Float32Array(700 * 3); for(let i = 0; i < 700 * 3; i++) posArray[i] = (Math.random() - 0.5) * 15;
        const particlesGeometry = new THREE.BufferGeometry(); particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMesh = new THREE.Points(particlesGeometry, new THREE.PointsMaterial({ size: 0.02, color: 0x00E5FF, transparent: true, opacity: 0.8 })); scene.add(particlesMesh);
        const sphere = new THREE.Mesh(new THREE.IcosahedronGeometry(4, 1), new THREE.MeshBasicMaterial({ color: 0x00E5FF, wireframe: true, transparent: true, opacity: 0.1 })); scene.add(sphere); camera.position.z = 5;

        let mouseX = 0, mouseY = 0, scrollY = 0;
        document.addEventListener('mousemove', (e) => { mouseX = (e.clientX - window.innerWidth/2); mouseY = (e.clientY - window.innerHeight/2); });
        window.addEventListener('scroll', () => { scrollY = window.scrollY; });
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            sphere.rotation.y += 0.002 + (scrollY * 0.000005); sphere.rotation.x += 0.001;
            particlesMesh.rotation.y += 0.05 * ((mouseX * 0.001) - particlesMesh.rotation.y); particlesMesh.rotation.x += 0.05 * ((mouseY * 0.001) - particlesMesh.rotation.x); particlesMesh.rotation.z = clock.getElapsedTime() * 0.05;
            camera.position.y = -(scrollY * 0.001); renderer.render(scene, camera);
        }
        animate(); window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
