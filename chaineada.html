<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alter.Lab - Ecosistema Generativo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>

    <style>
        /* VARIABLES - Paleta Noir Brutalista */
        :root {
            --background-color: #050505; 
            --text-color: #FFFFFF;
            --secondary-text-color: #7a7a7a;
            --accent-color: #00E5FF; 
            --border-color: rgba(255, 255, 255, 0.12);
            --overlay-color: rgba(5, 5, 5, 0.75); 
            --font-main: 'Montserrat', sans-serif;
            --font-mono: 'JetBrains Mono', monospace; 
        }

        html.lenis, html.lenis body { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto !important; }
        .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
        .lenis.lenis-stopped { overflow: hidden; }
        .lenis.lenis-scrolling iframe { pointer-events: none; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { color: var(--text-color); font-family: var(--font-main); overflow-x: hidden; background-color: var(--background-color); }

        /* CAPAS DE FONDO */
        #background-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3; object-fit: cover; filter: brightness(0.4); }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
        .video-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--overlay-color); z-index: -1; pointer-events: none; }

        /* HEADER & NAVEGACIÓN FIJA */
        .main-header { 
            position: fixed; top: 0; width: 100%; z-index: 100; display: flex; justify-content: space-between; align-items: center; 
            padding: 1.5rem 3rem; border-bottom: 1px solid var(--border-color); background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(5px);
        }
        .logo a { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo img { height: 30px; width: auto; filter: grayscale(100%); transition: filter 0.3s;}
        .logo:hover img { filter: grayscale(0%); }
        .logo .logo-text { font-size: 1.2rem; font-weight: 900; letter-spacing: 2px; color: var(--text-color); }
        .main-nav { display: flex; gap: 2rem; }
        .nav-button { background: transparent; border: none; color: var(--secondary-text-color); cursor: pointer; text-decoration: none; font-family: var(--font-mono); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s ease; }
        .nav-button:hover, .nav-button.active { color: var(--text-color); }
        .lang-switcher button { background: none; border: none; color: var(--secondary-text-color); cursor: pointer; font-family: var(--font-mono); font-size: 0.8rem; transition: color 0.3s ease; margin-left: 10px; }
        .lang-switcher button:hover, .lang-switcher button.active { color: var(--text-color); font-weight: bold; }

        /* ESTRUCTURA BRUTALISTA POR SECCIONES */
        .section-container { display: flex; min-height: 100vh; border-bottom: 1px solid var(--border-color); padding-top: 80px; box-sizing: border-box; position: relative; z-index: 2; }
        .side-label { width: 150px; border-right: 1px solid var(--border-color); display: flex; justify-content: center; align-items: center; flex-shrink: 0; background: rgba(5,5,5,0.2); }
        .side-label h2 { writing-mode: vertical-rl; transform: rotate(180deg); font-size: clamp(4rem, 8vw, 10rem); font-weight: 900; line-height: 0.8; margin: 0; color: rgba(255, 255, 255, 0.05); text-transform: uppercase; letter-spacing: -5px; -webkit-text-stroke: 1px rgba(255,255,255,0.2); }
        .content-area { flex-grow: 1; padding: 4rem; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }

        /* INICIO (HERO) */
        .hero-text h1 { font-size: clamp(3rem, 6vw, 6rem); font-weight: 900; line-height: 0.9; letter-spacing: -2px; margin-bottom: 1.5rem; text-transform: uppercase; }
        .hero-text p { font-family: var(--font-mono); font-size: 1rem; color: var(--secondary-text-color); margin-bottom: 3rem; max-width: 500px; line-height: 1.6; }
        .cta-buttons-container { display: flex; gap: 15px; flex-wrap: wrap; }
        .cta-button { display: inline-block; border: 1px solid var(--border-color); padding: 15px 30px; color: var(--text-color); text-decoration: none; font-family: var(--font-mono); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; }
        .cta-button:hover { background: var(--text-color); color: var(--background-color); }

        /* PORTAFOLIO & CURSOS */
        .intro-text { font-family: var(--font-mono); color: var(--secondary-text-color); max-width: 600px; margin-bottom: 3rem; line-height: 1.5; font-size: 0.9rem; }
        .categories-container, .cursos-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1px; background: var(--border-color); border: 1px solid var(--border-color); }
        .category-block { background: rgba(5,5,5,0.6); backdrop-filter: blur(10px); padding: 2rem; display: flex; flex-direction: column; }
        .category-title { font-family: var(--font-mono); font-size: 0.8rem; text-transform: uppercase; color: var(--secondary-text-color); margin-bottom: 1rem; text-align: left; }
        
        .grid-item { position: relative; overflow: hidden; aspect-ratio: 16 / 9; background-color: #000; cursor: pointer; border: 1px solid var(--border-color); }
        .grid-item video, .grid-item iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(1.2); transition: all 0.5s ease; border: none; }
        .grid-item:hover video { filter: grayscale(0%) contrast(1); transform: scale(1.02); }
        .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; border: 1px solid var(--text-color); border-radius: 50%; display: flex; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; z-index: 10; }
        .play-icon::after { content: ''; display: block; border-style: solid; border-width: 8px 0 8px 12px; border-color: transparent transparent transparent var(--text-color); margin-left: 4px; }
        .grid-item:hover .play-icon { opacity: 1; }

        /* ======== NUEVO SISTEMA BLOG (SERPENTINA GSAP) ======== */
        .blog-area { padding: 0 !important; } /* Elimina padding para carril completo */
        .blog-row { width: 100%; border-bottom: 1px solid var(--border-color); overflow: hidden; }
        .blog-row:last-child { border-bottom: none; }
        
        .blog-track { display: flex; width: fit-content; min-width: 100%; }
        .blog-panel { width: calc(100vw - 150px); padding: 4rem; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; }
        
        /* Tipografía del Blog */
        .blog-panel h1, .blog-panel h2 { font-size: clamp(2rem, 4vw, 3.5rem); font-weight: 900; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 1.5rem; }
        .blog-panel h3 { font-family: var(--font-mono); font-size: 1rem; color: var(--accent-color); margin: 2rem 0 1rem 0; text-transform: uppercase; }
        .blog-panel p { font-size: 1.05rem; line-height: 1.7; color: var(--secondary-text-color); margin-bottom: 1.5rem; max-width: 800px; }
        .blog-panel a { color: var(--text-color); border-bottom: 1px solid var(--secondary-text-color); text-decoration: none; transition: all 0.3s; }
        .blog-panel a:hover { color: var(--accent-color); border-color: var(--accent-color); }
        
        .video-container { width: 100%; max-width: 800px; aspect-ratio: 16 / 9; margin-bottom: 2rem; border: 1px solid var(--border-color); background: #000; }
        .video-container iframe { width: 100%; height: 100%; border: none; filter: grayscale(100%); transition: filter 0.5s; }
        .video-container:hover iframe { filter: grayscale(0%); }

        .image-mosaic { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; margin: 2rem 0; max-width: 800px; background: var(--border-color); border: 1px solid var(--border-color); }
        .mosaic-item { position: relative; background: #000; aspect-ratio: 1; overflow: hidden; cursor: pointer; }
        .mosaic-item img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: all 0.4s ease; opacity: 0.7;}
        .mosaic-item:hover img { filter: grayscale(0%); opacity: 1; transform: scale(1.05); }

        .lightbox { position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; animation: fadeIn 0.3s ease; }
        .lightbox.visible { display: flex; }
        .lightbox-content { max-width: 85vw; max-height: 85vh; border: 1px solid var(--border-color); }
        .lightbox-close { position: absolute; top: 20px; right: 40px; color: var(--secondary-text-color); font-family: var(--font-mono); font-size: 2rem; cursor: pointer; transition: color 0.3s; }
        .lightbox-close:hover { color: #fff; }
        .lightbox-arrow { position: absolute; top: 50%; transform: translateY(-50%); color: var(--secondary-text-color); font-size: 2rem; cursor: pointer; padding: 20px; user-select: none; transition: color 0.3s; z-index: 1001; }
        .lightbox-arrow:hover { color: #fff; }
        #lightbox-prev { left: 20px; } #lightbox-next { right: 20px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* CURSOS */
        .course-card { background: rgba(5,5,5,0.6); padding: 3rem; display: flex; flex-direction: column; justify-content: space-between; }
        .course-card h3 { font-size: 1.5rem; font-weight: 800; text-transform: uppercase; margin-bottom: 1.5rem; line-height: 1.2; }
        .course-card p { color: var(--secondary-text-color); line-height: 1.6; margin-bottom: 1.5rem; }
        .course-card ul { margin-left: 1.5rem; margin-bottom: 2rem; color: var(--secondary-text-color); line-height: 1.6; }
        .course-meta { font-family: var(--font-mono); font-size: 0.8rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem; display: flex; justify-content: space-between; color: var(--text-color); }
        .status-badge { background: var(--border-color); padding: 4px 8px; border-radius: 2px; }

        /* CONTACTO */
        .contact-form-wrapper { background: rgba(5,5,5,0.4); border: 1px solid var(--border-color); padding: 3rem; max-width: 800px; backdrop-filter: blur(5px); }
        .contact-form-wrapper h2 { font-size: 2rem; font-weight: 900; margin-bottom: 2rem; text-transform: uppercase; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--secondary-text-color); font-family: var(--font-mono); font-size: 0.75rem; text-transform: uppercase; }
        .form-group input, .form-group textarea { width: 100%; padding: 15px; background: transparent; border: 1px solid var(--border-color); color: var(--text-color); font-family: var(--font-main); font-size: 1rem; transition: border-color 0.3s; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--accent-color); }
        .row { display: flex; gap: 1.5rem; } .col-md-6 { flex: 1; }
        .submit-btn { background: var(--text-color); color: var(--background-color); border: none; padding: 15px 30px; font-family: var(--font-mono); font-size: 0.9rem; text-transform: uppercase; font-weight: bold; cursor: pointer; transition: opacity 0.3s; margin-top: 1rem; }
        .submit-btn:hover { opacity: 0.8; }

        .page-footer { padding: 2rem; text-align: center; border-top: 1px solid var(--border-color); z-index: 2; position: relative;}
        .social-links a { color: var(--secondary-text-color); font-size: 1.5rem; margin: 0 15px; transition: color 0.3s; }
        .social-links a:hover { color: var(--text-color); }

        /* RESPONSIVE: Apagar horizontal en móviles */
        @media (max-width: 900px) {
            .main-header { flex-direction: column; padding: 1rem; gap: 1rem;}
            .section-container { flex-direction: column; }
            .side-label { width: 100%; border-right: none; border-bottom: 1px solid var(--border-color); padding: 1rem 0;}
            .side-label h2 { writing-mode: horizontal-tb; transform: none; font-size: 3rem; letter-spacing: 0;}
            .content-area { padding: 2rem; }
            
            /* Anular comportamiento Horizontal */
            .blog-area { padding: 0 !important; }
            .blog-track { flex-direction: column !important; width: 100% !important; transform: none !important; }
            .blog-panel { width: 100% !important; padding: 2rem !important; border-bottom: 1px solid var(--border-color); }
            .blog-panel:last-child { border-bottom: none; }
            
            .row { flex-direction: column; gap: 0;}
            .image-mosaic { grid-template-columns: repeat(2, 1fr); }
            .cursos-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="background-video">
        <source src="assets/videos/web05.webm" type="video/webm">
        <source src="assets/videos/web05.mp4" type="video/mp4">

                    <div class="category-block"><h2 class="category-title" id="cat-shorts"></h2><div class="grid-item gsap-media" data-vimeo-id="1096475811"><video autoplay muted loop playsinline><source src="assets/videos/portafolio02.webm" type="video/mp4"></video><div class="play-icon"></div></div></div>
                    <div class="category-block"><h2 class="category-title" id="cat-web"></h2><div class="grid-item gsap-media" id="web-grid-item"><video autoplay muted loop playsinline><source src="assets/videos/portafolio03.webm" type="video/mp4"></video></div></div>
                    <div class="category-block"><h2 class="category-title" id="cat-music-projects"></h2><div class="grid-item gsap-media" id="co-laboratorio-grid-item"><video autoplay muted loop playsinline><source src="assets/videos/portafolio04.webm" type="video/mp4"></video></div></div>
                </div>
            </div>

                <div class="blog-row">

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: false, mirror: true, offset: 50 });

        const lenis = new Lenis({ duration: 1.2, easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), smooth: true });
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time)=>{ lenis.raf(time * 1000); });
        gsap.ticker.lagSmoothing(0);
        
        gsap.registerPlugin(ScrollTrigger);

        // ANIMACIÓN DE MEDIOS
        gsap.utils.toArray('.gsap-media').forEach(media => { gsap.fromTo(media, { y: 40, scale: 0.98 }, { y: 0, scale: 1, ease: "none", scrollTrigger: { trigger: media, start: "top 95%", end: "bottom 20%", scrub: 1 } }); });

        // ===== LÓGICA DE SERPENTINA HORIZONTAL PARA EL BLOG =====
        let mm = gsap.matchMedia();
        mm.add("(min-width: 901px)", () => {
            
            // Carriles moviéndose a la Izquierda
            gsap.utils.toArray('.track-left').forEach(track => {
                let scrollWidth = track.scrollWidth - track.parentElement.offsetWidth;
                gsap.fromTo(track, { x: 0 }, { 
                    x: -scrollWidth, ease: "none", 
                    scrollTrigger: { trigger: track.parentElement, start: "top bottom", end: "bottom top", scrub: 1 }
                });
            });

            // Carriles moviéndose a la Derecha (Arrancan en -scrollWidth y van a 0)
            gsap.utils.toArray('.track-right').forEach(track => {
                let scrollWidth = track.scrollWidth - track.parentElement.offsetWidth;
                gsap.fromTo(track, { x: -scrollWidth }, { 
                    x: 0, ease: "none", 
                    scrollTrigger: { trigger: track.parentElement, start: "top bottom", end: "bottom top", scrub: 1 }
                });
            });

        });

        // LIGHTBOX Y MOSAICO
        const mosaicBocetos = document.getElementById('mosaic-bocetos'), mosaicFinales = document.getElementById('mosaic-finales');
        const lightbox = document.getElementById('lightbox'), lightboxImg = document.getElementById('lightbox-img'), lightboxClose = document.getElementById('lightbox-close');
        let galleryImages = [], currentImageIndex = 0;
        
        const createMosaicItem = (src, alt, index) => {
            const itemDiv = document.createElement('div'); itemDiv.className = 'mosaic-item';
            const img = document.createElement('img'); img.src = src; img.alt = alt;
            img.addEventListener('click', () => { currentImageIndex = index; openLightbox(); });
            itemDiv.appendChild(img); return itemDiv;
        };
        
        const populateGalleries = () => {
            let imageIndexCounter = 0; galleryImages = []; mosaicBocetos.innerHTML = ''; mosaicFinales.innerHTML = '';
            for (let i = 1; i <= 12; i++) {
                const src = `assets/img/sanjacinto/boceto${String(i).padStart(2, '0')}.png`; galleryImages.push(src);
                mosaicBocetos.appendChild(createMosaicItem(src, `Boceto ${i}`, imageIndexCounter++));
            }
            for (let i = 1; i <= 12; i++) {
                const src = `assets/img/sanjacinto/final${String(i).padStart(2, '0')}.png`; galleryImages.push(src);
                mosaicFinales.appendChild(createMosaicItem(src, `Final ${i}`, imageIndexCounter++));
            }
        };
        
        const updateLightboxImage = () => { if (galleryImages.length > 0) { lightboxImg.style.opacity = 0; setTimeout(() => { lightboxImg.src = galleryImages[currentImageIndex]; lightboxImg.style.opacity = 1; }, 100); } };
        const showNextImage = () => { currentImageIndex = (currentImageIndex + 1) % galleryImages.length; updateLightboxImage(); };
        const showPrevImage = () => { currentImageIndex = (currentImageIndex - 1 + galleryImages.length) % galleryImages.length; updateLightboxImage(); };
        const openLightbox = () => { updateLightboxImage(); lightbox.classList.add('visible'); };
        const closeLightbox = () => { lightbox.classList.remove('visible'); };
        
        lightboxClose.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
        document.getElementById('lightbox-prev').addEventListener('click', showPrevImage); document.getElementById('lightbox-next').addEventListener('click', showNextImage);
        populateGalleries();

        // REPRODUCTOR PORTAFOLIO
        const gridItems = document.querySelectorAll('#portafolio .grid-item');
        gridItems.forEach(item => {
            if (item.id !== 'co-laboratorio-grid-item' && item.id !== 'web-grid-item') item.originalContent = item.innerHTML;
            item.addEventListener('click', function() {
                if (this.id === 'co-laboratorio-grid-item') { window.location.href = 'co-laboratorio.html'; return; }
                if (this.id === 'web-grid-item') { window.open('colmena.html', '_blank'); return; }
                const isPlaying = this.querySelector('iframe');
                gridItems.forEach(otherItem => { if (otherItem.id !== 'co-laboratorio-grid-item' && otherItem.id !== 'web-grid-item' && otherItem.originalContent) otherItem.innerHTML = otherItem.originalContent; });
                if (!isPlaying) {
                    const embedUrl = this.dataset.vimeoId ? `https://player.vimeo.com/video/${this.dataset.vimeoId}?autoplay=1` : this.dataset.youtubeId ? `https://www.youtube.com/embed/${this.dataset.youtubeId}?autoplay=1` : '';
                    if (embedUrl) {
                        const iframe = document.createElement('iframe'); iframe.src = embedUrl; iframe.style.cssText = 'width:100%; height:100%; border:none;'; iframe.setAttribute('allow', 'autoplay; fullscreen');
                        this.innerHTML = ''; this.appendChild(iframe); if (iframe.requestFullscreen) iframe.requestFullscreen();
                    }
                }
            });
        });

        // THREE.JS FONDOS
        const scene = new THREE.Scene(), camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000), renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight); document.getElementById('canvas-container').appendChild(renderer.domElement);
        const posArray = new Float32Array(700 * 3); for(let i = 0; i < 700 * 3; i++) posArray[i] = (Math.random() - 0.5) * 15;
        const particlesGeometry = new THREE.BufferGeometry(); particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMesh = new THREE.Points(particlesGeometry, new THREE.PointsMaterial({ size: 0.02, color: 0x00E5FF, transparent: true, opacity: 0.8 })); scene.add(particlesMesh);
        const sphere = new THREE.Mesh(new THREE.IcosahedronGeometry(4, 1), new THREE.MeshBasicMaterial({ color: 0x00E5FF, wireframe: true, transparent: true, opacity: 0.1 })); scene.add(sphere); camera.position.z = 5;

        let mouseX = 0, mouseY = 0, scrollY = 0;
        document.addEventListener('mousemove', (e) => { mouseX = (e.clientX - window.innerWidth/2); mouseY = (e.clientY - window.innerHeight/2); });
        window.addEventListener('scroll', () => { scrollY = window.scrollY; });
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            sphere.rotation.y += 0.002 + (scrollY * 0.000005); sphere.rotation.x += 0.001;
            particlesMesh.rotation.y += 0.05 * ((mouseX * 0.001) - particlesMesh.rotation.y); particlesMesh.rotation.x += 0.05 * ((mouseY * 0.001) - particlesMesh.rotation.x); particlesMesh.rotation.z = clock.getElapsedTime() * 0.05;
            camera.position.y = -(scrollY * 0.001); renderer.render(scene, camera);
        }
        animate(); window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
