    <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Montserrat:wght@400;700&display=swap');

    :root {
        --background-color: #050505;
        --text-color: #FFFFFF;
        --secondary-text-color: #d1d1d1;
        --accent-color: #ccff00; /* Neon yellow del primer video */
        --ui-font: 'Space Mono', monospace;
    }
    
    /* FIX PARA LENIS SMOOTH SCROLL */
    html.lenis, html.lenis body { height: auto; }
    .lenis.lenis-smooth { scroll-behavior: auto !important; }
    .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
    .lenis.lenis-stopped { overflow: hidden; }
    .lenis.lenis-scrolling iframe { pointer-events: none; }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { color: var(--text-color); background-color: var(--background-color); overflow-x: hidden; font-family: var(--ui-font); }
    
    /* VIDEO DE FONDO Y CANVAS 3D (Heredado del Blog) */
    #background-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; object-fit: cover; filter: brightness(0.2); }
    #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

    /* HEADER Y MENÚ */
    .container-header { position: relative; z-index: 100; width: 100%; display: flex; justify-content: center; align-items: center; padding: 30px 0; mix-blend-mode: difference; }
    .header-content { display: flex; flex-direction: column; align-items: center; gap: 15px; }
    .logo a { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-direction: column; }
    .logo img { height: 40px; width: auto; }
    .logo .logo-text { font-size: 1.5rem; font-weight: 700; letter-spacing: 2px; color: #fff; font-family: 'Montserrat', sans-serif; }
    .lang-switcher button { font-family: var(--ui-font); background: transparent; border: 1px solid #fff; color: #fff; padding: 5px 10px; margin: 0 5px; cursor: pointer; border-radius: 4px; transition: all 0.3s ease; }
    .lang-switcher button:hover { background-color: var(--accent-color); color: #000; border-color: var(--accent-color); }
    .lang-switcher button.active { background-color: #fff; color: #000; border-color: #fff; font-weight: 700; }
    .main-nav { display: flex; gap: 15px; }
    .nav-button { background: transparent; border: none; color: #aaa; cursor: pointer; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; transition: color 0.3s; }
    .nav-button:hover, .nav-button.active { color: #fff; }
    
    /* PANEL DE CONTROL DE FUENTES */
    .typo-controls { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; align-items: center; gap: 15px; mix-blend-mode: difference; }
    .api-status { font-size: 0.7rem; color: var(--accent-color); text-transform: uppercase; }
    .typo-button { background: transparent; color: #fff; border: 1px solid #fff; padding: 8px 16px; font-family: var(--ui-font); font-size: 0.8rem; cursor: pointer; border-radius: 4px; text-transform: uppercase; transition: all 0.2s; }
    .typo-button:hover { background: #fff; color: #000; }

    /* EL CORAZÓN DE LA FUSIÓN: GRID DENSO PARA EL BLOG */
    .collage-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        grid-auto-rows: 150px; 
        grid-auto-flow: dense;
        gap: 0; /* Estilo bloques unidos */
        width: 100vw;
        padding: 20px 0;
        position: relative;
        z-index: 10;
    }

    .typo-block {
        padding: 30px;
        box-sizing: border-box;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: center;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.05); /* División sutil */
    }

    /* Contenedor interno del texto para fitText */
    .content {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        line-height: 1.1;
        word-wrap: break-word;
        font-size: 150px; /* Tamaño inicial masivo para reducirlo en JS */
    }

    .content a { color: inherit; text-decoration: underline; }

    /* Estilos específicos para bloques multimedia (Videos / Galerías) */
    .media-block { padding: 0; background: #000 !important; }
    .media-block iframe { width: 100%; height: 100%; border: 0; pointer-events: auto; }
    .media-block .image-mosaic { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(4, 1fr); width: 100%; height: 100%; gap: 2px; }
    .mosaic-item { overflow: hidden; width: 100%; height: 100%; }
    .mosaic-item img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; transition: transform 0.3s; }
    .mosaic-item:hover img { transform: scale(1.1); }

    /* Tamaños de Grid predefinidos */
    .span-col-1 { grid-column: span 1; }
    .span-col-2 { grid-column: span 2; }
    .span-col-3 { grid-column: span 3; }
    .span-col-4 { grid-column: span 4; }
    .span-col-5 { grid-column: span 5; }
    .span-col-full { grid-column: 1 / -1; }
    
    .span-row-1 { grid-row: span 1; }
    .span-row-2 { grid-row: span 2; }
    .span-row-3 { grid-row: span 3; }
    .span-row-4 { grid-row: span 4; }

    /* Lightbox heredado */
    .lightbox { position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.95); display: none; justify-content: center; align-items: center; animation: fadeIn 0.3s ease; }
    .lightbox.visible { display: flex; }
    .lightbox-content { max-width: 85vw; max-height: 85vh; transition: opacity 0.2s; }
    .lightbox-close { position: absolute; top: 15px; right: 35px; color: #fff; font-size: 40px; cursor: pointer; z-index: 2002; }
    .lightbox-arrow { position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 2rem; cursor: pointer; padding: 16px; z-index: 2001; border-radius: 8px; }
    #lightbox-prev { left: 15px; } #lightbox-next { right: 15px; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    @media (max-width: 768px) {
        .span-col-4, .span-col-5 { grid-column: span 3; }
        .span-row-4 { grid-row: span 3; }
    }
    @media (max-width: 480px) {
        .span-col-3, .span-col-4, .span-col-5 { grid-column: span 2; }
        .collage-container { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    }
    </style>
</head>

    <script>
        // --- 1. CONFIGURACIÓN API TYPO ---
        const GOOGLE_FONTS_API_KEY = 'AIzaSyCkyQg1NrksDeP1-gLSd8XA-lZi19g73HA'; 
        let globalFonts = []; 
        const fallbackFonts = [
            "Anton", "Bebas Neue", "Cinzel", "DM Sans", "Lora", "Montserrat", "Oswald", "Pacifico", "Playfair Display", "Space Mono", "Syne", "Abril Fatface", "Archivo Black", "Bungee", "Cabin", "Cormorant Garamond", "Dancing Script", "Outfit", "Righteous", "Rubik", "Teko", "Ubuntu", "League Gothic", "Arvo", "Chivo", "Concert One", "Inter"
        ].map(name => ({ family: name }));

        // Paleta de colores agresiva basada en tu video
        const colorPairs = [
            { bg: '#050505', text: '#ccff00' }, // Negro / Neon Yellow
            { bg: '#2900ff', text: '#ffffff' }, // Azul fuerte / Blanco
            { bg: '#ff0055', text: '#050505' }, // Rosa / Negro
            { bg: '#ccff00', text: '#050505' }, // Neon Yellow / Negro
            { bg: '#ffffff', text: '#050505' }, // Blanco / Negro
            { bg: '#050505', text: '#ffffff' }  // Negro / Blanco
        ];

        // --- 2. LOGICA LAZY LOAD Y RANDOMIZE ---
        function injectFontStyles(fontFamily) {
            const fontID = 'font-' + fontFamily.replace(/\s+/g, '-').toLowerCase();
            if (!document.getElementById(fontID)) {
                const link = document.createElement('link');
                link.id = fontID; link.rel = 'stylesheet';
                link.href = `https://fonts.googleapis.com/css2?family=${fontFamily.replace(/\s+/g, '+')}:wght@400;700&display=swap`;
                document.head.appendChild(link);
            }
        }

        async function fetchGoogleFonts() {
            const statusEl = document.getElementById('api-status');
            if (GOOGLE_FONTS_API_KEY === 'TU_API_KEY_AQUI') {
                globalFonts = fallbackFonts;
                statusEl.innerText = "Modo Offline";
                return;
            }
            try {
                const res = await fetch(`https://www.googleapis.com/webfonts/v1/webfonts?key=${GOOGLE_FONTS_API_KEY}&sort=popularity`);
                if (!res.ok) throw new Error("API Limit");
                const data = await res.json();
                globalFonts = data.items;
                statusEl.innerText = `${globalFonts.length} FUENTES`;
            } catch (error) {
                globalFonts = fallbackFonts;
                statusEl.innerText = "Error API";
            }
        }

        // --- 3. FIT TEXT ALGORITMO ---
        // Exprime el texto para que quepa en su "bento box"
        function fitText(block) {
            const content = block.querySelector('.content');
            if(!content) return;
            
            // Si el bloque está oculto o sin tamaño, no calcular
            if(block.clientWidth === 0) return;

            let fontSize = 150; 
            content.style.fontSize = fontSize + 'px';
            const maxWidth = block.clientWidth - 40; 
            const maxHeight = block.clientHeight - 40;

            while ((content.scrollWidth > maxWidth || content.scrollHeight > maxHeight) && fontSize > 10) {
                fontSize -= 2;
                content.style.fontSize = fontSize + 'px';
            }
        }

        function randomizeAllBlocks() {
            const blocks = document.querySelectorAll('.typo-block.text-block');
            
            // Animación de salida breve
            gsap.to(blocks, {
                opacity: 0.2, scale: 0.95, duration: 0.2, 
                onComplete: () => {
                    blocks.forEach(block => {
                        const fontObj = globalFonts[Math.floor(Math.random() * globalFonts.length)];
                        const colorPair = colorPairs[Math.floor(Math.random() * colorPairs.length)];
                        
                        injectFontStyles(fontObj.family);
                        
                        block.style.backgroundColor = colorPair.bg;
                        block.style.color = colorPair.text;
                        
                        const content = block.querySelector('.content');
                        content.style.fontFamily = `'${fontObj.family}', sans-serif`;
                        content.style.fontWeight = Math.random() > 0.5 ? 700 : 400;
                    });
                    
                    // Esperamos a que inyecte CSS para hacer fitText
                    setTimeout(() => {
                        blocks.forEach(fitText);
                        ScrollTrigger.refresh();
                        // Animación de entrada
                        gsap.to(blocks, { opacity: 1, scale: 1, duration: 0.5, stagger: 0.02, ease: "back.out(1.2)" });
                    }, 100);
                }
            });
        }

        // --- 4. DATA Y TRADUCCIONES DEL BLOG ---
        const translations = {
            es: { 'nav-blog': 'Blog', 'nav-portfolio': 'Portafolio', 'nav-courses': 'Cursos', 'contact-button': 'CONTACTO', 'blog-title': 'PETER GABRIEL - SAN JACINTO', 'p1': 'La idea central del video es el poder de la comunidad. Buscamos representar la experiencia espiritual de San Jacinto —el crecimiento interior de un joven que presencia la desaparición de su comunidad y territorio— y, al mismo tiempo, el otro gran mensaje de la canción: la importancia de mantenerse firme ante las adversidades de la sociedad moderna.', 'p2': 'Esperamos que el video no solo capture este mensaje, sino que también refleje que su creación es el resultado de un proceso comunitario. Compartimos ideas, herramientas y flujos de trabajo para crear y ensamblar cada elemento. Para lograrlo, el uso de herramientas generativas se complementó con técnicas tradicionales de animación y edición.', 'p3': 'Nos honra formar parte de la iniciativa 5050, continuar con el importante legado de Peter Gabriel y unirnos a esta comunidad de increíbles artistas visuales.', 'solsbury-title': 'PETER GABRIEL - SOLSBURY HILL', 'solsbury-p1': 'Crear una animación para una canción tan legendaria como "Solsbury Hill" ha sido un profundo honor para nuestro equipo. Como piedra angular del legado de Peter Gabriel, es una pista que ha conmovido a generaciones desde 1977 y que ocupa un lugar especial en nuestras propias historias.', 'solsbury-p2': 'Nuestra animación busca capturar el poderoso mensaje central de la canción: el coraje de soltar y abrazar un nuevo comienzo, incluso frente a un futuro desconocido. Nos inspiramos en la rica historia visual de la canción, que entrelaza trabajos de directores como Graham Dean y Peter Campus, y presenta notablemente extractos de la película \'Cabbages\' de David Stewart y Wesley West. Buscamos reinterpretar estos elementos colectivos para expresar el momento crucial de transformación cuando Peter se embarcó en su viaje en solitario después de Genesis.', 'solsbury-p3': 'Este tema también es profundamente personal para nosotros. En muchos sentidos, la animación es una alegoría de nuestros propios viajes. Cada miembro de nuestro equipo ha dado un salto de fe similar, dejando atrás la certeza para seguir una vida en el arte, un camino lleno de desafíos, pero también de una increíble satisfacción.', 'section-title-process': 'NUESTRO PROCESO CREATIVO', 'p4': 'En Alter.Lab trabajamos en constante diálogo con las técnicas clásicas del arte visual y las nuevas herramientas generativas.', 'p5': 'Desde el dibujo convencional para crear bocetos y storyboards, hasta el video final, nuestras manos siguen siendo parte fundamental en el proceso de animación.', 'p6': 'Esta combinación de técnicas y oficios, nos permite no sólo crear obras de mayor profundidad, sino controlar mucho mejor el resultado final.', 'p7': 'Esto se hace en entornos locales con herramientas como los modelos disponibles en Forge UI y/o ComfyUI, y herramientas en línea como Flux.', 'p8': 'La generación de videos se realiza de manera local en modelos de código abierto como Deforum, Wan y CogVideo.', 'p9': 'Durante el proceso utilizamos modelado en 3D y programas como Blender para resolver ideas concretas.', 'pg-5050-title': 'PROYECTO 50:50', 'pg-5050-desc1': 'Hay momentos que definen el viaje de un colectivo.', 'pg-5050-desc2': 'Desde que iniciamos nuestro laboratorio hemos sostenido una creencia fundamental: que la tecnología no es un fin, sino un puente.', 'pg-5050-desc3': 'Hoy anunciamos que hemos encontrado ese eco en el universo del legendario Peter Gabriel.', 'pg-5050-desc4': 'Nos sentimos honrados de anunciar nuestra participación en 5050.dev.', 'pg-5050-desc5': 'Es la confirmación que el futuro del arte también se escribe en plural.', 'pg-5050-desc6': 'Hemos volcado nuestro corazón y nuestro trabajo en dar vida visual a sus piezas.', 'ecos-title': 'ECOS DE FUEGO EN EL DESIERTO', 'ecos-p1': 'Un joven recuerda a su madre, desaparecida forzadamente en México. Este corto animado explora el amor, el duelo y la lucha por la justicia.', 'ecos-tech': 'Esta animación fue creada mayoritariamente con herramientas de Código Abierto. Basada en el cuento "Morenito".', 'announcements-title': 'ANUNCIOS', 'fest-italy-desc': 'Selección Oficial para el 24FRAME Future Film Fest 2025 en Módena, Italia. Refuerza nuestro compromiso con el cine como herramienta de transformación social.', 'fest-russia-desc': 'Selección Oficial para el Neuro Masters AI Film Festival 2025 en Moscú, Rusia. El cine, apoyado por la IA, puede abrir nuevas rutas.' },
            en: { 'nav-blog': 'Blog', 'nav-portfolio': 'Portfolio', 'nav-courses': 'Courses', 'contact-button': 'CONTACT', 'blog-title': 'PETER GABRIEL - SAN JACINTO', 'p1': 'The central idea of the video is the power of community. We seek to represent the spiritual experience of San Jacinto—the inner growth of a young man witnessing the disappearance of his community and territory—and, at the same time, the other great message of the song: the importance of standing firm against the adversities of modern society.', 'p2': 'We hope the video not only captures this message but also reflects that its creation is the result of a community process. We shared ideas, tools, and workflows to create and assemble each element. To achieve this, the use of generative tools was complemented by traditional animation and editing techniques.', 'p3': 'We are honored to be part of the 5050 initiative, to continue the important legacy of Peter Gabriel, and to join this community of incredible visual artists.', 'solsbury-title': 'PETER GABRIEL - SOLSBURY HILL', 'solsbury-p1': 'Creating an animation for a song as legendary as "Solsbury Hill" has been a profound honor for our team. As a cornerstone of Peter Gabriel\'s legacy, it\'s a track that has moved generations since 1977, and one that holds a special place in our own stories.', 'solsbury-p2': 'Our animation aims to capture the song\'s powerful core message: the courage to let go and embrace a new beginning, even in the face of an unknown future. We drew inspiration from the rich visual history of the song, which weaves together work from directors like Graham Dean and Peter Campus, and notably features excerpts from the film \'Cabbages\' by David Stewart and Wesley West. We sought to reinterpret these collective elements to express the pivotal moment of transformation as Peter embarked on his solo journey after Genesis.', 'solsbury-p3': 'This theme is also deeply personal to us. In many ways, the animation is an allegory for our own journeys. Every member of our team has taken a similar leap of faith, leaving certainty behind to pursue a life in art—a path filled with challenges, but also with incredible satisfaction.', 'section-title-process': 'OUR CREATIVE PROCESS', 'p4': 'At Alter.Lab, we work in constant dialogue with classic visual art techniques and new generative tools.', 'p5': 'From conventional drawing to create sketches and storyboards, to the final video, our hands remain a fundamental part of the animation process.', 'p6': 'This combination of techniques and crafts allows us not only to create works of greater depth but also to better control the final result.', 'p7': 'This is done in local environments with tools like models available in Forge UI and online tools such as Flux.', 'p8': 'Video generation is performed locally on open-source models like Deforum, Wan, and CogVideo.', 'p9': 'During the process, we use 3D modeling and programs like Blender to resolve specific ideas.', 'pg-5050-title': '50:50 PROJECT', 'pg-5050-desc1': 'There are moments that define the journey of a collective.', 'pg-5050-desc2': 'Since we started our laboratory, we have held a fundamental belief: that technology is not an end, but a bridge.', 'pg-5050-desc3': 'Today we announce that we have found that echo in the universe of the legendary Peter Gabriel.', 'pg-5050-desc4': 'We are deeply honored to announce our participation in 5050.dev.', 'pg-5050-desc5': 'It is confirmation that the future of art is also written in the plural.', 'pg-5050-desc6': 'We have poured our heart and work into visually bringing to life his pieces.', 'ecos-title': 'FIRE ECHOES IN THE DESERT', 'ecos-p1': 'A young man remembers his mother, forcibly disappeared in Mexico. This animated short explores love, grief, and the fight for justice.', 'ecos-tech': 'This animation was primarily created using open-source tools. Based on the short story "Morenito".', 'announcements-title': 'ANNOUNCEMENTS', 'fest-italy-desc': 'Official Selection for the 24FRAME Future Film Fest 2025 in Modena, Italy. Reinforces our commitment to cinema as a tool for social transformation.', 'fest-russia-desc': 'Official Selection for the Neuro Masters AI Film Festival 2025 in Moscow, Russia. Cinema, supported by AI, can open new paths.' },
            fr: { 'nav-blog': 'Blog', 'nav-portfolio': 'Portfolio', 'nav-courses': 'Cours', 'contact-button': 'CONTACT', 'blog-title': 'PETER GABRIEL - SAN JACINTO', 'p1': "L'idée centrale de la vidéo est le pouvoir de la communauté. Nous cherchons à représenter l'expérience spirituelle de San Jacinto —la croissance intérieure d'un jeune homme témoin de la disparition de sa communauté et de son territoire— et, en même temps, l'autre grand message de la chanson : l'importance de rester ferme face aux adversités de la société moderne.", 'p2': "Nous espérons que la vidéo non seulement capture ce message, mais reflète également que sa création es le résultat d'un processus communautaire. Nous avons partagé des idées, des outils et des flux de travail pour créer et assembler chaque élément. Pour y parvenir, l'utilisation d'outils génératifs a été complétée par des techniques traditionnelles d'animation et de montage.", 'p3': "Nous sommes honorés de faire partie de l'initiative 5050, de poursuivre l'important héritage de Peter Gabriel et de rejoindre cette communauté d'incroyables artistes visuels.", 'solsbury-title': 'PETER GABRIEL - SOLSBURY HILL', 'solsbury-p1': 'Créer une animation pour una chanson aussi légendaire que "Solsbury Hill" a été un profond honneur pour notre équipe. En tant que pierre angulaire de l\'héritage de Peter Gabriel, c\'est un morceau qui a ému des générations depuis 1977 et qui occupe une place spéciale dans nos propres histoires.', 'solsbury-p2': 'Notre animation vise à capturer le message central puissant de la chanson : le courage de lâcher prise et d\'embrasser un nouveau départ, même face à un avenir inconnu. Nous nous sommes inspirés de la riche histoire visuelle de la chanson, qui entremêle les œuvres de réalisateurs comme Graham Dean et Peter Campus, y presenta notablemente extractos de la película \'Cabbages\' de David Stewart y Wesley West. Buscamos reinterpretar estos elementos colectivos para expresar el momento crucial de transformación cuando Peter se embarcó en su viaje en solitario después de Genesis.', 'solsbury-p3': 'Ce thème est également profondément personnel pour nous. À bien des égards, l\'animation est une allégorie de nos propres parcours. Chaque membre de notre équipe a fait un saut de foi similaire, laissant derrière lui la certitude pour poursuivre une vie dans l\'art — un chemin semé d\'embûches, mais aussi d\'une satisfaction incroyable.', 'section-title-process': "NOTRE PROCESSUS CRÉATIF", 'p4': "Chez Alter.Lab, nous travaillons en dialogue constant avec les techniques classiques de l'art visuel et les nouveaux outils génératifs.", 'p5': "Du dessin conventionnel pour créer croquis et storyboards à la vidéo finale, nos mains restent un élément fondamental du processus d'animation.", 'p6': "Cette combinaison de techniques et de métiers nous permet non seulement de créer des œuvres d'une plus grande profondeur, mais aussi de mieux contrôler le résultat final.", 'p7': "Ceci est réalisé dans des environnements locaux avec des outils comme les modèles disponibles dans Forge UI et des outils en ligne comme Flux.", 'p8': "La génération de vidéos est effectuée localement sur des modèles open source comme Deforum, Wan et CogVideo.", 'p9': "Pendant le processus, nous utilisons la modélisation 3D et des programmes comme Blender pour résoudre des idées spécifiques.", 'pg-5050-title': 'PROJET 50:50', 'pg-5050-desc1': "Il y a des moments qui définissent le parcours d'un collectif.", 'pg-5050-desc2': "Depuis que nous avons lancé notre laboratoire, nous avons maintenu une conviction fondamentale : la technologie n'est pas une fin, mais un pont.", 'pg-5050-desc3': "Aujourd'hui nous annonçons que nous avons trouvé cet écho dans l'univers du légendaire Peter Gabriel.", 'pg-5050-desc4': "Nous sommes profondément honorés d'annoncer notre participation à 5050.dev.", 'pg-5050-desc5': "C'est la confirmation que l'avenir de l'art s'écrit aussi au pluriel.", 'pg-5050-desc6': "Nous avons mis tout notre cœur et notre travail à donner vie visuelle à ses pièces.", 'ecos-title': 'ÉCHOS DE FEU DANS LE DÉSERT', 'ecos-p1': "Un jeune homme se souvient de sa mère, disparue de force au Mexique. Ce court métrage d'animation explore l'amour, le deuil et la lutte pour la justice.", 'ecos-tech': 'Cette animation a été créée principalement avec des outils Open Source. Basée sur la nouvelle "Morenito".', 'announcements-title': 'ANNONCES', 'fest-italy-desc': "Sélection Officielle pour le 24FRAME Future Film Fest 2025 à Modène, Italie. Renforce notre engagement envers le cinéma comme outil de transformation sociale.", 'fest-russia-desc': "Sélection Officielle pour le Neuro Masters AI Film Festival 2025 à Moscou, Russie. Le cinéma, soutenu par l'IA, peut ouvrir de nouvelles voies." }
        };

        const langEnButton = document.getElementById('lang-en');
        const langEsButton = document.getElementById('lang-es');
        const langFrButton = document.getElementById('lang-fr');
        
        function setLanguage(lang) {
            const langData = translations[lang];
            Object.keys(langData).forEach(key => { 
                const element = document.getElementById(key); 
                if (element) { element.innerHTML = langData[key]; } 
            });
            langEnButton.classList.toggle('active', lang === 'en');
            langEsButton.classList.toggle('active', lang === 'es');
            langFrButton.classList.toggle('active', lang === 'fr');
            document.documentElement.lang = lang;
            
            // Re-aplicamos fitText después de cambiar idioma porque el largo de texto cambia
            setTimeout(() => {
                document.querySelectorAll('.typo-block.text-block').forEach(fitText);
                ScrollTrigger.refresh();
            }, 100);
        }

        langEnButton.addEventListener('click', () => setLanguage('en'));
        langEsButton.addEventListener('click', () => setLanguage('es'));
        langFrButton.addEventListener('click', () => setLanguage('fr'));

        // --- 5. LOGICA MOSAICO Y LIGHTBOX ---
        function initGallery() {
            const mosaicBocetos = document.getElementById('mosaic-bocetos');
            const mosaicFinales = document.getElementById('mosaic-finales');
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            let galleryImages = []; let currentImageIndex = 0;

            const createItem = (src, index) => {
                const item = document.createElement('div'); item.className = 'mosaic-item';
                const img = document.createElement('img'); img.src = src;
                img.addEventListener('click', () => { currentImageIndex = index; lightbox.classList.add('visible'); lightboxImg.src = galleryImages[currentImageIndex]; });
                item.appendChild(img); return item;
            };

            let index = 0;
            for(let i=1; i<=12; i++) {
                const src = `assets/img/sanjacinto/boceto${String(i).padStart(2, '0')}.png`;
                galleryImages.push(src); mosaicBocetos.appendChild(createItem(src, index++));
            }
            for(let i=1; i<=12; i++) {
                const src = `assets/img/sanjacinto/final${String(i).padStart(2, '0')}.png`;
                galleryImages.push(src); mosaicFinales.appendChild(createItem(src, index++));
            }

            document.getElementById('lightbox-close').addEventListener('click', () => lightbox.classList.remove('visible'));
            document.getElementById('lightbox-prev').addEventListener('click', () => { currentImageIndex = (currentImageIndex - 1 + galleryImages.length) % galleryImages.length; lightboxImg.src = galleryImages[currentImageIndex]; });
            document.getElementById('lightbox-next').addEventListener('click', () => { currentImageIndex = (currentImageIndex + 1) % galleryImages.length; lightboxImg.src = galleryImages[currentImageIndex]; });
        }

        // --- 6. INICIALIZACIÓN GLOBAL ---
        document.addEventListener('DOMContentLoaded', async () => {
            // Setup base
            setLanguage('es');
            initGallery();

            // Smooth Scroll Setup
            const lenis = new Lenis({ duration: 1.2, smooth: true });
            lenis.on('scroll', ScrollTrigger.update);
            gsap.ticker.add((time)=>{ lenis.raf(time * 1000); });
            gsap.ticker.lagSmoothing(0);
            gsap.registerPlugin(ScrollTrigger);

            // Fetch Fonts & Apply
            await fetchGoogleFonts();
            randomizeAllBlocks(); // Esto inyecta fonts, colores y hace el fitText inicial

            // Efecto Scroll para revelar los bloques (Bento Box Scroll)
            gsap.utils.toArray('.gsap-block').forEach(block => {
                gsap.fromTo(block, 
                    { y: 50, opacity: 0 }, 
                    { 
                        y: 0, opacity: 1, duration: 0.8, ease: "power2.out",
                        scrollTrigger: {
                            trigger: block,
                            start: "top 95%",
                            toggleActions: "play none none reverse"
                        }
                    }
                );
            });
            
            // Recalcular en resize
            window.addEventListener('resize', () => {
                document.querySelectorAll('.typo-block.text-block').forEach(fitText);
                ScrollTrigger.refresh();
            });
        });

        // --- 7. FONDO 3D (Heredado y preservado) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const particlesGeometry = new THREE.BufferGeometry(); const particlesCount = 700; const posArray = new Float32Array(particlesCount * 3);
        for(let i = 0; i < particlesCount * 3; i++) { posArray[i] = (Math.random() - 0.5) * 15; }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const material = new THREE.PointsMaterial({ size: 0.02, color: 0xccff00, transparent: true, opacity: 0.8 });
        const particlesMesh = new THREE.Points(particlesGeometry, material); scene.add(particlesMesh);
        const geometryWire = new THREE.IcosahedronGeometry(4, 1); const materialWire = new THREE.MeshBasicMaterial({ color: 0xccff00, wireframe: true, transparent: true, opacity: 0.1 });
        const sphere = new THREE.Mesh(geometryWire, materialWire); scene.add(sphere);
        camera.position.z = 5;
        let mouseX = 0; let mouseY = 0; let targetX = 0; let targetY = 0;
        document.addEventListener('mousemove', (event) => { mouseX = (event.clientX - window.innerWidth/2); mouseY = (event.clientY - window.innerHeight/2); });
        let scrollY = 0; window.addEventListener('scroll', () => { scrollY = window.scrollY; });
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();
            targetX = mouseX * 0.001; targetY = mouseY * 0.001;
            sphere.rotation.y += 0.002 + (scrollY * 0.000005); sphere.rotation.x += 0.001;
            particlesMesh.rotation.y += 0.05 * (targetX - particlesMesh.rotation.y);
            particlesMesh.rotation.x += 0.05 * (targetY - particlesMesh.rotation.x);
            particlesMesh.rotation.z = elapsedTime * 0.05;
            camera.position.y = -(scrollY * 0.001);
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
