<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYLINDER SYNTH - Studio Edition</title>
    <style>
        /* ESTILO VISUAL: SYNTHWAVE / INDUSTRIAL MODERNO */
        body { 
            margin: 0; 
            overflow: hidden; 
            background: radial-gradient(circle at center, #1a1a24 0%, #050508 100%); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 8, 0.85);
            backdrop-filter: blur(8px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 0.6s ease-out;
        }
        
        h1 { 
            color: #fff; 
            font-weight: 900;
            text-shadow: 0 0 10px rgba(0, 170, 255, 0.5), 0 0 30px rgba(0, 170, 255, 0.3); 
            font-size: 4rem; 
            margin: 0 0 10px 0; 
            text-align: center; 
            letter-spacing: 8px; 
        }
        
        p { 
            color: #8899aa; 
            font-size: 1.1rem; 
            margin-bottom: 40px; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        button {
            padding: 18px 60px; 
            border: 1px solid #00aaff; 
            background: rgba(0, 170, 255, 0.1);
            color: #00aaff; 
            font-size: 1.2rem; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-weight: bold; letter-spacing: 3px;
            border-radius: 50px;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.2), inset 0 0 10px rgba(0, 170, 255, 0.1);
            transition: all 0.3s ease;
        }
        button:hover { 
            background: #00aaff; 
            color: #000; 
            box-shadow: 0 0 30px #00aaff, inset 0 0 20px rgba(255,255,255,0.5); 
            transform: scale(1.05);
        }

        /* HUD - Efecto Cristal */
        #hud {
            position: absolute; top: 30px; left: 30px; color: #fff;
            pointer-events: none; 
            background: rgba(10, 15, 25, 0.4); 
            backdrop-filter: blur(10px);
            padding: 20px 25px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 0.95rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-family: 'Courier New', Courier, monospace;
        }
        .track { 
            opacity: 0.4; 
            margin-bottom: 8px; 
            transition: all 0.3s ease; 
            display: flex;
            align-items: center;
        }
        .active { 
            opacity: 1; 
            font-weight: bold; 
            color: #00ffcc; 
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5); 
            transform: translateX(5px);
        }
        .active::before {
            content: '';
            display: inline-block;
            width: 8px; height: 8px;
            background: #00ffcc;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px #00ffcc;
        }

        /* Osciloscopio Modernizado */
        #scope {
            position: absolute; bottom: 30px; right: 30px;
            width: 320px; height: 120px; 
            border: 1px solid rgba(0, 255, 204, 0.3);
            background: rgba(0, 10, 5, 0.6); 
            backdrop-filter: blur(5px);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(0, 255, 204, 0.05);
        }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="overlay">
        <h1>CYLINDER SYNTH</h1>
        <p>1-4: Selección de Pista | Q-P: Añadir Notas | ESPACIO: Borrar Pista</p>
        <button id="startBtn">Iniciar Sistema</button>
    </div>

    <div id="hud">
        <div id="t0" class="track active">[1] SUB-BASS</div>
        <div id="t1" class="track">[2] ATMÓSFERA</div>
        <div id="t2" class="track">[3] ACID LEAD</div>
        <div id="t3" class="track">[4] PERCUSIÓN</div>
        <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); color: #8899aa; font-size: 0.8rem;">
            SYS.STATUS: <span style="color:#0f0">EN LÍNEA</span>
        </div>
    </div>

    <canvas id="scope"></canvas>

    <script>
        // ==========================================
        // CONFIGURACIÓN (LÓGICA INTACTA)
        // ==========================================
        const CONFIG = {
            steps: 32,      
            tracks: 4,      
            bpm: 120,       
            radius: 6       
        };

        let activeTrack = 0;
        let isPlaying = false;
        let currentStep = 0;
        
        const sequenceData = [];
        for(let i=0; i<CONFIG.tracks; i++) {
            sequenceData.push(new Array(CONFIG.steps).fill(null));
        }

        // ==========================================
        // 1. MOTOR DE AUDIO (LÓGICA INTACTA)
        // ==========================================
        const AudioEngine = {
            ctx: null,
            analyser: null,
            masterGain: null,

            init: function() {
                const AC = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AC();
                
                this.masterGain = this.ctx.createGain();
                this.masterGain.gain.value = 0.5;

                this.analyser = this.ctx.createAnalyser();
                this.analyser.fftSize = 256;

                const delay = this.ctx.createDelay();
                delay.delayTime.value = 0.25; 
                const feedback = this.ctx.createGain();
                feedback.gain.value = 0.3;

                this.masterGain.connect(this.analyser);
                this.analyser.connect(this.ctx.destination);
                
                this.masterGain.connect(delay);
                delay.connect(feedback);
                feedback.connect(delay);
                feedback.connect(this.ctx.destination);
                
                if(this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },

            play: function(track, noteIdx) {
                if(!this.ctx) return;
                const t = this.ctx.currentTime;
                
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                if(track === 0) { 
                    osc.type = 'sawtooth';
                    osc.frequency.value = 55 + (noteIdx * 11);
                    const f = this.ctx.createBiquadFilter();
                    f.type = 'lowpass';
                    f.frequency.setValueAtTime(600, t);
                    f.frequency.linearRampToValueAtTime(100, t+0.3);
                    osc.connect(f);
                    f.connect(gain);
                    gain.gain.setValueAtTime(0.8, t);
                    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
                } 
                else if(track === 1) { 
                    osc.type = 'sine';
                    osc.frequency.value = 220 + (noteIdx * 55);
                    osc.connect(gain);
                    gain.gain.setValueAtTime(0, t);
                    gain.gain.linearRampToValueAtTime(0.3, t+0.1);
                    gain.gain.linearRampToValueAtTime(0, t+1.5);
                }
                else if(track === 2) { 
                    osc.type = 'square';
                    osc.frequency.value = 110 + (noteIdx * 110);
                    const f = this.ctx.createBiquadFilter();
                    f.type = 'lowpass';
                    f.Q.value = 10;
                    f.frequency.setValueAtTime(200, t);
                    f.frequency.linearRampToValueAtTime(2000, t+0.1); 
                    osc.connect(f);
                    f.connect(gain);
                    gain.gain.setValueAtTime(0.2, t);
                    gain.gain.exponentialRampToValueAtTime(0.01, t+0.3);
                } 
                else { 
                    osc.type = 'triangle'; 
                    osc.frequency.value = 100 + Math.random()*500;
                    osc.connect(gain);
                    gain.gain.setValueAtTime(0.5, t);
                    gain.gain.exponentialRampToValueAtTime(0.01, t+0.05);
                }

                if(track !== 0 && track !== 2) osc.connect(gain); 
                gain.connect(this.masterGain);
                
                osc.start();
                osc.stop(t+2.0);
            }
        };

        // ==========================================
        // 2. MOTOR GRÁFICO (REDISEÑO VISUAL)
        // ==========================================
        const scene = new THREE.Scene();
        // Fondo gris muy oscuro en lugar de negro puro
        scene.background = new THREE.Color(0x0a0a10);
        scene.fog = new THREE.FogExp2(0x0a0a10, 0.025);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        // Cámara ligeramente más cerca y dinámica
        camera.position.set(0, 12, 20);
        camera.lookAt(0, -2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Sombras suaves
        document.body.appendChild(renderer.domElement);

        // --- CUADRÍCULA HOLOGRÁFICA (NUEVO) ---
        const grid = new THREE.GridHelper(60, 60, 0x00aaff, 0x112233);
        grid.position.y = -8;
        grid.material.opacity = 0.2;
        grid.material.transparent = true;
        scene.add(grid);

        // --- CILINDRO PRINCIPAL ---
        const drumGroup = new THREE.Group();
        // Cilindro con material metálico premium
        const drumGeo = new THREE.CylinderGeometry(CONFIG.radius, CONFIG.radius, 14, 64);
        drumGeo.rotateZ(Math.PI/2); 
        const drumMat = new THREE.MeshStandardMaterial({ 
            color: 0x1a1a1a, 
            roughness: 0.3,  // Más brillante
            metalness: 0.9   // Muy metálico
        });
        const drum = new THREE.Mesh(drumGeo, drumMat);
        drum.receiveShadow = true;
        drumGroup.add(drum);

        // Anillos divisores (Visual mejorado)
        for(let i=0; i<CONFIG.tracks; i++) {
            const rGeo = new THREE.TorusGeometry(CONFIG.radius + 0.05, 0.06, 16, 100);
            const rMat = new THREE.MeshStandardMaterial({
                color: 0x222222,
                roughness: 0.5,
                metalness: 1.0
            });
            const rMesh = new THREE.Mesh(rGeo, rMat);
            rMesh.rotateY(Math.PI/2);
            rMesh.position.x = ((i / 3) * 6) - 3;
            drumGroup.add(rMesh);
        }
        scene.add(drumGroup);

        // --- BRAZOS LECTORES ---
        const arms = [];
        const indicators = [];
        
        for(let i=0; i<CONFIG.tracks; i++) {
            const armGroup = new THREE.Group();
            const xPos = ((i / 3) * 6) - 3;
            armGroup.position.set(xPos, CONFIG.radius + 1.5, 0);
            
            // Estructura del brazo metálica
            const boxMat = new THREE.MeshStandardMaterial({color: 0x555566, metalness: 0.6, roughness: 0.4});
            const box = new THREE.Mesh(new THREE.BoxGeometry(0.5, 3, 0.5), boxMat);
            box.castShadow = true;
            
            // Luz indicadora emisiva (Brilla en la oscuridad)
            const bulbGeo = new THREE.SphereGeometry(0.3, 16, 16);
            const bulbMat = new THREE.MeshStandardMaterial({
                color: 0x111111,
                emissive: 0x111111,
                emissiveIntensity: 1
            });
            const bulb = new THREE.Mesh(bulbGeo, bulbMat);
            bulb.position.set(0, 1, 0.5);
            
            armGroup.add(box);
            armGroup.add(bulb);
            
            indicators.push(bulbMat); // Guardamos el material para editar el emisivo
            arms.push(armGroup);
            scene.add(armGroup);
        }

        // --- LUCES (ESTILO CINEMÁTICO) ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.2); // Luz base muy tenue
        scene.add(ambient);
        
        // Luz principal cálida (Naranja)
        const spotWarm = new THREE.SpotLight(0xff5500, 2.5);
        spotWarm.position.set(15, 20, 15);
        spotWarm.castShadow = true;
        spotWarm.penumbra = 0.5;
        scene.add(spotWarm);

        // Luz de relleno fría (Azul/Cian)
        const lightCold = new THREE.PointLight(0x00aaff, 2, 40);
        lightCold.position.set(-15, 5, 10);
        scene.add(lightCold);

        // Luz rasante morada para reflejos
        const lightPurple = new THREE.PointLight(0xaa00ff, 1.5, 30);
        lightPurple.position.set(0, -5, -15);
        scene.add(lightPurple);

        // ==========================================
        // 3. LÓGICA DEL SISTEMA (LÓGICA INTACTA)
        // ==========================================
        
        function createPin(track, step) {
            if(sequenceData[track][step] && sequenceData[track][step].mesh) {
                drumGroup.remove(sequenceData[track][step].mesh);
            }

            // Púas ligeramente más estilizadas
            const geo = new THREE.BoxGeometry(0.25, 0.8, 0.25);
            
            // Colores Neón por pista
            const colors = [0xff0055, 0x00ffaa, 0xffaa00, 0x0088ff]; 
            
            // Material Emisivo para que las notas brillen
            const mat = new THREE.MeshStandardMaterial({ 
                color: colors[track],
                emissive: colors[track],
                emissiveIntensity: 0.8,
                metalness: 0.5,
                roughness: 0.2
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;

            const angle = ((step / CONFIG.steps) * Math.PI * 2) + (Math.PI / 2);
            const r = CONFIG.radius; 
            const x = ((track / 3) * 6) - 3;

            mesh.position.set(x, Math.sin(angle)*r, Math.cos(angle)*r);
            mesh.lookAt(x, 0, 0); 
            
            drumGroup.add(mesh);
            return mesh;
        }

        let lastTime = 0;
        const stepDuration = (60 / CONFIG.bpm) / 4; 

        function loop(time) {
            requestAnimationFrame(loop);
            const dt = (time - lastTime) / 1000;
            lastTime = time;

            if(isPlaying) {
                const fullRotation = CONFIG.steps * stepDuration;
                drumGroup.rotation.x += (Math.PI * 2 * dt) / fullRotation;

                let rot = drumGroup.rotation.x % (Math.PI * 2);
                if(rot < 0) rot += Math.PI * 2;
                
                let step = Math.floor((rot / (Math.PI * 2)) * CONFIG.steps);
                
                if(step >= CONFIG.steps) step = 0;
                if(step < 0) step = CONFIG.steps - 1;

                if(step !== currentStep) {
                    currentStep = step;
                    triggerStep(currentStep);
                }
            }

            renderer.render(scene, camera);
            drawScope();
        }

        // Definimos los colores base para cada brazo
        const indicatorColors = [0xff0055, 0x00ffaa, 0xffaa00, 0x0088ff];

        function triggerStep(step) {
            for(let t=0; t<CONFIG.tracks; t++) {
                // Reset visual (Apagar luz)
                indicators[t].emissive.setHex(0x111111);

                const data = sequenceData[t][step];
                
                if(data && data.note !== undefined) {
                    // SONIDO
                    AudioEngine.play(t, data.note);
                    
                    // LUZ (Prender con el color de la pista)
                    indicators[t].emissive.setHex(indicatorColors[t]);
                    
                    // MOVIMIENTO MECÁNICO 
                    const arm = arms[t];
                    arm.position.y -= 0.4; // Movimiento ligeramente más exagerado
                    setTimeout(() => { arm.position.y += 0.4 }, 80);
                }
            }
        }

        // ==========================================
        // 4. INTERACCIÓN (LÓGICA INTACTA)
        // ==========================================

        document.getElementById('startBtn').addEventListener('click', () => {
            AudioEngine.init(); 
            isPlaying = true;
            document.getElementById('overlay').style.opacity = 0;
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 600);
            loop(0);
        });

        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            
            if(['1','2','3','4'].includes(k)) {
                activeTrack = parseInt(k) - 1;
                document.querySelectorAll('.track').forEach((el, i) => {
                    if(i === activeTrack) el.classList.add('active');
                    else el.classList.remove('active');
                });
            }

            const notes = "qwertyuiop";
            const idx = notes.indexOf(k);
            if(idx > -1) {
                const mesh = createPin(activeTrack, currentStep);
                sequenceData[activeTrack][currentStep] = { note: idx, mesh: mesh };
                AudioEngine.play(activeTrack, idx);
            }

            if(e.code === 'Space') {
                for(let s=0; s<CONFIG.steps; s++) {
                    if(sequenceData[activeTrack][s]) {
                        drumGroup.remove(sequenceData[activeTrack][s].mesh);
                        sequenceData[activeTrack][s] = null;
                    }
                }
            }
        });

        // Osciloscopio Modernizado
        const cvs = document.getElementById('scope');
        const cCtx = cvs.getContext('2d');
        
        function drawScope() {
            if(!AudioEngine.analyser) return;
            const w = cvs.width;
            const h = cvs.height;
            const buffer = new Uint8Array(AudioEngine.analyser.frequencyBinCount);
            AudioEngine.analyser.getByteTimeDomainData(buffer);

            // Rastro más pronunciado
            cCtx.fillStyle = 'rgba(0, 15, 10, 0.3)';
            cCtx.fillRect(0,0,w,h);
            
            // Efecto Glow para la línea
            cCtx.shadowBlur = 10;
            cCtx.shadowColor = '#00ffcc';
            cCtx.lineWidth = 2.5;
            cCtx.strokeStyle = '#00ffcc';
            cCtx.beginPath();

            const slice = w / buffer.length;
            let x = 0;
            for(let i=0; i<buffer.length; i++) {
                const v = buffer[i] / 128.0;
                const y = v * h / 2;
                if(i===0) cCtx.moveTo(x,y);
                else cCtx.lineTo(x,y);
                x += slice;
            }
            cCtx.stroke();
            // Reset de sombra para no afectar el fondo
            cCtx.shadowBlur = 0; 
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
