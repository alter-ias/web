<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYLINDER SYNTH - Minimal Studio</title>
    <style>
        /* ESTILO VISUAL: MINIMALISTA Y ELEGANTE */
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #030304; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #fff;
        }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 3, 4, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 0.8s ease-out;
        }
        
        h1 { 
            font-weight: 300;
            font-size: 2.5rem; 
            margin: 0 0 10px 0; 
            letter-spacing: 12px; 
            color: #e0e0e0;
        }
        
        button {
            margin-top: 30px;
            padding: 12px 40px; 
            border: 1px solid #444; 
            background: transparent;
            color: #aaa; 
            font-size: 0.9rem; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 4px;
            transition: all 0.3s ease;
        }
        button:hover { 
            border-color: #fff; 
            color: #fff; 
            background: rgba(255,255,255,0.05);
        }

        /* HUD - Pistas (Arriba Izquierda) */
        #hud {
            position: absolute; top: 40px; left: 40px; 
            pointer-events: none; 
            font-size: 0.8rem;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 2px;
        }
        .track { 
            opacity: 0.3; 
            margin-bottom: 12px; 
            transition: all 0.3s ease; 
        }
        .active { 
            opacity: 1; 
            color: #fff; 
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5); 
        }

        /* Controles - Elegantes y pequeños (Abajo Derecha) */
        #controls-info {
            position: absolute; bottom: 30px; right: 40px;
            text-align: right;
            font-size: 0.7rem;
            color: #666;
            letter-spacing: 2px;
            line-height: 1.8;
            pointer-events: none;
        }
        #controls-info span { color: #aaa; }

        /* Osciloscopio - Abajo Centro */
        #scope {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 300px; height: 80px; 
            pointer-events: none;
            /* Sin fondo ni bordes para ser minimalista */
        }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="overlay">
        <h1>CYLINDER SYNTH</h1>
        <button id="startBtn">Iniciar Sistema</button>
    </div>

    <div id="hud">
        <div id="t0" class="track active">[1] SUB-BASS</div>
        <div id="t1" class="track">[2] ATMÓSFERA</div>
        <div id="t2" class="track">[3] ACID LEAD</div>
        <div id="t3" class="track">[4] PERCUSIÓN</div>
    </div>

    <div id="controls-info">
        <span>1-4:</span> SELECCIONAR PISTA<br>
        <span>Q-P:</span> AGREGAR NOTAS<br>
        <span>ESPACIO:</span> BORRAR PISTA
    </div>

    <canvas id="scope"></canvas>

    <script>
        // ==========================================
        // CONFIGURACIÓN
        // ==========================================
        const CONFIG = {
            steps: 32,      
            tracks: 4,      
            bpm: 120,       
            radius: 6       
        };

        let activeTrack = 0;
        let isPlaying = false;
        let currentStep = 0;
        
        const sequenceData = [];
        for(let i=0; i<CONFIG.tracks; i++) {
            sequenceData.push(new Array(CONFIG.steps).fill(null));
        }

        // ==========================================
        // 1. MOTOR DE AUDIO
        // ==========================================
        const AudioEngine = {
            ctx: null,
            analyser: null,
            masterGain: null,

            init: function() {
                const AC = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AC();
                
                this.masterGain = this.ctx.createGain();
                this.masterGain.gain.value = 0.5;

                this.analyser = this.ctx.createAnalyser();
                this.analyser.fftSize = 256;

                const delay = this.ctx.createDelay();
                delay.delayTime.value = 0.25; 
                const feedback = this.ctx.createGain();
                feedback.gain.value = 0.3;

                this.masterGain.connect(this.analyser);
                this.analyser.connect(this.ctx.destination);
                
                this.masterGain.connect(delay);
                delay.connect(feedback);
                feedback.connect(delay);
                feedback.connect(this.ctx.destination);
                
                if(this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },

            play: function(track, noteIdx) {
                if(!this.ctx) return;
                const t = this.ctx.currentTime;
                
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                if(track === 0) { 
                    osc.type = 'sawtooth';
                    osc.frequency.value = 55 + (noteIdx * 11);
                    const f = this.ctx.createBiquadFilter();
                    f.type = 'lowpass';
                    f.frequency.setValueAtTime(600, t);
                    f.frequency.linearRampToValueAtTime(100, t+0.3);
                    osc.connect(f);
                    f.connect(gain);
                    gain.gain.setValueAtTime(0.8, t);
                    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
                } 
                else if(track === 1) { 
                    osc.type = 'sine';
                    osc.frequency.value = 220 + (noteIdx * 55);
                    osc.connect(gain);
                    gain.gain.setValueAtTime(0, t);
                    gain.gain.linearRampToValueAtTime(0.3, t+0.1);
                    gain.gain.linearRampToValueAtTime(0, t+1.5);
                }
                else if(track === 2) { 
                    osc.type = 'square';
                    osc.frequency.value = 110 + (noteIdx * 110);
                    const f = this.ctx.createBiquadFilter();
                    f.type = 'lowpass';
                    f.Q.value = 10;
                    f.frequency.setValueAtTime(200, t);
                    f.frequency.linearRampToValueAtTime(2000, t+0.1); 
                    osc.connect(f);
                    f.connect(gain);
                    gain.gain.setValueAtTime(0.2, t);
                    gain.gain.exponentialRampToValueAtTime(0.01, t+0.3);
                } 
                else { 
                    osc.type = 'triangle'; 
                    osc.frequency.value = 100 + Math.random()*500;
                    osc.connect(gain);
                    gain.gain.setValueAtTime(0.5, t);
                    gain.gain.exponentialRampToValueAtTime(0.01, t+0.05);
                }

                if(track !== 0 && track !== 2) osc.connect(gain); 
                gain.connect(this.masterGain);
                
                osc.start();
                osc.stop(t+2.0);
            }
        };

        // ==========================================
        // 2. MOTOR GRÁFICO (RESTAURACIÓN Y MEJORAS)
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x030304);
        scene.fog = new THREE.FogExp2(0x030304, 0.02);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 24);
        camera.lookAt(0, -1, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- CILINDRO PRINCIPAL (VOLUMEN Y TEXTURA) ---
        const drumGroup = new THREE.Group();
        
        const drumGeo = new THREE.CylinderGeometry(CONFIG.radius, CONFIG.radius, 14, 64);
        drumGeo.rotateZ(Math.PI/2); 
        const drumMat = new THREE.MeshStandardMaterial({ 
            color: 0x111111, 
            roughness: 0.35,  
            metalness: 0.8   
        });
        const drum = new THREE.Mesh(drumGeo, drumMat);
        drumGroup.add(drum);

        // Anillos divisores sutiles
        for(let i=0; i<CONFIG.tracks; i++) {
            const rGeo = new THREE.TorusGeometry(CONFIG.radius + 0.02, 0.04, 16, 100);
            const rMat = new THREE.MeshStandardMaterial({ color: 0x080808, roughness: 0.8 });
            const rMesh = new THREE.Mesh(rGeo, rMat);
            rMesh.rotateY(Math.PI/2);
            rMesh.position.x = ((i / 3) * 6) - 3;
            drumGroup.add(rMesh);
        }
        scene.add(drumGroup);

        // --- BRAZOS LECTORES ---
        const arms = [];
        const indicators = [];
        
        for(let i=0; i<CONFIG.tracks; i++) {
            const armGroup = new THREE.Group();
            const xPos = ((i / 3) * 6) - 3;
            armGroup.position.set(xPos, CONFIG.radius + 1.5, 0);
            
            const boxMat = new THREE.MeshStandardMaterial({color: 0x222222, metalness: 0.5, roughness: 0.7});
            const box = new THREE.Mesh(new THREE.BoxGeometry(0.3, 3, 0.3), boxMat);
            
            const bulbGeo = new THREE.SphereGeometry(0.2, 16, 16);
            const bulbMat = new THREE.MeshStandardMaterial({
                color: 0x000000, emissive: 0x000000, emissiveIntensity: 1
            });
            const bulb = new THREE.Mesh(bulbGeo, bulbMat);
            bulb.position.set(0, 1.2, 0.2);
            
            armGroup.add(box);
            armGroup.add(bulb);
            
            indicators.push(bulbMat);
            arms.push(armGroup);
            scene.add(armGroup);
        }

        // --- ILUMINACIÓN CORRECTA PARA VOLUMEN 3D ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.15); 
        scene.add(ambient);
        
        // Luz principal cálida (Da volumen al cilindro)
        const mainSpot = new THREE.SpotLight(0xffddaa, 1.2);
        mainSpot.position.set(15, 25, 15);
        mainSpot.angle = Math.PI / 4;
        mainSpot.penumbra = 0.5;
        scene.add(mainSpot);

        // Luz de relleno fría opuesta (Contraste)
        const fillLight = new THREE.PointLight(0x0055ff, 0.8, 50);
        fillLight.position.set(-15, -5, 10);
        scene.add(fillLight);

        // --- LUCES DE FONDO DINÁMICAS ---
        const bgLights = [];
        // Colores: Rojo, Verde Agua, Naranja, Azul
        const lightColors = [0xff2255, 0x00ffcc, 0xff8800, 0x0088ff];
        
        for(let i=0; i<CONFIG.tracks; i++) {
            // Se inician con intensidad 0 (apagadas)
            const bgLight = new THREE.PointLight(lightColors[i], 0, 40);
            // Posicionadas en el fondo, detrás del cilindro
            bgLight.position.set(((i / 3) * 20) - 10, -5, -15);
            scene.add(bgLight);
            bgLights.push(bgLight);
        }

        // ==========================================
        // 3. LÓGICA DEL SISTEMA Y ANIMACIÓN
        // ==========================================
        
        function createPin(track, step) {
            if(sequenceData[track][step] && sequenceData[track][step].mesh) {
                drumGroup.remove(sequenceData[track][step].mesh);
            }

            const geo = new THREE.BoxGeometry(0.2, 0.6, 0.2);
            const mat = new THREE.MeshStandardMaterial({ 
                color: lightColors[track],
                emissive: lightColors[track],
                emissiveIntensity: 0.8,
                metalness: 0.2,
                roughness: 0.2
            });
            const mesh = new THREE.Mesh(geo, mat);

            const angle = ((step / CONFIG.steps) * Math.PI * 2) + (Math.PI / 2);
            const r = CONFIG.radius; 
            const x = ((track / 3) * 6) - 3;

            mesh.position.set(x, Math.sin(angle)*r, Math.cos(angle)*r);
            mesh.lookAt(x, 0, 0); 
            
            drumGroup.add(mesh);
            return mesh;
        }

        let lastTime = performance.now();
        const stepDuration = (60 / CONFIG.bpm) / 4; 

        function loop(time) {
            requestAnimationFrame(loop);
            const dt = (time - lastTime) / 1000;
            lastTime = time;

            // Decaimiento (fade out) de las luces de fondo dinámicas
            for(let i=0; i<CONFIG.tracks; i++) {
                if(bgLights[i].intensity > 0) {
                    // Velocidad de apagado
                    bgLights[i].intensity = Math.max(0, bgLights[i].intensity - (dt * 5)); 
                }
            }

            if(isPlaying) {
                const fullRotation = CONFIG.steps * stepDuration;
                drumGroup.rotation.x += (Math.PI * 2 * dt) / fullRotation;

                let rot = drumGroup.rotation.x % (Math.PI * 2);
                if(rot < 0) rot += Math.PI * 2;
                
                let step = Math.floor((rot / (Math.PI * 2)) * CONFIG.steps);
                
                if(step >= CONFIG.steps) step = 0;
                if(step < 0) step = CONFIG.steps - 1;

                if(step !== currentStep) {
                    currentStep = step;
                    triggerStep(currentStep);
                }
            }

            renderer.render(scene, camera);
            drawScope();
        }

        function triggerStep(step) {
            for(let t=0; t<CONFIG.tracks; t++) {
                indicators[t].emissive.setHex(0x000000);

                const data = sequenceData[t][step];
                
                if(data && data.note !== undefined) {
                    // AUDIO
                    AudioEngine.play(t, data.note);
                    
                    // LUZ INDICADOR BRAZO
                    indicators[t].emissive.setHex(lightColors[t]);
                    
                    // LUZ DE FONDO DINÁMICA (Flash reactivo)
                    bgLights[t].intensity = 2.5; 
                    
                    // MOVIMIENTO MECÁNICO 
                    const arm = arms[t];
                    arm.position.y -= 0.3; 
                    setTimeout(() => { arm.position.y += 0.3 }, 80);
                }
            }
        }

        // ==========================================
        // 4. INTERACCIÓN Y CONTROLES
        // ==========================================

        document.getElementById('startBtn').addEventListener('click', () => {
            AudioEngine.init(); 
            isPlaying = true;
            document.getElementById('overlay').style.opacity = 0;
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 800);
            loop(performance.now());
        });

        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            
            if(['1','2','3','4'].includes(k)) {
                activeTrack = parseInt(k) - 1;
                document.querySelectorAll('.track').forEach((el, i) => {
                    if(i === activeTrack) el.classList.add('active');
                    else el.classList.remove('active');
                });
            }

            const notes = "qwertyuiop";
            const idx = notes.indexOf(k);
            if(idx > -1) {
                const mesh = createPin(activeTrack, currentStep);
                sequenceData[activeTrack][currentStep] = { note: idx, mesh: mesh };
                
                // Feedback visual y auditivo al escribir
                AudioEngine.play(activeTrack, idx);
                bgLights[activeTrack].intensity = 2.5;
            }

            if(e.code === 'Space') {
                for(let s=0; s<CONFIG.steps; s++) {
                    if(sequenceData[activeTrack][s]) {
                        drumGroup.remove(sequenceData[activeTrack][s].mesh);
                        sequenceData[activeTrack][s] = null;
                    }
                }
            }
        });

        // Osciloscopio Minimalista (Abajo centro)
        const cvs = document.getElementById('scope');
        const cCtx = cvs.getContext('2d');
        
        function drawScope() {
            if(!AudioEngine.analyser) return;
            const w = cvs.width;
            const h = cvs.height;
            const buffer = new Uint8Array(AudioEngine.analyser.frequencyBinCount);
            AudioEngine.analyser.getByteTimeDomainData(buffer);

            // Borrar lienzo completo (Sin fondo semi-transparente para mayor limpieza)
            cCtx.clearRect(0, 0, w, h);
            
            // Efecto Glow para la línea central
            cCtx.shadowBlur = 8;
            cCtx.shadowColor = '#ffffff';
            cCtx.lineWidth = 1.5;
            cCtx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
            cCtx.beginPath();

            const slice = w / buffer.length;
            let x = 0;
            for(let i=0; i<buffer.length; i++) {
                const v = buffer[i] / 128.0;
                const y = v * h / 2;
                if(i===0) cCtx.moveTo(x,y);
                else cCtx.lineTo(x,y);
                x += slice;
            }
            cCtx.stroke();
            cCtx.shadowBlur = 0; 
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
