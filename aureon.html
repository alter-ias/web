<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureon & Indira | El Campo Interior</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* ================= VARIABLES ================= */
        :root {
            /* Tema Claro (AUREON) */
            --color-light: #fdfbf7;
            --text-light-theme: #4a1c5e;
            
            /* Tema Oscuro (INDIRA Y HUI) */
            --color-dark: #0f1318;
            --text-dark-theme: #a8b9ce;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #05070a; /* Fondo neutro muy oscuro para resaltar el círculo */
            overflow: hidden; /* No hay scroll en el intro */
        }

        /* ================= CONTENEDOR PRINCIPAL ================= */
        #intro-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        /* ================= EL YIN YANG QUE SE TRANSFORMA ================= */
        #yin-yang-shape {
            width: 200px; 
            height: 200px;
            border-radius: 50%;
            display: flex;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.1);
            /* Centrado absoluto para la expansión */
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Mitades base (Se convertirán en las pantallas divididas) */
        .yy-base-left { 
            width: 50%; height: 100%; 
            background: var(--color-light); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; cursor: pointer;
        }
        .yy-base-right { 
            width: 50%; height: 100%; 
            background: var(--color-dark); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; cursor: pointer;
        }

        /* Curvas que forman la S del Yin Yang */
        .yy-curve-top {
            position: absolute; top: 0; left: 25%;
            width: 50%; height: 50%;
            background: var(--color-dark); /* Curva oscura arriba */
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none;
        }
        .yy-curve-bottom {
            position: absolute; bottom: 0; left: 25%;
            width: 50%; height: 50%;
            background: var(--color-light); /* Curva clara abajo */
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none;
        }

        /* Puntos internos */
        .yy-dot-light { width: 25%; height: 25%; background: var(--color-light); border-radius: 50%; }
        .yy-dot-dark { width: 25%; height: 25%; background: var(--color-dark); border-radius: 50%; }

        /* ================= TEXTOS DE LA PANTALLA DIVIDIDA ================= */
        .split-content {
            text-align: center;
            opacity: 0; /* Ocultos al inicio */
            transform: translateY(30px);
            pointer-events: none; /* Para que el clic lo registre el fondo */
            width: 100%;
            padding: 0 20px;
        }

        .split-title { 
            font-size: clamp(2rem, 5vw, 4rem); 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            margin-bottom: 10px; 
            font-weight: 800;
        }
        .title-aureon { color: var(--text-light-theme); }
        .title-indira { color: var(--text-dark-theme); }

        .split-subtitle { 
            font-size: clamp(0.9rem, 1.5vw, 1.2rem); 
            font-weight: 400; 
            letter-spacing: 5px; 
            opacity: 0.8; 
            text-transform: uppercase;
        }
        .sub-aureon { color: var(--text-light-theme); }
        .sub-indira { color: var(--text-dark-theme); }

    </style>
</head>
<body>

    <div id="intro-wrapper">
        <div id="yin-yang-shape">
            
            <div class="yy-base-left" id="btn-aureon">
                <div class="split-content text-left">
                    <h1 class="split-title title-aureon">Aureon</h1>
                    <p class="split-subtitle sub-aureon">El Campo Interior</p>
                </div>
            </div>

            <div class="yy-base-right" id="btn-indira">
                <div class="split-content text-right">
                    <h1 class="split-title title-indira">Indira & Hui</h1>
                    <p class="split-subtitle sub-indira">Profundidad y Quietud</p>
                </div>
            </div>

            <div class="yy-curve-top">
                <div class="yy-dot-light"></div>
            </div>
            <div class="yy-curve-bottom">
                <div class="yy-dot-dark"></div>
            </div>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script>
        // ================= SECUENCIA DE ANIMACIÓN (GSAP) =================
        const tl = gsap.timeline({ delay: 0.5 });

        // 1. Aparece el Yin Yang y comienza a girar majestuosamente
        tl.fromTo("#yin-yang-shape", 
            { rotation: -180, scale: 0, opacity: 0 },
            { rotation: 360, scale: 1, opacity: 1, duration: 2.5, ease: "power3.inOut" }
        )
        // 2. Hace una pausa muy breve para que el usuario capte el símbolo
        .to("#yin-yang-shape", { rotation: 405, duration: 1, ease: "power1.inOut" })

        // 3. "Aplanamos" el Yin Yang haciendo desaparecer las curvas y puntos internos
        .to([".yy-curve-top", ".yy-curve-bottom"], {
            scale: 0, opacity: 0, duration: 0.8, ease: "back.in(1.5)"
        }, "+=0.2")

        // 4. El círculo perfecto con la línea recta se expande para llenar la pantalla
        .to("#yin-yang-shape", {
            width: "100vw", height: "100vh", borderRadius: "0%", 
            boxShadow: "none", duration: 1.5, ease: "expo.inOut"
        }, "-=0.2")

        // 5. Los textos de "AUREON" e "INDIRA & HUI" flotan hacia arriba
        .to(".split-content", {
            opacity: 1, y: 0, duration: 1, stagger: 0.2, ease: "power2.out"
        }, "-=0.5");


        // ================= LÓGICA DE INTERACCIÓN (HOVER Y CLICK) =================
        const leftSide = document.querySelector('.yy-base-left');
        const rightSide = document.querySelector('.yy-base-right');

        // Efectos Hover (Solo se activan después de que la animación termina)
        tl.eventCallback("onComplete", () => {
            
            // Al pasar el ratón por el lado de Aureon
            leftSide.addEventListener('mouseenter', () => {
                gsap.to(leftSide, { width: '60%', duration: 0.5, ease: 'power2.out' });
                gsap.to(rightSide, { width: '40%', duration: 0.5, ease: 'power2.out' });
            });

            // Al pasar el ratón por el lado de Indira
            rightSide.addEventListener('mouseenter', () => {
                gsap.to(rightSide, { width: '60%', duration: 0.5, ease: 'power2.out' });
                gsap.to(leftSide, { width: '40%', duration: 0.5, ease: 'power2.out' });
            });

            // Al quitar el ratón, vuelve al centro 50/50
            document.getElementById('intro-wrapper').addEventListener('mouseleave', () => {
                gsap.to([leftSide, rightSide], { width: '50%', duration: 0.5, ease: 'power2.out' });
            });
        });

        // Simulación de Click para redirigir a los proyectos
        leftSide.addEventListener('click', () => {
            // Animación de salida (El lado seleccionado ocupa toda la pantalla)
            gsap.to(leftSide, { width: '100vw', duration: 0.8, ease: 'expo.inOut' });
            gsap.to('.split-content.text-right', { opacity: 0, duration: 0.3 });
            
            // Aquí pones la redirección a tu página principal
            setTimeout(() => {
                // window.location.href = "elcampointerior.html"; 
                console.log("Redirigiendo a AUREON...");
            }, 800);
        });

        rightSide.addEventListener('click', () => {
            gsap.to(rightSide, { width: '100vw', duration: 0.8, ease: 'expo.inOut' });
            gsap.to('.split-content.text-left', { opacity: 0, duration: 0.3 });
            
            setTimeout(() => {
                // window.location.href = "indira.html"; 
                console.log("Redirigiendo a INDIRA & HUI...");
            }, 800);
        });

    </script>
</body>
</html>
