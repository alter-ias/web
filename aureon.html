<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transición 3D a Split Screen</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #05070a; /* Fondo oscuro espacial */
            overflow: hidden; 
            font-family: 'Montserrat', sans-serif;
            color: white;
        }

        /* 1. EL CANVAS 3D (Donde ocurre la magia de partículas) */
        #webgl-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1; /* Detrás de la UI */
            cursor: pointer;
        }

        /* Instrucción para el usuario */
        #click-hint {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 10; font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase;
            opacity: 0.7; pointer-events: none; transition: opacity 0.5s;
        }

        /* 2. LA INTERFAZ HTML (Pantalla Dividida, oculta al inicio) */
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 5; display: flex;
            opacity: 0; visibility: hidden; /* Oculto hasta que explote el 3D */
        }

        .split-side {
            width: 50%; height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: width 0.5s ease;
        }

        .split-left { background: #fdfbf7; color: #4a1c5e; border-right: 1px solid rgba(0,0,0,0.1); }
        .split-right { background: #0f1318; color: #a8b9ce; }

        .split-side:hover { width: 55%; }
        .split-side:hover ~ .split-side { width: 45%; }
        .split-right:hover { width: 55%; }

        .title { font-size: 3.5rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 800; }
        .subtitle { font-size: 1.2rem; letter-spacing: 4px; opacity: 0.8; margin-top: 10px;}
    </style>
</head>
<body>

    <div id="webgl-container"></div>
    <div id="click-hint">Haz clic para fragmentar</div>

    <div id="ui-layer">
        <div class="split-side split-left">
            <h1 class="title">Aureon</h1>
            <p class="subtitle">El Campo Interior</p>
        </div>
        <div class="split-side split-right">
            <h1 class="title">Indira & Hui</h1>
            <p class="subtitle">Profundidad y Quietud</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // ================= CONFIGURACIÓN THREE.JS =================
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);
        camera.position.z = 15;

        // ================= CREACIÓN DEL MODELO DE PARTÍCULAS =================
        // Aquí usamos una Esfera como "Modelo 3D" de prueba.
        // En producción, aquí cargarías la geometría de tu logo o modelo usando GLTFLoader.
        const geometry = new THREE.SphereGeometry(4, 64, 64); 
        
        // Material de las partículas (Puntos blancos)
        const material = new THREE.PointsMaterial({
            size: 0.05,
            color: 0xffffff,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });

        const particlesMesh = new THREE.Points(geometry, material);
        scene.add(particlesMesh);

        // Guardar las posiciones originales para calcular hacia dónde explotar
        const positions = geometry.attributes.position.array;
        const originalPositions = new Float32Array(positions);

        // ================= BUCLE DE ANIMACIÓN (ROTACIÓN) =================
        let isExploding = false;

        function animate() {
            requestAnimationFrame(animate);
            
            // Si no ha explotado, rota suavemente
            if (!isExploding) {
                particlesMesh.rotation.y += 0.002;
                particlesMesh.rotation.x += 0.001;
            } else {
                // Cuando explota, hay que decirle a Three.js que actualice las posiciones
                geometry.attributes.position.needsUpdate = true;
            }
            
            renderer.render(scene, camera);
        }
        animate();

        // ================= LA MAGIA DE LA FRAGMENTACIÓN (GSAP) =================
        container.addEventListener('click', () => {
            if (isExploding) return; // Evitar doble clic
            isExploding = true;

            // 1. Ocultar el texto de pista
            document.getElementById('click-hint').style.opacity = 0;

            // 2. Fragmentar las partículas
            // Iteramos sobre cada punto (x, y, z) de la geometría
            for (let i = 0; i < positions.length; i += 3) {
                // Posición original de este punto
                const x = originalPositions[i];
                const y = originalPositions[i+1];
                const z = originalPositions[i+2];

                // Calculamos un destino aleatorio hacia afuera (explosión)
                const distance = 5 + Math.random() * 15; 
                
                // Usamos GSAP para animar el valor en el array directamente
                gsap.to(positions, {
                    [i]: x * distance,     // Destino X
                    [i+1]: y * distance,   // Destino Y
                    [i+2]: z * distance,   // Destino Z
                    duration: 2 + Math.random() * 2, // Diferentes velocidades
                    ease: "power3.out"
                });
            }

            // 3. Desvanecer las partículas mientras explotan
            gsap.to(material, { opacity: 0, duration: 2, ease: "power2.inOut" });

            // 4. Revelar la Pantalla Dividida de HTML
            const uiLayer = document.getElementById('ui-layer');
            gsap.set(uiLayer, { visibility: "visible" });
            gsap.to(uiLayer, { 
                opacity: 1, 
                duration: 2, 
                delay: 0.5, // Espera medio segundo a que empiece la explosión
                ease: "power2.inOut",
                onComplete: () => {
                    // Limpieza: quitamos el canvas 3D para liberar memoria
                    container.style.display = "none";
                }
            });
        });

        // Responsividad
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
