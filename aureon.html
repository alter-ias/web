<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureon & Indira | El Campo Interior (Solución)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* ================= VARIABLES Y TEMAS ================= */
        :root {
            /* Tema Claro (AUREON) */
            --color-light: #fdfbf7; /* Crema suave */
            --text-light-theme: #4a1c5e; /* Púrpura Aureon */
            
            /* Tema Oscuro (INDIRA Y HUI) */
            --color-dark: #0f1318; /* Azul noche profundo */
            --text-dark-theme: #a8b9ce; /* Azul claro Indira */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #05070a; /* Fondo neutro muy oscuro para el intro */
            overflow: hidden; /* Sin scroll para el intro */
        }

        /* ================= CONTENEDOR PRINCIPAL ================= */
        #intro-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        /* ================= EL YIN YANG QUE SE TRANSFORMA (SOLUCIÓN DE ALINEACIÓN) ================= */
        /* Para evitar que quede chueco, el Yin Yang debe estar en un contenedor central perfecto */
        #yin-yang-shape {
            width: 200px; 
            height: 200px;
            border-radius: 50%;
            display: flex;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.1);
            
            /* Centrado absoluto para la expansión sin desvíos */
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Mitades base: pre-construidas para la alineación perfecta */
        .yy-base-left { 
            width: 50%; height: 100%; 
            background: var(--color-light); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; cursor: pointer;
            border-right: 1px solid rgba(0, 0, 0, 0.05); /* Línea divisoria muy sutil en modo claro */
        }
        .yy-base-right { 
            width: 50%; height: 100%; 
            background: var(--color-dark); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; cursor: pointer;
        }

        /* Curvas que forman la S del Yin Yang inicial (se encogerán para el split) */
        .yy-curve-top {
            position: absolute; top: 0; left: 25%;
            width: 50%; height: 50%;
            background: var(--color-dark); /* Curva oscura arriba */
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none;
        }
        .yy-curve-bottom {
            position: absolute; bottom: 0; left: 25%;
            width: 50%; height: 50%;
            background: var(--color-light); /* Curva clara abajo */
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none;
        }

        /* Puntos internos */
        .yy-dot-light { width: 25%; height: 25%; background: var(--color-light); border-radius: 50%; }
        .yy-dot-dark { width: 25%; height: 25%; background: var(--color-dark); border-radius: 50%; }

        /* ================= TEXTOS DE LA PANTALLA DIVIDIDA ================= */
        .split-content {
            text-align: center;
            opacity: 0; /* Ocultos al inicio */
            transform: translateY(30px);
            pointer-events: none; /* El clic lo registra el panel de fondo */
            width: 100%;
            padding: 0 20px;
        }

        .split-title { 
            font-size: clamp(2rem, 5vw, 4rem); 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            margin-bottom: 10px; 
            font-weight: 800;
        }
        .title-aureon { color: var(--text-light-theme); }
        .title-indira { color: var(--text-dark-theme); }

        .split-subtitle { 
            font-size: clamp(0.9rem, 1.5vw, 1.2rem); 
            font-weight: 400; 
            letter-spacing: 5px; 
            opacity: 0.8; 
            text-transform: uppercase;
        }
        .sub-aureon { color: var(--text-light-theme); }
        .sub-indira { color: var(--text-dark-theme); }

        /* Estilo para el cursor que aparece en el final */
        .custom-cursor {
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.4);
            border: 2px solid white;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10001;
            opacity: 0; /* Oculto hasta que termina el intro */
            transform: translate(-50%, -50%);
            transition: opacity 0.5s ease;
        }

    </style>
</head>
<body>

    <div class="custom-cursor" id="custom-cursor"></div>

    <div id="intro-wrapper">
        <div id="yin-yang-shape">
            
            <div class="yy-base-left" id="btn-aureon">
                <div class="split-content text-left">
                    <h1 class="split-title title-aureon">Aureon</h1>
                    <p class="split-subtitle sub-aureon">El Campo Interior.</p>
                </div>
            </div>

            <div class="yy-base-right" id="btn-indira">
                <div class="split-content text-right">
                    <h1 class="split-title title-indira">Indira & Hui</h1>
                    <p class="split-subtitle sub-indira">Profundidad y Quietud.</p>
                </div>
            </div>

            <div class="yy-curve-top" id="curve-top">
                <div class="yy-dot-light"></div>
            </div>
            <div class="yy-curve-bottom" id="curve-bottom">
                <div class="yy-dot-dark"></div>
            </div>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script>
        // ================= SECUENCIA DE ANIMACIÓN (GSAP) =================
        const tl = gsap.timeline({ delay: 0.5 });

        // 1. Aparece el Yin Yang y comienza a girar majestuosamente
        tl.fromTo("#yin-yang-shape", 
            { rotation: -180, scale: 0, opacity: 0 },
            { rotation: 360, scale: 1, opacity: 1, duration: 2.5, ease: "power3.inOut" }
        )
        // 2. Hace una pausa breve para que el usuario capte el símbolo y se alinee perfectamente
        .to("#yin-yang-shape", { rotation: 405, duration: 1, ease: "power1.inOut" })

        // 3. "Aplanamos" el Yin Yang encogiendo las curvas y puntos internos (SOLUCIÓN DE ALINEACIÓN)
        // Usar `back.in` para un efecto más inmersivo
        .to(["#curve-top", "#curve-bottom"], {
            scale: 0, opacity: 0, duration: 0.8, ease: "back.in(1.5)"
        }, "+=0.2")

        // 4. El círculo base con la línea recta se expande para llenar la pantalla
        .to("#yin-yang-shape", {
            width: "100vw", height: "100vh", borderRadius: "0%", 
            boxShadow: "none", duration: 1.5, ease: "expo.inOut"
        }, "-=0.2")

        // 5. Los textos de "AUREON" e "INDIRA & HUI" flotan hacia arriba
        .to(".split-content", {
            opacity: 1, y: 0, duration: 1, stagger: 0.2, ease: "power2.out"
        }, "-=0.5")
        
        // 6. Hacer aparecer el cursor personalizado
        .to("#custom-cursor", { opacity: 1, duration: 0.5 }, "+=0.2");


        // ================= LÓGICA DE INTERACCIÓN (HOVER, CLICK Y ENTRADA) =================
        const leftSide = document.getElementById('btn-aureon');
        const rightSide = document.getElementById('btn-indira');
        const customCursor = document.getElementById('custom-cursor');

        // Mover el cursor personalizado
        document.addEventListener('mousemove', (e) => {
            gsap.to(customCursor, { x: e.clientX, y: e.clientY, duration: 0.1 });
        });

        // Efectos Hover y Click (Solo se activan después de que la animación termina)
        tl.eventCallback("onComplete", () => {
            
            // --- EFECTOS HOVER (60/40 Split) ---
            
            // Al pasar el ratón por Aureon
            leftSide.addEventListener('mouseenter', () => {
                gsap.to(leftSide, { width: '60%', duration: 0.5, ease: 'power2.out' });
                gsap.to(rightSide, { width: '40%', duration: 0.5, ease: 'power2.out' });
            });

            // Al pasar el ratón por Indira
            rightSide.addEventListener('mouseenter', () => {
                gsap.to(rightSide, { width: '60%', duration: 0.5, ease: 'power2.out' });
                gsap.to(leftSide, { width: '40%', duration: 0.5, ease: 'power2.out' });
            });

            // Al quitar el ratón, vuelve al centro 50/50
            document.getElementById('intro-wrapper').addEventListener('mouseleave', () => {
                gsap.to([leftSide, rightSide], { width: '50%', duration: 0.5, ease: 'power2.out' });
            });

            // --- EFECTOS CLICK Y ENTRADA A PÁGINAS (SOLUCIÓN) ---
            
            // Definir una línea de tiempo de salida común
            function exitSiteAnimation(clickedSide, otherSide, redirectUrl) {
                const exitTl = gsap.timeline({
                    onComplete: () => {
                        // Navegación real después de la animación
                        window.location.href = redirectUrl;
                        // Para demostración (si las páginas no existen):
                        // console.log(`Redirigiendo a: ${redirectUrl}`);
                    }
                });

                exitTl
                    // 1. Ocultar el cursor
                    .to("#custom-cursor", { opacity: 0, duration: 0.2 }, 0)
                    // 2. El lado seleccionado ocupa el 100%
                    .to(clickedSide, { width: '100vw', duration: 0.8, ease: 'expo.inOut' }, 0)
                    // 3. El otro lado se encoge a 0
                    .to(otherSide, { width: '0%', duration: 0.8, ease: 'expo.inOut' }, 0)
                    // 4. El texto del lado seleccionado flota hacia arriba y desaparece
                    .to(clickedSide.querySelector('.split-content'), { y: '-100px', opacity: 0, duration: 0.6, ease: 'power2.in' }, 0.2)
                    // 5. El texto del otro lado desaparece rápidamente
                    .to(otherSide.querySelector('.split-content'), { opacity: 0, duration: 0.3 }, 0)
                    // 6. El fondo se vuelve beige para AUREON u oscuro para INDIRA antes de la redirección
                    .to(clickedSide, { backgroundColor: redirectUrl === 'aureon_principal.html' ? '#fdfbf7' : '#0f1318', duration: 0.5 });
            }

            // Click en Lado Izquierdo (AUREON)
            leftSide.addEventListener('click', () => {
                exitSiteAnimation(leftSide, rightSide, 'aureon_principal.html'); 
            });

            // Click en Lado Derecho (INDIRA Y HUI)
            rightSide.addEventListener('click', () => {
                exitSiteAnimation(rightSide, leftSide, 'indira_hui_principal.html'); 
            });
        });

    </script>
</body>
</html>
