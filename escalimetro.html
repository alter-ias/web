<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Escalas Multi-Instrumento</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #2ecc71;
            text-align: center;
            border-bottom: 2px solid #2ecc71;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #95a5a6;
            margin-bottom: 30px;
            text-align: center;
        }
        .controls {
            background-color: #1e272e;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 0.85rem;
            color: #bdc3c7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        select {
            font-size: 1.1rem;
            padding: 10px;
            border-radius: 5px;
            border: 2px solid #2f3640;
            background-color: #121212;
            color: #fff;
            outline: none;
            cursor: pointer;
        }
        select:focus {
            border-color: #2ecc71;
        }
        .transposition-banner {
            background-color: #27ae60;
            color: #fff;
            padding: 15px 30px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
            width: 100%;
            max-width: 1040px;
        }
        .transposition-banner strong {
            font-size: 1.4rem;
            color: #121212;
            background-color: #fff;
            padding: 4px 12px;
            border-radius: 4px;
            margin: 0 8px;
        }
        .results-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }
        .card {
            background-color: #f5f6fa;
            color: #2f3640;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
        }
        .card-1::before { background-color: #3498db; }
        .card-2::before { background-color: #e74c3c; }
        .card-3::before { background-color: #9b59b6; }
        
        .choice-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7f8c8d;
            margin-bottom: 10px;
        }
        .scale-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .notes {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.35rem;
            font-weight: bold;
            color: #d35400;
            background-color: #fdf2e9;
            padding: 12px 10px;
            border-radius: 5px;
            line-height: 1.6;
        }
        .blue-note {
            color: #3498db;
            font-weight: 900;
            font-size: 1.5rem;
            text-shadow: 0px 0px 3px rgba(52, 152, 219, 0.4);
            text-decoration: underline;
        }
        .explanation {
            margin-top: 15px;
            font-size: 0.95rem;
            color: #444;
            font-style: italic;
        }
        .vitanda {
            margin-top: 15px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #c0392b;
            background-color: #fadbd8;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #e74c3c;
        }
    </style>
</head>

    <div class="subtitle">Con transposición para Vientos (Bb y Eb)</div>

    <div class="controls">
        <div class="control-group">
            <label>Tono de la Canción (Concierto)</label>
            <select id="rootSelect">
                <option value="C">Do (C)</option>
                <option value="C#/Db">Do# / Reb (C#/Db)</option>
                <option value="D">Re (D)</option>
                <option value="D#/Eb">Mib / Re# (D#/Eb)</option>
                <option value="E">Mi (E)</option>
                <option value="F">Fa (F)</option>
                <option value="F#/Gb">Fa# / Solb (F#/Gb)</option>
                <option value="G">Sol (G)</option>
                <option value="G#/Ab">Lab / Sol# (G#/Ab)</option>
                <option value="A">La (A)</option>
                <option value="A#/Bb">Sib / La# (A#/Bb)</option>
                <option value="B">Si (B)</option>
            </select>
        </div>

        <div class="control-group">
            <label>Tipo de Acorde</label>
            <select id="typeSelect">
                <option value="mayor">Mayor</option>
                <option value="menor">Menor</option>
            </select>
        </div>

        <div class="control-group">
            <label>Tu Instrumento</label>
            <select id="instSelect">
                <option value="0">Tono C (Guitarra, Piano, Bajo, Voz)</option>
                <option value="2">Tono Bb (Saxo Tenor, Trompeta, Clarinete)</option>
                <option value="9">Tono Eb (Saxo Alto, Saxo Barítono)</option>
            </select>
        </div>
    </div>

    <div class="transposition-banner" id="transBanner">
        Para sonar sobre <strong>-</strong>, tú debes pensar y tocar en <strong>-</strong>
    </div>

    <div class="results-container">
        <!-- Tarjeta 1 -->
        <div class="card card-1">
            <div class="choice-label">1ª Elección (Convencional)</div>
            <div class="scale-name" id="name1">-</div>
            <div class="notes" id="notes1">-</div>
            <div class="explanation" id="exp1">-</div>
            <div class="vitanda" id="vit1">-</div>
        </div>
        <!-- Tarjeta 2 -->

        </div>

            <div class="vitanda" id="vit3">-</div>
        </div>
    </div>

                    { name: "Dórica Blues G", notes: "G - A - Bb - C - <span class='blue-note'>Db</span> - D - E - F", exp: "Escala Dórica con la nota blue añadida.", vit: "🚫 PELIGRO: Mib (6ta Menor) - Choca violentamente con el Mi natural dórico." }

                    { name: "Blues Menor D#", notes: "D# - F# - G# - <span class='blue-note'>A</span> - A# - C#", exp: "Neo-Soul flotante con un guiño al blues.", vit: "🚫 PELIGRO: Mi natural (6ta Menor) - Arruina la intención flotante." },
                    { name: "Dórica Blues G#", notes: "G# - A# - B - C# - <span class='blue-note'>D</span> - D# - E# - F#", exp: "Escala Dórica con la nota blue añadida.", vit: "🚫 PELIGRO: Mi natural (6ta Menor) - Choca con el Mi# (Fa) dórico." }
                ],

                    { name: "Dórica Blues Bb", notes: "Bb - C - Db - Eb - <span class='blue-note'>E</span> - F - G - Ab", exp: "Escala Dórica con la nota blue añadida.", vit: "🚫 PELIGRO: Solb (6ta Menor) - Choca con el Sol natural dórico." }
                ],
                "B": [
                    { name: "Blues Menor B", notes: "B - D - E - <span class='blue-note'>F</span> - F# - A", exp: "El sonido directo, oscuro y arrastrado.", vit: "🚫 PELIGRO: Re# (3ra Mayor) - Destruye tu acorde menor base." },

                ]
            }
        };

        // Arreglo maestro de los 12 tonos en orden cromático
        const chromaticKeys = ["C", "C#/Db", "D", "D#/Eb", "E", "F", "F#/Gb", "G", "G#/Ab", "A", "A#/Bb", "B"];

        // Función para resolver enarmonías visuales (mayor vs menor)
        function getMappedRoot(rawValue, type) {
            const mappings = {
                "C": { mayor: "C", menor: "C" },
                "C#/Db": { mayor: "Db", menor: "C#" },
                "D": { mayor: "D", menor: "D" },
                "D#/Eb": { mayor: "Eb", menor: "Eb" },
                "E": { mayor: "E", menor: "E" },
                "F": { mayor: "F", menor: "F" },
                "F#/Gb": { mayor: "F#", menor: "F#" },
                "G": { mayor: "G", menor: "G" },
                "G#/Ab": { mayor: "Ab", menor: "G#" },
                "A": { mayor: "A", menor: "A" },
                "A#/Bb": { mayor: "Bb", menor: "Bb" },
                "B": { mayor: "B", menor: "B" }
            };
            return mappings[rawValue][type];
        }

        const rootSelect = document.getElementById('rootSelect');
        const typeSelect = document.getElementById('typeSelect');
        const instSelect = document.getElementById('instSelect');
        const transBanner = document.getElementById('transBanner');
        
        const domElements = {
            1: { name: document.getElementById('name1'), notes: document.getElementById('notes1'), exp: document.getElementById('exp1'), vit: document.getElementById('vit1') },
            2: { name: document.getElementById('name2'), notes: document.getElementById('notes2'), exp: document.getElementById('exp2'), vit: document.getElementById('vit2') },
            3: { name: document.getElementById('name3'), notes: document.getElementById('notes3'), exp: document.getElementById('exp3'), vit: document.getElementById('vit3') }
        };

        function updateScales() {
            const concertRawRoot = rootSelect.value;
            const type = typeSelect.value;
            const shiftAmount = parseInt(instSelect.value);

            // 1. Encontrar el índice de la nota de concierto
            const concertIndex = chromaticKeys.indexOf(concertRawRoot);
            
            // 2. Calcular el índice transpuesto
            const transposedIndex = (concertIndex + shiftAmount) % 12;
            const transposedRawRoot = chromaticKeys[transposedIndex];

            // 3. Mapear nombres bonitos (Db en vez de C# si es mayor, etc.)
            const concertDisplay = getMappedRoot(concertRawRoot, type);
            const transposedDisplay = getMappedRoot(transposedRawRoot, type);
            
            // 4. Buscar la data ya transpuesta en nuestra base
            const selectedData = scaleData[type][transposedDisplay];

            // 5. Actualizar el banner visual
            transBanner.innerHTML = `Para la canción en <strong>${concertDisplay} ${type}</strong>, tu instrumento debe tocar en <strong>${transposedDisplay} ${type}</strong>`;

            // 6. Actualizar las tarjetas
            for (let i = 0; i < 3; i++) {
                domElements[i+1].name.innerText = selectedData[i].name;
                domElements[i+1].notes.innerHTML = selectedData[i].notes;
                domElements[i+1].exp.innerText = selectedData[i].exp;
                domElements[i+1].vit.innerText = selectedData[i].vit;
            }
        }

        // Listeners
        rootSelect.addEventListener('change', updateScales);
        typeSelect.addEventListener('change', updateScales);
        instSelect.addEventListener('change', updateScales);

        // Init
        updateScales();

    </script>
